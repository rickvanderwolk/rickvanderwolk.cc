<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bounce</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #05060a; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  body { touch-action: none; } /* prevent scroll/zoom while dragging on mobile */
  #score {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    color: #cfe9ff; font-size: 28px; letter-spacing: 6px; text-shadow: 0 0 12px #2a6cff;
    user-select: none; z-index: 10;
  }
  #hint {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    color: #5b6b85; font-size: 13px; letter-spacing: 2px; user-select: none; z-index: 10;
    text-align: center; width: 100%; padding: 0 12px;
  }
  #flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 5; opacity: 0;
    transition: opacity 0.08s ease-out;
  }
  #banner {
    position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
    color: #fff; font-size: 52px; font-weight: 700; letter-spacing: 4px;
    text-shadow: 0 0 24px currentColor; user-select: none; z-index: 11;
    opacity: 0; transition: opacity 0.15s, transform 0.15s;
  }
  #overlay {
    position: fixed; inset: 0; z-index: 12; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: rgba(5, 6, 10, 0.55); color: #cfe9ff; text-align: center;
    user-select: none; cursor: pointer;
  }
  #overlay.hidden { display: none; }
  #overlay .title { font-size: 46px; font-weight: 700; letter-spacing: 8px; text-shadow: 0 0 20px #2a6cff; }
  #overlay .sub { font-size: 16px; letter-spacing: 2px; color: #7d92b5; }
  #pauseBtn {
    position: fixed; top: 20px; right: 20px; z-index: 13; width: 40px; height: 40px;
    border-radius: 8px; border: 1px solid #2a6cff66; background: #0a1430cc; color: #cfe9ff;
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>
<div id="flash"></div>
<div id="banner"></div>
<div id="score">0 &nbsp;:&nbsp; 0</div>
<div id="hint">move your mouse or drag &mdash; left/right and up/down</div>
<button id="pauseBtn" title="Pause / resume (space)">II</button>
<div id="overlay">
  <div class="title">BOUNCE</div>
  <div class="sub" id="overlaySub">first to 7 wins &mdash; press space or tap to start</div>
</div>
<script type="importmap">
{ "imports": { "three": "../three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from '../jsm/postprocessing/EffectComposer.js';
import { RenderPass } from '../jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from '../jsm/postprocessing/UnrealBloomPass.js';

// --- Field dimensions ---
const FIELD_W = 20;   // width (x)
const FIELD_H = 12;   // height (y) - vertical play space
const FIELD_L = 30;   // length (z)
const PADDLE_W = 5;   // paddle width (x)
const PADDLE_H = 3.4; // paddle height (y)
const BALL_R = 0.6;

// --- Scene ---
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x05060a, 25, 70);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// --- Postprocessing: neon glow (bloom) at half resolution = much lighter ---
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth / 2, innerHeight / 2), 0.9, 0.5, 0.2);
composer.addPass(bloom);

// --- Camera placement, responsive so the field fits on phones (portrait) ---
const camBase = new THREE.Vector3();

// The 8 corners of the play box; used to centre the *visible* field on screen.
const fieldCorners = [];
for (const sx of [-1, 1]) for (const sy of [-1, 1]) for (const sz of [-1, 1])
  fieldCorners.push(new THREE.Vector3(sx * FIELD_W / 2, sy * FIELD_H / 2, sz * FIELD_L / 2));

// Vertical look target; solved so the field trapezoid centres in the viewport.
// (Perspective makes the near edge huge, so aiming at the origin leaves the field
//  sitting low — we iterate the look height until the corners average to centre.)
let lookY = 0;
function centerField() {
  lookY = 0;
  for (let i = 0; i < 24; i++) {
    camera.lookAt(0, lookY, 0);
    camera.updateMatrixWorld(true);
    camera.matrixWorldInverse.copy(camera.matrixWorld).invert();
    let sum = 0;
    for (const c of fieldCorners) sum += c.clone().project(camera).y;
    const avg = sum / fieldCorners.length; // average NDC y of the field (target: 0)
    if (Math.abs(avg) < 0.0005) break;
    lookY += avg * 8; // raising the look target pushes the field down → converges
  }
}

function layoutCamera() {
  const aspect = innerWidth / innerHeight;
  camera.aspect = aspect;
  camera.updateProjectionMatrix();
  // Push the camera back until every corner of the play box fits on screen.
  // This guarantees both paddles stay visible on any aspect (incl. portrait phones).
  let dist = FIELD_L / 2 + 14;
  for (let i = 0; i < 40; i++) {
    camBase.set(0, dist * 0.26, dist); // height scales with distance -> consistent angle
    camera.position.copy(camBase);
    centerField(); // re-centre vertically for this position
    let m = 0;
    for (const c of fieldCorners) {
      const p = c.clone().project(camera);
      m = Math.max(m, Math.abs(p.x), Math.abs(p.y));
    }
    if (m <= 0.92) break;     // fits with a small margin
    dist *= m / 0.92;          // scale back proportionally to the overflow
  }
  // Fit the fog to the final camera distance, otherwise on far (portrait) cameras
  // the whole field would sit beyond the fog and fade to nothing.
  const near = camBase.distanceTo(new THREE.Vector3(0, 0, FIELD_L / 2));
  const far = camBase.distanceTo(new THREE.Vector3(0, FIELD_H / 2, -FIELD_L / 2));
  scene.fog.near = near * 0.6;
  scene.fog.far = far + 25;
}
layoutCamera();

// --- Lights ---
scene.add(new THREE.AmbientLight(0x4060a0, 0.6));
const key = new THREE.DirectionalLight(0xffffff, 1.0);
key.position.set(8, 20, 10);
scene.add(key);
const rim = new THREE.PointLight(0x2a6cff, 1.2, 80);
rim.position.set(0, 8, 0);
scene.add(rim);

// --- Floor (grid at the bottom of the play box) ---
const grid = new THREE.GridHelper(FIELD_L * 1.4, 28, 0x2a6cff, 0x14233f);
grid.position.y = -FIELD_H / 2 - 0.01;
scene.add(grid);

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(FIELD_W, FIELD_L),
  new THREE.MeshStandardMaterial({ color: 0x0a1020, roughness: 0.9, metalness: 0.1 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -FIELD_H / 2 - 0.02;
scene.add(floor);

// --- Play box as a wireframe (shows the vertical bounds, adds 3D depth) ---
const boxGeo = new THREE.BoxGeometry(FIELD_W, FIELD_H, FIELD_L);
const boxEdges = new THREE.LineSegments(
  new THREE.EdgesGeometry(boxGeo),
  new THREE.LineBasicMaterial({ color: 0x2a6cff, transparent: true, opacity: 0.45 })
);
scene.add(boxEdges);

// Subtle glass side walls so left/right stays visible
const wallMat = new THREE.MeshStandardMaterial({ color: 0x12203a, roughness: 0.6, emissive: 0x0a1830, emissiveIntensity: 0.4, transparent: true, opacity: 0.25 });
function makeWall(x) {
  const w = new THREE.Mesh(new THREE.BoxGeometry(0.2, FIELD_H, FIELD_L), wallMat);
  w.position.set(x, 0, 0);
  scene.add(w);
}
makeWall(-FIELD_W / 2);
makeWall(FIELD_W / 2);

// --- Center "net": classic dashed centre line, here a dashed plane at z = 0 ---
const netPts = [];
const dash = 0.7, gap = 0.7;
for (let x = -FIELD_W / 2 + 1; x <= FIELD_W / 2 - 1; x += 2.5) {
  for (let y = -FIELD_H / 2; y < FIELD_H / 2; y += dash + gap) {
    netPts.push(x, y, 0, x, Math.min(y + dash, FIELD_H / 2), 0);
  }
}
const netGeo = new THREE.BufferGeometry();
netGeo.setAttribute('position', new THREE.Float32BufferAttribute(netPts, 3));
const net = new THREE.LineSegments(netGeo, new THREE.LineBasicMaterial({ color: 0x2a6cff, transparent: true, opacity: 0.35 }));
scene.add(net);

// --- Paddles (translucent with a bright neon edge) ---
function makePaddle(color) {
  const p = new THREE.Mesh(
    new THREE.BoxGeometry(PADDLE_W, PADDLE_H, 0.7),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.6, roughness: 0.3, transparent: true, opacity: 0.32 })
  );
  // Bright outline so your position stays sharply readable
  const edge = new THREE.LineSegments(
    new THREE.EdgesGeometry(p.geometry),
    new THREE.LineBasicMaterial({ color })
  );
  p.add(edge);
  scene.add(p);
  return p;
}
const player = makePaddle(0x35e0ff);
player.position.set(0, 0, FIELD_L / 2);
const ai = makePaddle(0xff4d6d);
ai.position.set(0, 0, -FIELD_L / 2);

// --- Ball ---
const ball = new THREE.Mesh(
  new THREE.SphereGeometry(BALL_R, 24, 24),
  new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xbfe0ff, emissiveIntensity: 0.8 })
);
scene.add(ball);
const ballLight = new THREE.PointLight(0xbfe0ff, 1.5, 18);
ball.add(ballLight);

// --- Sound: tiny Web Audio synth, no files needed ---
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, dur, type = 'square', gain = 0.05) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g).connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  g.gain.setValueAtTime(gain, now);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  o.start(now); o.stop(now + dur);
}

const BALL_Y = FIELD_H / 2 - BALL_R; // vertical bound (ceiling/floor of the box)
const vel = new THREE.Vector3();
let serveTimer = 0;  // seconds the ball waits at centre before launching
let serveDir = 1;    // which way it will serve
function resetBall(dir) {
  ball.position.set(0, 0, 0);
  vel.set(0, 0, 0);
  serveDir = dir;
  serveTimer = 1.1;  // brief pause before serving (classic Pong pacing)
}
function launchBall() {
  const angle = (Math.random() - 0.5) * 0.7;
  const elev = (Math.random() - 0.5) * 0.5;
  const speed = 0.42;
  vel.set(Math.sin(angle) * speed, elev * speed, serveDir * Math.cos(angle) * speed);
  beep(660, 0.07); // serve blip
}
resetBall(Math.random() < 0.5 ? 1 : -1);

// --- Ball trail ---
const TRAIL_N = 14;
const trail = [];
const trailMat = new THREE.MeshBasicMaterial({ color: 0xbfe0ff, transparent: true });
for (let i = 0; i < TRAIL_N; i++) {
  const t = new THREE.Mesh(new THREE.SphereGeometry(BALL_R, 12, 12), trailMat.clone());
  scene.add(t);
  trail.push(t);
}
let trailIdx = 0;

// --- Starfield background ---
const starN = 600;
const starPos = new Float32Array(starN * 3);
for (let i = 0; i < starN; i++) {
  starPos[i*3]   = (Math.random() - 0.5) * 200;
  starPos[i*3+1] = (Math.random() - 0.5) * 120;
  starPos[i*3+2] = -Math.random() * 160 - 20;
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x88aaff, size: 0.7, transparent: true, opacity: 0.8 }));
scene.add(stars);

// --- Particle burst on impact ---
const BURST_N = 40;
const burstGeo = new THREE.BufferGeometry();
const burstPos = new Float32Array(BURST_N * 3);
const burstVel = [];
for (let i = 0; i < BURST_N; i++) burstVel.push(new THREE.Vector3());
burstGeo.setAttribute('position', new THREE.BufferAttribute(burstPos, 3));
const burstMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0, blending: THREE.AdditiveBlending });
const burst = new THREE.Points(burstGeo, burstMat);
scene.add(burst);
let burstLife = 0;
function spawnBurst(pos, color) {
  burstMat.color.set(color);
  burstMat.opacity = 1;
  burstLife = 1;
  for (let i = 0; i < BURST_N; i++) {
    burstPos[i*3] = pos.x; burstPos[i*3+1] = pos.y; burstPos[i*3+2] = pos.z;
    burstVel[i].set((Math.random()-0.5), (Math.random()-0.5), (Math.random()-0.5)).normalize().multiplyScalar(0.2 + Math.random()*0.4);
  }
  burstGeo.attributes.position.needsUpdate = true;
}

// --- Camera shake ---
let shake = 0;
function addShake(amount) { shake = Math.min(1.2, shake + amount); }

// --- Flash on impact ---
function flash(mesh) { mesh.material.emissiveIntensity = 2.2; }

// --- Score & difficulty (0 = easy start, ramps to 1 over the match) ---
const WIN_SCORE = 7; // first to this many points wins
let scorePlayer = 0, scoreAI = 0;
let difficulty = 0;
function rampDifficulty() { difficulty = Math.min(1, difficulty + 0.05); }
const scoreEl = document.getElementById('score');
function updateScore() {
  scoreEl.innerHTML = `${scorePlayer} &nbsp;:&nbsp; ${scoreAI}`;
}

// --- Goal feedback: screen flash + banner ---
const flashEl = document.getElementById('flash');
const bannerEl = document.getElementById('banner');
let bannerTimer = 0;
function goalFeedback(playerScored) {
  const color = playerScored ? '53, 224, 255' : '255, 77, 109';
  flashEl.style.background = `radial-gradient(circle at center, rgba(${color},0.45), rgba(${color},0) 70%)`;
  flashEl.style.opacity = '1';
  setTimeout(() => { flashEl.style.opacity = '0'; }, 90);
  bannerEl.textContent = playerScored ? 'POINT!' : 'MISSED';
  bannerEl.style.color = playerScored ? '#35e0ff' : '#ff4d6d';
  bannerEl.style.opacity = '1';
  bannerEl.style.transform = 'translate(-50%, -50%) scale(1)';
  bannerTimer = 1.0; // seconds visible
}

// --- Controls: the paddle goes exactly where you point / touch ---
// We cast a ray from the pointer onto the player paddle's plane, so finger/mouse
// movement maps 1:1 to the field (no slow "gain" when the view is zoomed out on mobile).
const maxX = FIELD_W / 2 - PADDLE_W / 2;
const maxY = FIELD_H / 2 - PADDLE_H / 2;
let targetX = 0, targetY = 0;
const raycaster = new THREE.Raycaster();
const playerPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), -FIELD_L / 2); // plane z = FIELD_L/2
const _ndc = new THREE.Vector2();
const _hit = new THREE.Vector3();
function aim(clientX, clientY) {
  _ndc.set((clientX / innerWidth) * 2 - 1, -(clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(_ndc, camera);
  if (raycaster.ray.intersectPlane(playerPlane, _hit)) {
    targetX = THREE.MathUtils.clamp(_hit.x, -maxX, maxX);
    targetY = THREE.MathUtils.clamp(_hit.y, -maxY, maxY);
  }
}
// Pointer events cover both mouse and touch (touch fires while dragging)
addEventListener('pointermove', (e) => aim(e.clientX, e.clientY));
addEventListener('pointerdown', (e) => aim(e.clientX, e.clientY));

// --- Game state: start / playing / paused ---
let state = 'start';
const overlay = document.getElementById('overlay');
const overlayTitle = overlay.querySelector('.title');
const overlaySub = document.getElementById('overlaySub');
const pauseBtn = document.getElementById('pauseBtn');
function showOverlay(title, sub) {
  overlayTitle.textContent = title;
  overlaySub.textContent = sub;
  overlay.classList.remove('hidden');
  pauseBtn.textContent = '▶'; // play triangle
}
function resetMatch() {
  scorePlayer = 0; scoreAI = 0; difficulty = 0; updateScore();
  player.position.set(0, 0, FIELD_L / 2);
  ai.position.set(0, 0, -FIELD_L / 2);
  resetBall(Math.random() < 0.5 ? 1 : -1);
}
function play() {
  if (state === 'gameover') resetMatch(); // restart a fresh match
  state = 'playing'; overlay.classList.add('hidden'); pauseBtn.textContent = 'II';
}
function gameOver(playerWon) {
  state = 'gameover';
  showOverlay(playerWon ? 'YOU WIN' : 'GAME OVER', 'press space or tap to play again');
}
function togglePause() {
  initAudio(); // first user gesture unlocks audio
  if (state === 'playing') { state = 'paused'; showOverlay('PAUSED', 'press space or tap to resume'); }
  else { play(); } // from 'start', 'paused' or 'gameover'
}
addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); togglePause(); }
});
overlay.addEventListener('pointerdown', (e) => { e.preventDefault(); togglePause(); });
pauseBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); togglePause(); });

// --- Game loop (frame-rate independent so motion stays smooth) ---
let lastTime = performance.now();
function tick(now) {
  requestAnimationFrame(tick);

  // step = how many 60fps-frames this real frame represents (clamped against hitches)
  const step = Math.min((now - lastTime) / 16.667, 3);
  lastTime = now;

  // --- Gameplay only runs while playing (frozen on start/pause screen) ---
  if (state === 'playing') {
  // Player paddle follows the pointer in x and y (fast and direct)
  const follow = 1 - Math.pow(1 - 0.6, step);
  player.position.x += (targetX - player.position.x) * follow;
  player.position.y += (targetY - player.position.y) * follow;
  player.position.x = THREE.MathUtils.clamp(player.position.x, -maxX, maxX);
  player.position.y = THREE.MathUtils.clamp(player.position.y, -maxY, maxY);

  // AI tracks the ball with a capped speed: slow & a bit lazy early so you can
  // score, sharper and faster as difficulty climbs over the match.
  const aiMaxStep = (0.10 + difficulty * 0.22) * step; // max units this frame
  const aiSlack = (1 - difficulty) * 2.0;              // deadzone: ignores small offsets early
  const tx = THREE.MathUtils.clamp(ball.position.x, -maxX, maxX);
  const ty = THREE.MathUtils.clamp(ball.position.y, -maxY, maxY);
  const dx = tx - ai.position.x, dy = ty - ai.position.y;
  ai.position.x += THREE.MathUtils.clamp(Math.abs(dx) > aiSlack ? dx : 0, -aiMaxStep, aiMaxStep);
  ai.position.y += THREE.MathUtils.clamp(Math.abs(dy) > aiSlack ? dy : 0, -aiMaxStep, aiMaxStep);

  // Serve pause: hold the ball at centre, then launch (classic Pong pacing)
  if (serveTimer > 0) {
    serveTimer = Math.max(0, serveTimer - step / 60);
    if (serveTimer === 0) launchBall();
  } else {

  // Move the ball
  ball.position.addScaledVector(vel, step);

  // Update trail
  const t = trail[trailIdx];
  t.position.copy(ball.position);
  trailIdx = (trailIdx + 1) % TRAIL_N;
  for (let i = 0; i < TRAIL_N; i++) {
    const idx = (trailIdx + i) % TRAIL_N;
    const f = i / TRAIL_N; // 0 = oldest
    trail[idx].material.opacity = f * 0.5;
    trail[idx].scale.setScalar(0.3 + f * 0.7);
  }

  // Vertical bounce (floor/ceiling) -> real 3D
  if (ball.position.y > BALL_Y) { ball.position.y = BALL_Y; vel.y *= -1; }
  if (ball.position.y < -BALL_Y) { ball.position.y = -BALL_Y; vel.y *= -1; }

  // Side wall bounce
  if (ball.position.x > FIELD_W / 2 - BALL_R) { ball.position.x = FIELD_W / 2 - BALL_R; vel.x *= -1; addShake(0.15); beep(200, 0.04); }
  if (ball.position.x < -FIELD_W / 2 + BALL_R) { ball.position.x = -FIELD_W / 2 + BALL_R; vel.x *= -1; addShake(0.15); beep(200, 0.04); }

  // Paddle collisions
  const pZ = FIELD_L / 2 - 0.35;
  const aZ = -FIELD_L / 2 + 0.35;
  if (vel.z > 0 && ball.position.z > pZ - BALL_R && ball.position.z < pZ + 0.5) {
    if (Math.abs(ball.position.x - player.position.x) < PADDLE_W / 2 + BALL_R &&
        Math.abs(ball.position.y - player.position.y) < PADDLE_H / 2 + BALL_R) {
      ball.position.z = pZ - BALL_R;
      vel.z *= -1;
      vel.x += (ball.position.x - player.position.x) * 0.06; // left/right from contact point
      vel.y += (ball.position.y - player.position.y) * 0.06; // up/down from contact point
      vel.multiplyScalar(1.06);                              // faster each rally
      flash(player); addShake(0.4); spawnBurst(ball.position, 0x35e0ff); beep(480, 0.06);
    }
  }
  if (vel.z < 0 && ball.position.z < aZ + BALL_R && ball.position.z > aZ - 0.5) {
    if (Math.abs(ball.position.x - ai.position.x) < PADDLE_W / 2 + BALL_R &&
        Math.abs(ball.position.y - ai.position.y) < PADDLE_H / 2 + BALL_R) {
      ball.position.z = aZ + BALL_R;
      vel.z *= -1;
      vel.x += (ball.position.x - ai.position.x) * 0.06;
      vel.y += (ball.position.y - ai.position.y) * 0.06;
      vel.multiplyScalar(1.06);
      flash(ai); addShake(0.4); spawnBurst(ball.position, 0xff4d6d); beep(360, 0.06);
    }
  }

  // Cap ball speed so it stays playable
  const maxSpeed = 0.95;
  if (vel.length() > maxSpeed) vel.setLength(maxSpeed);

  // Goal scored (the ball visibly flies past the paddle before it resets)
  if (ball.position.z > FIELD_L / 2 + 4) {
    scoreAI++; rampDifficulty(); updateScore(); addShake(0.8); goalFeedback(false);
    beep(180, 0.25, 'sawtooth'); spawnBurst(ball.position, 0xff4d6d); resetBall(-1);
    if (scoreAI >= WIN_SCORE) gameOver(false);
  }
  if (ball.position.z < -FIELD_L / 2 - 4) {
    scorePlayer++; rampDifficulty(); updateScore(); addShake(0.8); goalFeedback(true);
    beep(720, 0.18); spawnBurst(ball.position, 0x35e0ff); resetBall(1);
    if (scorePlayer >= WIN_SCORE) gameOver(true);
  }
  } // end serve-pause else
  } // end gameplay block

  // Fade out banner
  if (bannerTimer > 0) {
    bannerTimer -= step / 60;
    if (bannerTimer <= 0) {
      bannerEl.style.opacity = '0';
      bannerEl.style.transform = 'translate(-50%, -50%) scale(0.8)';
    }
  }

  // Animate particle burst
  if (burstLife > 0) {
    burstLife -= 0.025 * step;
    for (let i = 0; i < BURST_N; i++) {
      burstPos[i*3]   += burstVel[i].x * step;
      burstPos[i*3+1] += burstVel[i].y * step;
      burstPos[i*3+2] += burstVel[i].z * step;
      burstVel[i].multiplyScalar(Math.pow(0.94, step));
    }
    burstGeo.attributes.position.needsUpdate = true;
    burstMat.opacity = Math.max(0, burstLife);
  }

  // Slowly drift the stars
  stars.rotation.z += 0.0004 * step;

  // Fade the emissive flash back down
  const fade = 1 - Math.pow(1 - 0.1, step);
  player.material.emissiveIntensity += (0.6 - player.material.emissiveIntensity) * fade;
  ai.material.emissiveIntensity += (0.6 - ai.material.emissiveIntensity) * fade;

  // Apply and decay camera shake (deterministic, no random in the build-up)
  shake *= Math.pow(0.88, step);
  const s = shake;
  camera.position.set(
    camBase.x + Math.sin(now * 0.05) * s,
    camBase.y + Math.cos(now * 0.043) * s,
    camBase.z
  );
  camera.lookAt(0, lookY, 0);

  composer.render();
}
requestAnimationFrame(tick);

addEventListener('resize', () => {
  layoutCamera();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
