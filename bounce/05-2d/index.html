<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bounce · 2D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; overflow: hidden;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; touch-action: none; }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  canvas { image-rendering: pixelated; background: #000;
    box-shadow: 0 0 40px -6px #2bd14a55, 0 0 0 2px #1a3a22; }
  /* CRT scanlines + subtle flicker over everything */
  #scan { position: fixed; inset: 0; z-index: 5; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.28) 3px, rgba(0,0,0,0.28) 4px);
    mix-blend-mode: multiply; }
  #stackControls {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; z-index: 13;
  }
  #stackControls button {
    width: 56px; height: 56px; border-radius: 6px; border: 2px solid #2bd14a88;
    background: #04140a; color: #7dffa0; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; touch-action: none; user-select: none;
    font-family: inherit;
  }
  #stackControls button:active { background: #0b2a16; }
  /* On desktop you use the arrow keys, so hide the on-screen buttons there. */
  @media (hover: hover) and (pointer: fine) { #stackControls { display: none; } }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<div id="scan"></div>
<div id="stackControls">
  <button data-act="left" aria-label="move left">&#9664;</button>
  <button data-act="rotate" aria-label="rotate">&#10227;</button>
  <button data-act="right" aria-label="move right">&#9654;</button>
  <button data-act="drop" aria-label="drop">&#9660;</button>
</div>
<script>
'use strict';
// ============================================================================
// RETRO — a 2D, classic-arcade take on the Bounce·Stack mash-up.
// Horizontal Pong (you on the left, AI on the right) with a Tetris "wall" in
// the middle: steer the falling pieces with the arrow keys while keeping the
// rally alive. Every locked (or falling) block is solid — the ball pinballs off
// it — and a completely filled row clears. Pure 2D canvas, no dependencies.
// ============================================================================

// --- Layout (logical pixels; the canvas is scaled up, kept crisp/pixelated) ---
const CELL = 28;
const COLS = 11, ROWS = 16;
const SIDE = 112;                 // open lane on each side (where the paddles live)
const GRID_W = COLS * CELL, GRID_H = ROWS * CELL;
const PF_W = SIDE * 2 + GRID_W;   // playfield width
const PF_H = GRID_H;              // playfield height
const HUD_H = 50;
const GRID_X0 = SIDE, GRID_Y0 = 0;
const W = PF_W, H = HUD_H + PF_H;

const PADDLE_W = 10, PADDLE_H = 74;
const BALL_R = 7;

const canvas = document.getElementById('game');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

function resize() {
  const s = Math.min(innerWidth / W, innerHeight / H);
  canvas.style.width = Math.floor(W * s) + 'px';
  canvas.style.height = Math.floor(H * s) + 'px';
}
addEventListener('resize', resize); resize();

// --- Tetromino shapes (classic colours) + rotation ---
const SHAPES = {
  I: { c: '#00f0f0', n: 4, cells: [[1,0],[1,1],[1,2],[1,3]] },
  O: { c: '#f0d000', n: 2, cells: [[0,0],[0,1],[1,0],[1,1]] },
  T: { c: '#b000f0', n: 3, cells: [[0,1],[1,0],[1,1],[1,2]] },
  S: { c: '#00e040', n: 3, cells: [[0,1],[0,2],[1,0],[1,1]] },
  Z: { c: '#f02020', n: 3, cells: [[0,0],[0,1],[1,1],[1,2]] },
  J: { c: '#2050f0', n: 3, cells: [[0,0],[1,0],[1,1],[1,2]] },
  L: { c: '#f08000', n: 3, cells: [[0,2],[1,0],[1,1],[1,2]] },
};
const KEYS = Object.keys(SHAPES);
function rotatedCells(key, rot) {
  const s = SHAPES[key];
  let cells = s.cells.map(([r, c]) => [r, c]);
  const times = ((rot % 4) + 4) % 4;
  for (let t = 0; t < times; t++) cells = cells.map(([r, c]) => [c, s.n - 1 - r]);
  return cells;
}

// --- Board state ---
let board = [];                   // board[r][c] = colour string or null
function emptyRow() { return new Array(COLS).fill(null); }
function emptyBoard() { board = []; for (let r = 0; r < ROWS; r++) board.push(emptyRow()); }
emptyBoard();

let piece = null;                 // { key, rot, r0, c0 }
let fallTimer = 0, fallInterval = 1.0;

function pieceWorldCells(p) {
  return rotatedCells(p.key, p.rot).map(([dr, dc]) => [p.r0 + dr, p.c0 + dc]);
}
function valid(key, rot, r0, c0) {
  for (const [dr, dc] of rotatedCells(key, rot)) {
    const r = r0 + dr, c = c0 + dc;
    if (c < 0 || c >= COLS || r >= ROWS) return false;
    if (r >= 0 && board[r][c]) return false;
  }
  return true;
}
function spawnPiece() {
  const key = KEYS[(Math.random() * KEYS.length) | 0];
  const cells = rotatedCells(key, 0);
  let minR = 99; for (const [r] of cells) minR = Math.min(minR, r);
  const c0 = ((COLS - SHAPES[key].n) / 2) | 0;
  piece = { key, rot: 0, r0: -minR, c0 };
  fallTimer = fallInterval;
  return valid(key, 0, piece.r0, c0);   // false => no room (top-out)
}
function lockPiece() {
  for (const [r, c] of pieceWorldCells(piece)) if (r >= 0) board[r][c] = SHAPES[piece.key].c;
  piece = null;
  beep(150, 0.04);
  clearLines();
  if (!spawnPiece()) onTopout();
}
function clearLines() {
  const kept = board.filter(row => row.some(c => !c));   // rows that are NOT full
  const cleared = ROWS - kept.length;
  if (!cleared) return;
  while (kept.length < ROWS) kept.unshift(emptyRow());
  board = kept;
  const gained = 300 * cleared * cleared * Math.max(1, streak);
  score += gained; addShake(5); flash('#00e040', 0.5);
  beep(700, 0.1); beep(1040, 0.12);
  banner(cleared > 1 ? cleared + ' ROWS  +' + gained : 'ROW  +' + gained, '#00e040');
}
function onTopout() {
  lives--; streak = 0; rampAI(); addShake(9); flash('#f02020', 0.7); beep(120, 0.3, 'sawtooth');
  emptyBoard();
  if (lives <= 0) { gameOver(); return; }
  banner('STACK OVERFLOW', '#f02020');
  spawnPiece();
}

// Steering (shared by keyboard + on-screen buttons)
function move(dc) { if (piece && valid(piece.key, piece.rot, piece.r0, piece.c0 + dc)) { piece.c0 += dc; beep(220, 0.02, 'square', 0.03); } }
function rotate() {
  if (!piece) return;
  const nr = piece.rot + 1;
  for (const k of [0, -1, 1, -2, 2]) if (valid(piece.key, nr, piece.r0, piece.c0 + k)) { piece.rot = nr; piece.c0 += k; beep(330, 0.03); return; }
}
function softDrop() {
  if (!piece) return;
  if (valid(piece.key, piece.rot, piece.r0 + 1, piece.c0)) { piece.r0++; fallTimer = fallInterval; beep(170, 0.02, 'square', 0.03); }
  else lockPiece();
}

// --- Paddles + ball ---
const player = { x: 26, y: PF_H / 2 - PADDLE_H / 2 };
const ai = { x: PF_W - 26 - PADDLE_W, y: PF_H / 2 - PADDLE_H / 2 };
const ball = { x: PF_W / 2, y: PF_H / 2 };
const vel = { x: 0, y: 0 };
let serveTimer = 0, serveDir = 1;
let targetY = player.y;

function resetBall(dir) { ball.x = PF_W / 2; ball.y = PF_H / 2; vel.x = 0; vel.y = 0; serveDir = dir; serveTimer = 0.9; }
function launchBall() {
  const sp = Math.min(3.0 + (wave - 1) * 0.25, 5.4);
  const ang = (Math.random() - 0.5) * 1.0;       // vertical spread
  vel.x = serveDir * sp * Math.cos(ang);
  vel.y = sp * Math.sin(ang);
  beep(520, 0.06);
}

// --- Score / lives / waves ---
const MAX_LIVES = 6, WAVE_EVERY = 4;
let score = 0, lives = MAX_LIVES, streak = 0, wave = 1, playerPoints = 0, aiSkill = 0;
let highScore = Number(localStorage.getItem('bounce_2d_highscore') || 0);
function rampAI() { aiSkill = Math.min(1, aiSkill + 0.025); }
function setWave(w) { wave = w; fallInterval = Math.max(0.4, 1.0 - (w - 1) * 0.05); }

// --- Audio (tiny square-wave synth) ---
let actx = null;
function initAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); if (actx.state === 'suspended') actx.resume(); }
function beep(freq, dur, type = 'square', gain = 0.05) {
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq; o.connect(g).connect(actx.destination);
  const t = actx.currentTime; g.gain.setValueAtTime(gain, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur); o.start(t); o.stop(t + dur);
}

// --- Juice: shake, flash, banner ---
let shake = 0; function addShake(a) { shake = Math.min(16, shake + a); }
let flashColor = '#000', flashA = 0; function flash(c, a) { flashColor = c; flashA = Math.max(flashA, a); }
let bannerText = '', bannerColor = '#fff', bannerTimer = 0;
function banner(t, c) { bannerText = t; bannerColor = c; bannerTimer = 1.0; }

// --- Ball vs axis-aligned cell/paddle (box-vs-box resolution, retro-crisp) ---
function hitBox(bx, by, bw, bh) {       // returns axis hit: 'x' | 'y' | null, resolves ball
  const hw = bw / 2 + BALL_R, hh = bh / 2 + BALL_R;
  const dx = ball.x - (bx + bw / 2), dy = ball.y - (by + bh / 2);
  const px = hw - Math.abs(dx), py = hh - Math.abs(dy);
  if (px <= 0 || py <= 0) return null;
  if (px < py) { ball.x += Math.sign(dx || 1) * px; vel.x *= -1; return 'x'; }
  ball.y += Math.sign(dy || 1) * py; vel.y *= -1; return 'y';
}

function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }

// --- Game state machine ---
let state = 'start';
function play() { initAudio(); if (state === 'gameover') resetMatch(); state = 'playing'; }
function resetMatch() {
  score = 0; lives = MAX_LIVES; streak = 0; aiSkill = 0; playerPoints = 0; setWave(1);
  emptyBoard(); spawnPiece();
  player.y = ai.y = PF_H / 2 - PADDLE_H / 2; targetY = player.y;
  resetBall(Math.random() < 0.5 ? 1 : -1);
}
function gameOver() {
  state = 'gameover';
  if (score > highScore) { highScore = score; localStorage.setItem('bounce_2d_highscore', String(highScore)); }
}
function togglePause() { initAudio(); if (state === 'playing') state = 'paused'; else play(); }

// --- Input ---
addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); togglePause(); return; }
  if (state !== 'playing') return;
  if (e.code === 'ArrowLeft') { move(-1); e.preventDefault(); }
  else if (e.code === 'ArrowRight') { move(1); e.preventDefault(); }
  else if (e.code === 'ArrowUp') { rotate(); e.preventDefault(); }
  else if (e.code === 'ArrowDown') { softDrop(); e.preventDefault(); }
});
function pointerY(clientY) {
  const r = canvas.getBoundingClientRect();
  return (clientY - r.top) / r.height * H - HUD_H;
}
function aim(clientY) { targetY = clamp(pointerY(clientY) - PADDLE_H / 2, 0, PF_H - PADDLE_H); }
addEventListener('pointermove', (e) => aim(e.clientY));
addEventListener('pointerdown', (e) => { if (e.target.closest('#stackControls')) return; e.preventDefault(); if (state !== 'playing') togglePause(); else aim(e.clientY); });
const acts = { left: () => move(-1), right: () => move(1), rotate, drop: softDrop };
for (const b of document.querySelectorAll('#stackControls button'))
  b.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); initAudio(); if (state === 'playing') acts[b.dataset.act](); });

// --- Main loop ---
let last = performance.now();
function tick(now) {
  requestAnimationFrame(tick);
  const step = Math.min((now - last) / 16.667, 3); last = now;

  if (state === 'playing') {
    // Player paddle eases toward the pointer
    player.y += (targetY - player.y) * (1 - Math.pow(0.4, step));
    player.y = clamp(player.y, 0, PF_H - PADDLE_H);

    // AI tracks the ball, lazy early and sharper as its skill ramps
    const aiMax = (1.6 + aiSkill * 4.0) * step, slack = (1 - aiSkill) * 26;
    const dy = (ball.y - PADDLE_H / 2) - ai.y;
    ai.y = clamp(ai.y + clamp(Math.abs(dy) > slack ? dy : 0, -aiMax, aiMax), 0, PF_H - PADDLE_H);

    // Gravity for the falling piece
    if (piece) {
      fallTimer -= step / 60;
      if (fallTimer <= 0) {
        if (valid(piece.key, piece.rot, piece.r0 + 1, piece.c0)) { piece.r0++; fallTimer += fallInterval; }
        else lockPiece();
      }
    }

    if (serveTimer > 0) {
      serveTimer = Math.max(0, serveTimer - step / 60);
      if (serveTimer === 0) launchBall();
    } else {
      ball.x += vel.x * step; ball.y += vel.y * step;

      // Top / bottom walls
      if (ball.y < BALL_R) { ball.y = BALL_R; vel.y *= -1; beep(200, 0.03); }
      if (ball.y > PF_H - BALL_R) { ball.y = PF_H - BALL_R; vel.y *= -1; beep(200, 0.03); }

      // Paddles
      if (vel.x < 0 && hitBox(player.x, player.y, PADDLE_W, PADDLE_H) === 'x') {
        vel.x = Math.abs(vel.x); vel.y += ((ball.y - (player.y + PADDLE_H / 2)) / (PADDLE_H / 2)) * 2.0;
        bumpSpeed(); addShake(4); flash('#2bd14a', 0.25); beep(440, 0.05);
      }
      if (vel.x > 0 && hitBox(ai.x, ai.y, PADDLE_W, PADDLE_H) === 'x') {
        vel.x = -Math.abs(vel.x); vel.y += ((ball.y - (ai.y + PADDLE_H / 2)) / (PADDLE_H / 2)) * 2.0;
        bumpSpeed(); addShake(4); flash('#f0d000', 0.25); beep(360, 0.05);
      }

      // The stack (and the active piece) are solid — bounce off the first cell hit
      let hit = false;
      for (let r = 0; r < ROWS && !hit; r++) for (let c = 0; c < COLS; c++) {
        if (!board[r][c]) continue;
        if (hitBox(GRID_X0 + c * CELL, GRID_Y0 + r * CELL, CELL, CELL)) { addShake(3); beep(300, 0.04); hit = true; break; }
      }
      if (!hit && piece) for (const [r, c] of pieceWorldCells(piece)) {
        if (r < 0) continue;
        if (hitBox(GRID_X0 + c * CELL, GRID_Y0 + r * CELL, CELL, CELL)) { addShake(3); beep(300, 0.04); break; }
      }

      // Goals
      if (ball.x < -BALL_R) {                         // past you -> AI scores
        lives--; streak = 0; rampAI(); addShake(10); flash('#f02020', 0.6); beep(150, 0.25, 'sawtooth');
        resetBall(-1); if (lives <= 0) gameOver(); else banner('LIFE LOST', '#f02020');
      } else if (ball.x > PF_W + BALL_R) {            // past the AI -> you score
        streak++; playerPoints++; const g = 100 * streak; score += g;
        rampAI(); addShake(10); flash('#2bd14a', 0.6); beep(740, 0.16); resetBall(1);
        const nw = 1 + Math.floor(playerPoints / WAVE_EVERY);
        if (nw > wave) { setWave(nw); banner('WAVE ' + wave, '#00f0f0'); beep(520, 0.1); beep(820, 0.12); }
        else banner(streak > 1 ? '+' + g + '  x' + streak : '+' + g, '#2bd14a');
      }
    }
  }

  if (bannerTimer > 0) bannerTimer -= step / 60;
  shake *= Math.pow(0.85, step);
  flashA *= Math.pow(0.82, step);
  draw();
}

function bumpSpeed() {
  const sp = Math.hypot(vel.x, vel.y) * 1.03, m = Math.min(sp, 8);
  const l = Math.hypot(vel.x, vel.y) || 1; vel.x = vel.x / l * m; vel.y = vel.y / l * m;
}

// --- Rendering ---
function draw() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

  drawHUD();

  // Everything below the HUD shakes together
  const sx = (Math.random() - 0.5) * shake, sy = (Math.random() - 0.5) * shake;
  ctx.save();
  ctx.translate(sx, HUD_H + sy);

  // Playfield border + centre net + faint grid in the wall area
  ctx.strokeStyle = '#123'; ctx.lineWidth = 2; ctx.strokeRect(1, 1, PF_W - 2, PF_H - 2);
  ctx.strokeStyle = '#0d2a16'; ctx.lineWidth = 1;
  ctx.beginPath();
  for (let c = 0; c <= COLS; c++) { ctx.moveTo(GRID_X0 + c * CELL, 0); ctx.lineTo(GRID_X0 + c * CELL, PF_H); }
  for (let r = 0; r <= ROWS; r++) { ctx.moveTo(GRID_X0, r * CELL); ctx.lineTo(GRID_X0 + GRID_W, r * CELL); }
  ctx.stroke();

  // Locked blocks
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (board[r][c]) drawCell(GRID_X0 + c * CELL, r * CELL, board[r][c]);
  // Active piece
  if (piece) { const col = SHAPES[piece.key].c; for (const [r, c] of pieceWorldCells(piece)) if (r >= 0) drawCell(GRID_X0 + c * CELL, r * CELL, col); }

  // Paddles + ball
  drawGlowRect(player.x, player.y, PADDLE_W, PADDLE_H, '#2bd14a');
  drawGlowRect(ai.x, ai.y, PADDLE_W, PADDLE_H, '#f0d000');
  ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff'; ctx.shadowBlur = 12;
  ctx.fillRect(Math.round(ball.x - BALL_R), Math.round(ball.y - BALL_R), BALL_R * 2, BALL_R * 2);
  ctx.shadowBlur = 0;

  // Banner
  if (bannerTimer > 0) {
    ctx.globalAlpha = Math.min(1, bannerTimer * 2);
    text(bannerText, PF_W / 2, PF_H / 2 - 8, 26, bannerColor, 'center');
    ctx.globalAlpha = 1;
  }
  ctx.restore();

  // Flash overlay
  if (flashA > 0.01) { ctx.globalAlpha = flashA; ctx.fillStyle = flashColor; ctx.fillRect(0, HUD_H, PF_W, PF_H); ctx.globalAlpha = 1; }

  // Overlays
  if (state !== 'playing') drawOverlay();
}

function drawCell(x, y, color) {
  ctx.fillStyle = color; ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
  ctx.fillStyle = 'rgba(255,255,255,0.28)'; ctx.fillRect(x + 1, y + 1, CELL - 2, 4);   // top highlight
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(x + 1, y + CELL - 5, CELL - 2, 4);  // bottom shade
}
function drawGlowRect(x, y, w, h, c) {
  ctx.fillStyle = c; ctx.shadowColor = c; ctx.shadowBlur = 12;
  ctx.fillRect(Math.round(x), Math.round(y), w, h); ctx.shadowBlur = 0;
}
function text(s, x, y, size, color, align = 'left') {
  ctx.fillStyle = color; ctx.font = '700 ' + size + 'px ui-monospace, Menlo, monospace';
  ctx.textAlign = align; ctx.textBaseline = 'middle';
  try { ctx.letterSpacing = Math.max(1, size * 0.08) + 'px'; } catch (e) {}
  ctx.fillText(s, x, y);
  try { ctx.letterSpacing = '0px'; } catch (e) {}
}
function pad(n) { return String(n).padStart(6, '0'); }
function drawHUD() {
  text('SCORE ' + pad(score), 14, HUD_H / 2, 18, '#7dffa0', 'left');
  text('HI ' + pad(highScore), W - 14, HUD_H / 2, 18, '#3f9f5f', 'right');
  // life pips, centred
  const n = MAX_LIVES, pip = 12, gap = 7, total = n * pip + (n - 1) * gap;
  let x = W / 2 - total / 2;
  for (let i = 0; i < n; i++) { ctx.fillStyle = i < lives ? '#f02020' : '#3a1010'; ctx.fillRect(x, HUD_H / 2 - pip / 2, pip, pip); x += pip + gap; }
  ctx.strokeStyle = '#0d2a16'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0, HUD_H - 0.5); ctx.lineTo(W, HUD_H - 0.5); ctx.stroke();
}
function drawOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.66)'; ctx.fillRect(0, 0, W, H);
  if (state === 'start') {
    text('2D', W / 2, H / 2 - 60, 60, '#7dffa0', 'center');
    text('RETRO BOUNCE + STACK', W / 2, H / 2 - 14, 15, '#3f9f5f', 'center');
    text('MOUSE = PADDLE   ARROWS = STEER', W / 2, H / 2 + 30, 13, '#2bd14a', 'center');
    text('PRESS SPACE OR TAP TO START', W / 2, H / 2 + 56, 14, '#7dffa0', 'center');
  } else if (state === 'paused') {
    text('PAUSED', W / 2, H / 2 - 10, 44, '#7dffa0', 'center');
    text('PRESS SPACE OR TAP TO RESUME', W / 2, H / 2 + 34, 14, '#3f9f5f', 'center');
  } else if (state === 'gameover') {
    text('GAME OVER', W / 2, H / 2 - 36, 44, '#f02020', 'center');
    text('SCORE ' + pad(score) + '   BEST ' + pad(highScore), W / 2, H / 2 + 12, 16, '#7dffa0', 'center');
    text('PRESS SPACE OR TAP TO PLAY AGAIN', W / 2, H / 2 + 44, 14, '#3f9f5f', 'center');
  }
}

// --- Boot ---
emptyBoard(); spawnPiece(); resetBall(1);
requestAnimationFrame(tick);
</script>
</body>
</html>
