<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
  #hint {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
    color: rgba(255,255,255,0.35); font: 12px/1.4 'Courier New', monospace;
    letter-spacing: 2px; pointer-events: none; transition: opacity 1.2s;
  }
  #hint.weg { opacity: 0; }
  #hud {
    position: fixed; top: 16px; left: 16px; display: none;

<body>
<div id="vignet"></div>
<div id="hint">klik = microfoon aan &nbsp;·&nbsp; d = signalen</div>
<div id="hud"></div>

<!-- p5.js vendored lokaal (staat in doek/), geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek — exp-105: AANGROEIEND DOEK (alleen toevoegen) — variant van exp-103/104
// =============================================================================
// Geen reis, geen scroll, niets schuift. Er is één blijvende laag. Na de grondlaag
// wordt er NOOIT iets gewist en NOOIT iets bestaands overschreven -- elk frame komen
// er alleen een paar nieuwe, doorschijnende toetsen bij. Omdat de echte bronnen
// (zon, weer, seizoen, maan, geluid) langzaam schuiven, krijgen die nieuwe toetsen
// langzaam andere kleur/richting. Zo VERANDERT het doek vanzelf over tijd -- puur
// door aangroei -- terwijl alle oudere lagen eronder bewaard blijven (pentimento).
//
// Kern: de verandering komt niet van beweging maar van STAPELEN. Het veld (waar het
// licht/donker/kleur zit) ligt vast in wereld-coord, dus dezelfde plekken worden
// steeds opnieuw licht óf donker aangezet -> de compositie verdiept i.p.v. te
// vervlakken, en het palet verschuift met de dag. Uniek per instantie doordat de
// wereld-plek uit de open-timestamp komt (geen random).

// ── knoppen ────────────────────────────────────────────────────────────────
const SPEED       = 1;          // veld-tempo (1 = echt traag; puur tuning)
const CLOCK_SPEED = 1;          // klok-tempo (1 = echte tijd)
const LAT = 52.09, LON = 5.12;  // ~Utrecht; bepaalt de zonnebaan

const PAINT_RATE = 0.0000005;   // basis-snelheid van de veld-tijd
let paintT = 0;                 // veld-tijd (traag)
let clockMs = 0;                // wandklok, ms sinds start (echte tijd)


// ── SIGNAL-BUS ──────────────────────────────────────────────────────────────
const providers = {};
const smoothState = {};

function registerSource(map) {
  for (const k in map) if (typeof map[k] === 'function') providers[k] = map[k];
}
function hashSeed(name) {
  let h = 2166136261;
  for (let i = 0; i < name.length; i++) { h ^= name.charCodeAt(i); h = Math.imul(h, 16777619); }
  return ((h >>> 0) / 4294967295) * 1000;
}
// Vangnet: heeft een knop géén (echte) bron, dan drift 'ie op trage noise. In
// deze versie is ALLES aan een echte bron gekoppeld, dus dit vuurt normaal nooit.
function synth(name) { return noise(hashSeed(name), paintT * 0.35); }
function sig(name, smoothing = 0) {
  const p = providers[name];
  let v = p ? p() : synth(name);
  if (v == null || Number.isNaN(v)) v = synth(name);
  v = v < 0 ? 0 : v > 1 ? 1 : v;
  if (smoothing > 0) {
    const prev = (name in smoothState) ? smoothState[name] : v;
    v = prev + (v - prev) * (1 - smoothing);
    smoothState[name] = v;
  }
  return v;
}


// ── BRON: zon / tijd / maan (offline, altijd aan) ──────────────────────────
function makeAstro() {
  const startWall = Date.now();
  const D2R = Math.PI / 180;
  const vDate = () => new Date(startWall + clockMs);

  function sunPos(d) { // zonshoogte, kompasrichting én declinatie (seizoen)
    const yearStart = Date.UTC(d.getUTCFullYear(), 0, 0);
    const today = Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
    const doy = (today - yearStart) / 86400000;
    const decl = 23.45 * Math.sin(D2R * (360 / 365) * (doy - 81));
    const utcH = d.getUTCHours() + d.getUTCMinutes() / 60 + d.getUTCSeconds() / 3600;
    const H = 15 * (utcH + LON / 15 - 12);
    const sinAlt = Math.sin(LAT * D2R) * Math.sin(decl * D2R)
                 + Math.cos(LAT * D2R) * Math.cos(decl * D2R) * Math.cos(H * D2R);
    const alt = Math.asin(Math.max(-1, Math.min(1, sinAlt))) / D2R;
    const cosAz = (Math.sin(decl * D2R) - Math.sin(alt * D2R) * Math.sin(LAT * D2R))
                / (Math.cos(alt * D2R) * Math.cos(LAT * D2R));
    let az = Math.acos(Math.max(-1, Math.min(1, cosAz))) / D2R;
    if (H > 0) az = 360 - az;
    return { alt, az, decl };
  }
  function moonIllum(d) {
    const ref = Date.UTC(2000, 0, 6, 18, 14);
    let phase = (((d.getTime() - ref) / 86400000) % 29.530588853) / 29.530588853;
    if (phase < 0) phase += 1;
    return (1 - Math.cos(phase * 2 * Math.PI)) / 2;
  }
  const ss = (e0, e1, x) => { let v = (x - e0) / (e1 - e0); v = v < 0 ? 0 : v > 1 ? 1 : v; return v * v * (3 - 2 * v); };

  return {
    vDate,
    sources: {
      'sun.alt':   () => ss(-12, 60, sunPos(vDate()).alt),
      'sun.day':   () => ss(-6, 8, sunPos(vDate()).alt),
      'sun.az':    () => sunPos(vDate()).az / 360,
      'season':    () => (sunPos(vDate()).decl + 23.45) / 46.9,
      'time.frac': () => { const d = vDate(); return (d.getHours() + d.getMinutes() / 60) / 24; },
      'moon':      () => moonIllum(vDate()),
    },
  };
}


// ── BRON: microfoon (optioneel, idle = 0) ──────────────────────────────────
function makeMic() {
  let analyser = null, freq = null, ready = false, level = 0, low = 0, mid = 0, high = 0;

  async function enable() {
    if (ready) return true;
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      const ctx = new Ctx();
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const src = ctx.createMediaStreamSource(stream);
      analyser = ctx.createAnalyser();
      analyser.fftSize = 1024;
      analyser.smoothingTimeConstant = 0.85;
      src.connect(analyser);
      freq = new Uint8Array(analyser.frequencyBinCount);
      await ctx.resume();
      ready = true;
      return true;
    } catch (e) {
      console.warn('microfoon niet beschikbaar:', e);
      return false;
    }
  }
  function update() {
    if (!ready) return;
    analyser.getByteFrequencyData(freq);
    const n = freq.length;
    const band = (a, b) => { let s = 0; for (let i = a; i < b; i++) s += freq[i]; return s / ((b - a) * 255); };
    low = band(0, n * 0.15 | 0); mid = band(n * 0.15 | 0, n * 0.5 | 0); high = band(n * 0.5 | 0, n);
    level = low * 0.6 + mid * 0.3 + high * 0.1;
  }
  return {
    enable, update, isReady: () => ready,
    sources: {
      'mic.level': () => ready ? level : 0,
      'mic.low':   () => ready ? low   : 0,
      'mic.mid':   () => ready ? mid   : 0,
      'mic.high':  () => ready ? high  : 0,
    },
  };
}


// ── BRON: live weer (Open-Meteo, gratis, geen sleutel) ─────────────────────
// Echte uren-laag: wind, bewolking, druk, temperatuur, vocht voor de locatie.
// Verversen elke ~10 min. Tot de eerste fetch binnen is -> neutraal (0.5),
// nooit noise, zodat 'alles is echt' klopt.
function makeWeather() {
  let data = null;
  const clamp01 = (v) => (v < 0 ? 0 : v > 1 ? 1 : v);
  const norm = (v, lo, hi) => clamp01((v - lo) / (hi - lo));

  async function fetchNow() {
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`
        + `&current=temperature_2m,relative_humidity_2m,cloud_cover,surface_pressure,wind_speed_10m,wind_direction_10m`;
      const j = await (await fetch(url)).json();
      const c = j.current;
      data = {
        temp:     norm(c.temperature_2m, -5, 30),
        humid:    clamp01(c.relative_humidity_2m / 100),
        cloud:    clamp01(c.cloud_cover / 100),
        pressure: norm(c.surface_pressure, 985, 1035),
        wind:     norm(c.wind_speed_10m, 0, 45),
        windDir:  clamp01((((c.wind_direction_10m % 360) + 360) % 360) / 360),
      };
    } catch (e) { console.warn('weer niet beschikbaar:', e); }
  }
  fetchNow();
  setInterval(fetchNow, 10 * 60 * 1000);

  const val = (k) => () => (data ? data[k] : 0.5); // geen data -> neutraal, geen noise
  return {
    ready: () => data != null,
    sources: {
      'weather.temp':     val('temp'),
      'weather.humid':    val('humid'),
      'weather.cloud':    val('cloud'),
      'weather.pressure': val('pressure'),
      'weather.wind':     val('wind'),
      'weather.windDir':  val('windDir'),
    },
  };
}


// ── MAPPING ("de partituur") — élk facet op een echte bron, per tijdschaal ─
const mix = (a, b, t) => a + (b - a) * (t < 0 ? 0 : t > 1 ? 1 : t);

function envelope() {
  const day    = sig('sun.day');               // dag (zon)
  const alt    = sig('sun.alt');
  const az     = sig('sun.az');
  const moon   = sig('moon');                  // maand (maan)
  const season = sig('season');                // jaar (seizoen)
  const cloud  = sig('weather.cloud', 0.92);   // uren (weer)
  const wind   = sig('weather.wind', 0.92);
  const wdir   = sig('weather.windDir', 0.95);
  const press  = sig('weather.pressure', 0.95);
  const temp   = sig('weather.temp', 0.95);
  const humid  = sig('weather.humid', 0.92);
  const micL   = sig('mic.level', 0.6);        // direct (kamer)
  const micH   = sig('mic.high', 0.6);

  const hueBase = mix(210, 40, day * 0.7 + temp * 0.3); // koel nacht -> warm dag, warmer bij warm weer

  return {
    // kleur & licht — zon + weer
    hueCenter: (hueBase + 360) % 360,
    lightCtr:  mix(18, 60, alt) * (1 - cloud * 0.35),                // bewolking dempt het licht
    satBase:   mix(30, 88, 0.4 + alt * 0.35 - cloud * 0.2 - humid * 0.12 + season * 0.12),
    contrast:  mix(30, 90, (1 - cloud) * 0.75 + (1 - season) * 0.25), // heldere lucht = hard chiaroscuro
    // gebaar & richting — wind
    flowBias:  (wdir * 0.7 + az * 0.3) * TWO_PI,                      // wind (+ zon) zet de penseelrichting
    aspect:    mix(1.6, 3.6, 0.35 + wind * 0.5),
    turns:     mix(0.7, 2.6, 0.25 + wind * 0.7),                      // wind = woeliger
    scaleFlow: mix(0.0009, 0.0028, 0.3 + wind * 0.6),
    // compositie — luchtdruk
    structAmt: mix(0.15, 0.58, press),                               // hoog = open/sereen, laag = dicht (minder extreem)
    // ritmes — maan / seizoen
    hueSpread: mix(30, 115, moon),
    moonLift:  moon * (1 - day),
    sizeBase:  mix(14, 40, 0.4 + season * 0.3) + micL * 12,
    // energie — zon + wind + geluid
    density:   Math.round(mix(4, 9, 0.4 + alt * 0.25 + wind * 0.25) + micH * 3),
    spawn:     mix(0.35, 0.85, 0.3 + wind * 0.4) + micL * 0.6,        // nieuwe toetsen per frame (rustig)
    alpha:     mix(0.06, 0.14, 0.4 + day * 0.3),
    // vast
    scaleComp: 0.0018,   // fijnere massa's -> altijd licht én donker per scherm (geen heel-zwart)
    scaleHue:  0.0026,   // fijnere kleurzones
  };
}


// ── ENGINE: aangroeiend doek (alleen toevoegen) ────────────────────────────
// Eén blijvende laag. Na de grond wordt er nooit gewist; elk frame komt er alleen
// een handvol doorschijnende toetsen bij. Kleur/vorm van een toets komt uit het
// echte veld op die plek × de echte tijd -> 'het klopt', en het schuift langzaam
// mee met licht en weer. De aangroei kruipt rond een langzaam dwalend zwaartepunt,
// zodat sommige plekken nú bewerkt worden en andere hun oudere lagen houden.
const BASE = [215, 22, 13];   // grondkleur (HSL) — eenmalig op t=0; daarna nooit meer vullen
let art;                      // de enige, blijvende laag — groeit alleen aan
let worldOX = 0, worldOY = 0; // vaste wereld-offset (uit open-timestamp) -> uniek stuk veld
let startMs = 0;              // opstartmoment (echte tijd): wereld-plek + klok
let paintClock = 0;           // veld-klok: opgeteld uit GEKLEMDE dt -> springt nooit
let envEased = null;          // zacht na-geijlde enveloppe -> toetsen matchen hun buur
let strokeAcc = 0;            // deelframe-teller: houdt de aangroei-snelheid vloeiend
let focusX = 0, focusY = 0;   // langzaam dwalend zwaartepunt van de aangroei
const sharpen = (v, k) => constrain((v - 0.5) * k + 0.5, 0, 1);

// Ijl de enveloppe zacht na (one-pole). flowBias is een hoek -> kortste weg, zodat
// een windsprong niet even door alle richtingen veegt. hueCenter blijft in 40..210,
// dus die mag lineair (nooit bij de 0/360-naad).
function lerpAngle(a, b, t) {
  let d = ((b - a + Math.PI) % TWO_PI) - Math.PI;
  if (d < -Math.PI) d += TWO_PI;
  return a + d * t;
}
function easeEnv(cur, tgt, t) {
  if (!cur) return Object.assign({}, tgt);
  const o = {};
  for (const k in tgt) {
    if (k === 'flowBias') o[k] = lerpAngle(cur[k], tgt[k], t);
    else if (typeof tgt[k] === 'number') o[k] = cur[k] + (tgt[k] - cur[k]) * t;
    else o[k] = tgt[k];
  }
  return o;
}

// De blijvende laag opbouwen. Bij resize nemen we de bestaande verf OVER (bovenop
// een verse grond, zodat nieuw-onthuld gebied niet zwart is) -> niets gaat weg.
function buildArt(prev) {
  const g = createGraphics(width, height);
  g.colorMode(HSL, 360, 100, 100, 1);
  g.background(BASE[0], BASE[1], BASE[2]);   // grond (enige keer dat er gevuld wordt)
  if (prev) g.image(prev, 0, 0);             // bestaande verf er bovenop -> ongewijzigd
  return g;
}

// Zachte, langwerpige penseeltoets via een radiale gradient, op doel-laag g.
function dab(g, cx, cy, ang, R, aspect, h, s, l, a, core) {
  const ctx = g.drawingContext;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(ang);
  ctx.scale(aspect, 1);
  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, R);
  const H = h | 0, S = s | 0, L = l | 0;
  const c = core == null ? 0.35 : core; // 0 = heel zacht ... ~0.8 = scherpe kern
  grad.addColorStop(0, `hsla(${H},${S}%,${L}%,${a})`);
  grad.addColorStop(c, `hsla(${H},${S}%,${L}%,${a})`);
  grad.addColorStop(1, `hsla(${H},${S}%,${L}%,0)`);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, R, 0, 6.2832);
  ctx.fill();
  ctx.restore();
}

// Veld-tijd op de veld-klok (geklemde dt). Heel traag -> de compositie ligt zo goed
// als vast, maar dezelfde plek is later nét anders; niets herhaalt exact.
function fieldZ() { return paintClock * 0.0000005 * SPEED; }

// Voeg dit frame een paar nieuwe toetsen toe aan de blijvende laag. De PLEK is vrij
// (organische aangroei), maar KLEUR/VORM komt uit het echte veld op die plek × de
// echte tijd. De aangroei kruipt rond een langzaam dwalend zwaartepunt, met af en
// toe een vrije toets ergens anders -> lucht, en oude lagen die blijven doorschemeren.
function addStrokes(dtms) {
  const e = envEased || envelope();
  const z = fieldZ();

  // aangroei-snelheid: rustig; iets meer bij dag/wind, een zet extra bij geluid
  const perSec = mix(4, 11, 0.3 + sig('sun.alt') * 0.3 + sig('weather.wind') * 0.2)
               + sig('mic.level') * 22;
  strokeAcc += perSec * dtms / 1000;
  let n = Math.floor(strokeAcc);
  strokeAcc -= n;

  // zwaartepunt dwaalt langzaam (op de veld-klok) over het doek — bezoekt in een
  // kijksessie van tientallen minuten geleidelijk alle hoeken
  focusX = noise(11.3, z * 10) * width;
  focusY = noise(27.7, z * 10) * height;

  for (let i = 0; i < n; i++) {
    // meestal rond het zwaartepunt, soms vrij verspreid
    let cx, cy;
    if (random() < 0.72) {
      cx = randomGaussian(focusX, width * 0.24);
      cy = randomGaussian(focusY, height * 0.24);
    } else {
      cx = random(width); cy = random(height);
    }
    if (cx < 0 || cx > width || cy < 0 || cy > height) continue; // buiten beeld: overslaan
    const wx = cx + worldOX, wy = cy + worldOY; // wereldcoord (vast -> geen reis)

    const m = sharpen(noise(wx * e.scaleComp, wy * e.scaleComp, z), 3.6);
    const ridge = 1 - Math.abs(noise(wx * 0.0022, wy * 0.0022, z) - 0.5) * 2;
    const keep = (1 - e.structAmt) + e.structAmt * Math.pow(ridge, 2);
    const focus = 0.08 + 0.92 * Math.pow(m, 2.2);
    if (random() > keep * focus) continue;

    const ang = noise(wx * e.scaleFlow, wy * e.scaleFlow, z) * TWO_PI * e.turns + e.flowBias;
    const hz = noise(wx * e.scaleHue + 5, wy * e.scaleHue + 5, z);
    const h = (e.hueCenter + (hz - 0.5) * e.hueSpread + 360) % 360;
    const s = constrain(e.satBase * (0.35 + m * 0.9), 0, 100);
    const fine = (noise(wx * 0.004 + 20, wy * 0.004 + 20) - 0.5) * e.contrast;
    const l = constrain(e.lightCtr + (m - 0.5) * e.contrast * 1.4 + fine + e.moonLift * 5, 1, 98);
    const R = e.sizeBase * (0.5 + m * 1.4) * random(0.6, 1.5);

    dab(art, cx, cy, ang, R, e.aspect, h, s, l, e.alpha, 0.35);
    if (m > 0.62 && random() < 0.4) {           // scherp verzadigd hoogsel
      dab(art, cx + Math.cos(ang) * R * 0.3, cy + Math.sin(ang) * R * 0.3, ang,
          R * random(0.18, 0.42), e.aspect * 1.25, h,
          constrain(s + 18, 0, 100), constrain(l + random(10, 26), 0, 99),
          Math.min(0.55, e.alpha * 3.2), 0.78);
    } else if (m < 0.3 && random() < 0.22) {    // diep donker-accent
      dab(art, cx, cy, ang, R * random(0.35, 0.7), e.aspect, h,
          constrain(s * 0.55, 0, 100), constrain(l - random(8, 22), 1, 90), e.alpha * 1.5, 0.5);
    }
  }
}


// ── p5 lifecycle ───────────────────────────────────────────────────────────
let astro;
const mic = makeMic();
const weather = makeWeather();

// Verstrooi het opstartmoment (ms) naar een ver-uiteenliggende start-plek: 1 ms
// verschil -> heel ander stuk veld. Zo zijn instanties die vlak na elkaar openen
// tóch totaal verschillend (geen overlappend beeld). Echt (tijd), geen nep-random.
function hash32(n) {
  n = (n ^ 61) ^ (n >>> 16); n = (n + (n << 3)) | 0; n ^= n >>> 4;
  n = Math.imul(n, 0x27d4eb2d); n ^= n >>> 15; return n >>> 0;
}

// Lichte aanzet zodat het doek niet kaal begint: verdeeld over een paar zwaartepunten
// (anders één blob), met exact dezelfde regels als de live-aangroei (alleen toevoegen).
function seedInitial() {
  const per = Math.max(1, Math.round(width * height * 0.002 / 6));
  const save = paintClock;
  for (let k = 0; k < 6; k++) {
    paintClock = save + k * 900000; // ander zwaartepunt per batch (alleen voor de seed)
    strokeAcc += per;
    addStrokes(0);                  // dt=0: precies 'per' toetsen, zonder tijd-effect
  }
  paintClock = save;               // klok terug -> live begint gewoon bij nu
}

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  noiseSeed(0);                 // gedeeld, reproduceerbaar wereldveld ('het klopt')
  astro = makeAstro();
  registerSource(astro.sources);
  registerSource(mic.sources);
  registerSource(weather.sources);

  // Wereld-plek uit het ECHTE opstartmoment, ver verstrooid -> elke instantie een
  // heel ander stuk van het oneindige veld (geen random).
  startMs = Date.now();
  const s = startMs >>> 0;
  worldOX = hash32(s) % 3000000;
  worldOY = hash32(s ^ 0x9e3779b9) % 3000000;

  art = buildArt(null);         // grondlaag (enige keer dat er gevuld wordt)
  envEased = envelope();        // eerste enveloppe zetten
  seedInitial();                // lichte aanzet, zelfde regels als live
}
function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  art = buildArt(art);          // bestaande verf OVERnemen op nieuw formaat -> niets weg
}
function draw() {
  const dtms = Math.min(deltaTime, 100);   // dempt 1e frame / terug-uit-achtergrond
  clockMs = Date.now() - startMs;          // zon/seizoen/weer altijd op ECHTE tijd
  paintClock += dtms;                      // veld-klok op geklemde dt -> nooit een sprong
  envEased = easeEnv(envEased, envelope(), 0.05); // zacht na-ijlen -> geen harde kleursprong

  mic.update();
  addStrokes(dtms);             // ALLEEN toevoegen aan de blijvende laag
  image(art, 0, 0);            // toon de laag; niets wordt gewist of verschoven
}


// ── UI: mic-klik + signaal-overlay (d) ─────────────────────────────────────
const hintEl = document.getElementById('hint');
const hudEl = document.getElementById('hud');

window.addEventListener('pointerdown', async () => {
  const ok = await mic.enable();
  if (hintEl) hintEl.textContent = ok ? 'microfoon actief' : 'geen microfoon — doek draait door';
  setTimeout(() => hintEl && hintEl.classList.add('weg'), 1500);
});
window.addEventListener('keydown', (e) => { if (e.key === 'd') hudEl.classList.toggle('aan'); });

// Elke echte bron met z'n rustpunt (mid) en 'reach' = hoeveel van het beeld 'ie
// stuurt. nu-invloed = hoe ver van het rustpunt × reach -> zo zie je wat NU duwt.
const HUD_ROWS = [
  { key: 'weather.cloud',    reach: 1.0, mid: 0.5, drives: 'contrast·licht·kleur' },
  { key: 'weather.wind',     reach: 0.9, mid: 0.5, drives: 'richting·drukte·vorm' },
  { key: 'sun.alt',          reach: 0.9, mid: 0.5, drives: 'licht·kleur·energie' },
  { key: 'sun.day',          reach: 0.8, mid: 0.5, drives: 'kleurtemp·alpha' },
  { key: 'weather.pressure', reach: 0.6, mid: 0.5, drives: 'rust/compositie' },
  { key: 'weather.temp',     reach: 0.4, mid: 0.5, drives: 'warmte kleur' },
  { key: 'season',           reach: 0.5, mid: 0.5, drives: 'grootte·contrast' },
  { key: 'moon',             reach: 0.4, mid: 0.0, drives: 'palet·nacht' },
  { key: 'mic.level',        reach: 0.5, mid: 0.0, drives: 'energie·grootte' },
];
setInterval(() => {
  if (!hudEl.classList.contains('aan')) return;
  let head = 'signalen · gesorteerd op nu-invloed\n\n';
  if (astro) {
    const d = astro.vDate();
    const p2 = (x) => String(x).padStart(2, '0');
    head = `klok ${p2(d.getDate())}-${p2(d.getMonth() + 1)}-${d.getFullYear()} ${p2(d.getHours())}:${p2(d.getMinutes())}`
         + `  ·  gesorteerd op nu-invloed\n\n`;
  }
  const rows = HUD_ROWS.map((r) => {
    const v = sig(r.key);
    const activity = Math.abs(v - r.mid) / Math.max(r.mid, 1 - r.mid); // 0..1 vanaf rustpunt
    return { r, v, impact: r.reach * activity };
  }).sort((a, b) => b.impact - a.impact);
  const body = rows.map(({ r, v, impact }) => {
    const bar = '█'.repeat(Math.round(v * 10)).padEnd(10, '·');
    const n = Math.max(0, Math.min(3, Math.round(impact * 3)));
    const dots = '●'.repeat(n) + '·'.repeat(3 - n);
    return r.key.padEnd(16) + bar + ' ' + v.toFixed(2) + '  ' + dots + '  ' + r.drives;
  }).join('\n');
  hudEl.textContent = head + body + '\n\n●●● = duwt nu hard   ··· = rustig/neutraal';
}, 200);
</script>
</body>
</html>
