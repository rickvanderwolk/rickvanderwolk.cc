<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v20 — DOMAIN-WARP VELD. Richting: "je weet niet wat je ziet".
//
// Een ruisveld dat in ZICHZELF wordt teruggevouwen: de coordinaten van de ruis
// worden verschoven door een andere ruis, en die weer door een derde. Daaruit
// komen marmer-, rook-, hout-nerf-, en topografie-achtige structuren -- nergens
// een herkenbare vorm. Hoe sterk het terugvouwt, hoe groot de structuren zijn,
// en of er topografische CONTOURLIJNEN verschijnen, drift allemaal traag. Plus
// een traag driftend kleurpalet en bewegende reliëf-glans. Dus structuur EN
// kleur EN stijl zitten nooit vast. Klein berekend, hard uitvergroot -> Pi-ok.

const SPEED      = 2000;              // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;
const RELIEF     = 16;               // sterkte reliëf-belichting
const SHINE      = 22;
const GLOSS      = 0.6;
const LIGHT_SPD  = 0.6;
const BW_TARGET  = 150;
const TAU        = Math.PI * 2;

let buf, BW, BH, hueBase, V;

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  noiseDetail(4, 0.5);
  hueBase = random(1);
  buildBuffer();
}
function buildBuffer() {
  BW = BW_TARGET;
  BH = Math.max(2, Math.round(BW * windowHeight / windowWidth));
  buf = createGraphics(BW, BH);
  buf.pixelDensity(1);
  V = new Float32Array(BW * BH);
}
function windowResized() { resizeCanvas(windowWidth, windowHeight); buildBuffer(); }

const lerp1 = (a, b, t) => a + (b - a) * t;
const cosPal = (p, o) => {
  o[0] = (0.55 + 0.45 * Math.cos(TAU * (p + 0.00))) * 255;
  o[1] = (0.55 + 0.45 * Math.cos(TAU * (p + 0.33))) * 255;
  o[2] = (0.55 + 0.45 * Math.cos(TAU * (p + 0.66))) * 255;
};

function draw() {
  const t = millis() * TIME_SCALE;

  const scale = lerp1(0.006, 0.015, noise(11, t * 0.3));   // structuurgrootte drift
  const warp  = lerp1(0.6, 3.4, noise(23, t * 0.25));      // hoe sterk teruggevouwen
  const az    = t * 0.12;                                  // animatie door de 3e ruis-as
  const bands = lerp1(0, 6.5, noise(37, t * 0.3));         // 0 = glad, hoog = contourlijnen
  const hueShift = (hueBase + t * 0.05) % 1;

  // PASS 1 — domain-warped veld
  let lo = 1e9, hi = -1e9;
  for (let y = 0; y < BH; y++) for (let x = 0; x < BW; x++) {
    const sx = x * scale, sy = y * scale;
    const q = noise(sx, sy, az);
    const r = noise(sx + warp * q, sy + warp * q + 1.3, az);
    const v = noise(sx + warp * r + 2.7, sy + warp * r, az);
    V[y * BW + x] = v;
    if (v < lo) lo = v; if (v > hi) hi = v;
  }
  const span = (hi - lo) || 1;

  // belichting
  const la = t * LIGHT_SPD;
  let lx = Math.cos(la), ly = Math.sin(la), lz = 0.85;
  const ll = Math.hypot(lx, ly, lz); lx /= ll; ly /= ll; lz /= ll;
  let hx = lx, hy = ly, hz = lz + 1;
  const hl = Math.hypot(hx, hy, hz); hx /= hl; hy /= hl; hz /= hl;

  const col = [0, 0, 0];

  // PASS 2 — kleur + reliëf + (drijvende) contourlijnen
  buf.loadPixels();
  const d = buf.pixels;
  for (let y = 0; y < BH; y++) for (let x = 0; x < BW; x++) {
    const k  = y * BW + x;
    const xl = x > 0 ? k - 1 : k, xr = x < BW - 1 ? k + 1 : k;
    const yu = y > 0 ? k - BW : k, yd = y < BH - 1 ? k + BW : k;
    let nx = (V[xl] - V[xr]) * RELIEF;
    let ny = (V[yu] - V[yd]) * RELIEF;
    let nz = 1;
    const nl = Math.hypot(nx, ny, nz); nx /= nl; ny /= nl; nz /= nl;

    const vn = (V[k] - lo) / span;
    cosPal(hueShift + vn * 0.9, col);
    const diff = 0.4 + 0.6 * Math.max(0, nx * lx + ny * ly + nz * lz);
    let spec = nx * hx + ny * hy + nz * hz;
    spec = spec > 0 ? Math.pow(spec, SHINE) * GLOSS : 0;

    // topografische lijn: dunne donkere band op vaste hoogte-intervallen
    const fb = (vn * bands) % 1;
    const line = bands > 0.2 ? Math.pow(1 - 2 * Math.abs(fb - 0.5), 10) * 0.5 : 0;

    const j = 4 * k, add = 255 * spec;
    d[j]     = constrain(col[0] * diff * (1 - line) + add, 0, 255);
    d[j + 1] = constrain(col[1] * diff * (1 - line) + add, 0, 255);
    d[j + 2] = constrain(col[2] * diff * (1 - line) + add, 0, 255);
    d[j + 3] = 255;
  }
  buf.updatePixels();
  image(buf, 0, 0, width, height);
}
</script>
</body>
</html>
