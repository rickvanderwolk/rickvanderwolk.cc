<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 48%, rgba(0,0,0,0.32) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="p5.min.js"></script>
<script>
// doek v3 — een doek dat COMPLEET kan veranderen.
//
// v2 schilderde zichzelf, maar in één vaste stemming (alleen de tint draaide).
// v3 geeft élke eigenschap z'n eigen trage slinger met een eigen periode:
// kleurbreedte, verzadiging, licht/donker, contrast, streekgrootte, dichtheid,
// de turbulentie van het flow-field, de streek-vorm (stip <-> veeg) én een
// "structuur" die streken soms in aderen/netwerken laat samenklonteren.
// Daardoor ontstaan en verdwijnen er VORMEN/PATRONEN. Omdat al die periodes
// niet op elkaar "rijmen", reist het doek door totaal verschillende
// stemmingen en herhaalt het zich praktisch nooit. Een dunne atmosfeer-waas
// trekt bovendien het hele doek langzaam naar de actuele grondtoon, zodat ook
// licht/donker en kleur globaal kunnen kantelen.

// SPEED: standaard draait alles ZÉÉR traag — één doorgaande evolutie die er
// uren over doet om compleet anders te worden, en zichzelf nooit terugspoelt.
// Wil je de hele reis snel zien? Zet SPEED tijdelijk op bv. 300 en herlaad.
const SPEED      = 1;
const TIME_SCALE = 0.0000005 * SPEED;

let hueBase;

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30); // 30 fps: kalmer oppervlak + halve belasting (Pi-vriendelijk)
  colorMode(HSL, 360, 100, 100, 1);
  noStroke();
  hueBase = random(360);
  background(hueBase, 16, 40); // getinte ondergrond, daarna alleen nog streken
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(hueBase, 16, 40);
}

const lerp1 = (a, b, t) => a + (b - a) * t;

function draw() {
  const t = millis() * TIME_SCALE;

  // elke knop dwaalt traag en organisch (Perlin-drift van de tijd) — geen
  // sinus, dus het keert nooit periodiek terug; het blijft vooruit evolueren
  const drift = (k, seed) => noise(seed, t * k); // gladde 0..1 wandeling

  // de tint reist MONOTOON vooruit rond het wiel (~10 uur per ronde): nooit terug
  const hueCenter  = (hueBase + t * 20) % 360;
  const hueSpread  = lerp1(25, 200, drift(0.60, 11));  // monochroom <-> breed
  const satLevel   = lerp1(16, 68,  drift(0.70, 23));  // dof <-> fel
  const lightCtr   = lerp1(30, 64,  drift(0.45, 37));  // ingetogen licht/donker-band
  const contrast   = lerp1(8,  34,  drift(0.80, 51));  // vlak <-> dramatisch
  const strokeSz   = lerp1(0.7, 2.6, drift(0.60, 67)); // fijn <-> grof
  const density    = Math.round(lerp1(5, 14, drift(0.90, 83)));
  const flowTurns  = lerp1(1, 3.0, drift(0.40, 97));   // laminair <-> wervelend
  const flowFreq   = lerp1(0.0009, 0.0026, drift(0.35, 113));
  const aspect     = lerp1(1.0, 5.0, drift(0.75, 131)); // ronde stip <-> lange veeg
  const structAmt  = lerp1(0, 0.85, drift(0.50, 149));  // egaal <-> sterk gestructureerd
  const structFreq = lerp1(0.0007, 0.0045, drift(0.30, 167)); // grote vlakken <-> fijn netwerk

  // GEEN globale fill/waas: het hele doek verandert uitsluitend doordat verse
  // streken het oude beeld geleidelijk overschilderen — nooit in één keer.

  for (let i = 0; i < density; i++) {
    const x = random(width);
    const y = random(height);

    // STRUCTUUR: laat streken samenklonteren op de "ruggen" van een
    // langzaam veranderend veld. Veel structuur -> aderen/netwerken/marmer;
    // weinig structuur -> egale spreiding. De schaal drijft mee, dus
    // patronen ontstaan op verschillende groottes en lossen weer op.
    const ridge = 1 - Math.abs(noise(x * structFreq, y * structFreq, t * 0.04) - 0.5) * 2;
    const accept = (1 - structAmt) + structAmt * Math.pow(ridge, 3);
    if (random() > accept) continue; // streek valt buiten het patroon -> overslaan

    // richting uit het (langzaam wervelende) flow-field
    const a = noise(x * flowFreq, y * flowFreq, t * 0.08) * TWO_PI * flowTurns;

    // kleur: grote driftende zone bepaalt waar binnen de tint-breedte we zitten
    const zone = noise(x * 0.0012, y * 0.0012, t * 0.05); // 0..1
    const h = (hueCenter + (zone - 0.5) * hueSpread + 360) % 360;
    const s = constrain(satLevel + (noise(x * 0.002 + 10, y * 0.002 + 10) - 0.5) * 30, 0, 100);
    const lJit = (noise(x * 0.002 + 20, y * 0.002 + 20, t * 0.05) - 0.5) * contrast;
    const l = constrain(lightCtr + lJit, 2, 97);

    // streek-vorm: aspect rekt de streek uit (oppervlak blijft ongeveer
    // gelijk), van ronde stip tot lange veeg
    const sz  = strokeSz * random(10, 30);
    const len = sz * Math.sqrt(aspect);
    const wid = sz / Math.sqrt(aspect);

    push();
    translate(x, y);
    rotate(a);
    fill(h, s, l, 0.09);
    ellipse(0, 0, len, wid);
    // klein lichtaccent -> impasto
    fill(h, s, constrain(l + 14, 0, 98), 0.06);
    ellipse(len * 0.18, 0, wid * 0.9, wid * 0.7);
    pop();
  }
}
</script>
</body>
</html>
