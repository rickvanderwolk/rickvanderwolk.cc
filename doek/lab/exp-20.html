<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v21 — MORFEND MATERIAAL. Richting: "nooit twee keer dezelfde look".
//
// De zwerf-motor van v13/v15, maar alles wat de stijl bepaalt drift nu mee:
//   • ANISOTROOP: elk zaadpunt heeft een eigen, traag draaiende richting en
//     uitrekking -> de vormen zijn niet rond maar gestreept, gescheerd, vezelig.
//   • VORM drift: van zachte blobs (laag) naar harde facetten (hoog).
//   • MATERIAAL drift: van vol-gekleurde glans naar iriserend parelmoer en
//     terug.
//   • KLEUR drift: de hele familie draait rond.
// Daardoor weet je nooit precies wat je ziet, en het zit nooit vast -- maar
// alles beweegt continu, dus puur gradueel. Klein berekend -> Pi-vriendelijk.

const SPEED      = 2000;              // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;
const N_SITE     = 14;
const SPREAD     = 1.8;
const RELIEF     = 2.4;
const SHINE      = 28;
const GLOSS      = 0.85;
const LIGHT_SPD  = 0.6;
const BANDS      = 3.0;              // regenboog-omwentelingen in de iriserende stand
const BW_TARGET  = 150;
const TAU        = Math.PI * 2;

let buf, BW, BH, hueBase, sites, H;

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  colorMode(HSL, 360, 100, 100, 1);
  hueBase = random(360);
  buildBuffer();
  sites = [];
  for (let i = 0; i < N_SITE; i++) {
    sites.push({ sx: random(1000), sy: random(1000),
      rx: random(0.18, 0.5), ry: random(0.18, 0.5),
      sHue: random(1000), sLum: random(1000),
      sTh: random(1000), sAsp: random(1000),
      hueOff: (random() - 0.5) * 84 });
  }
}
function buildBuffer() {
  BW = BW_TARGET;
  BH = Math.max(2, Math.round(BW * windowHeight / windowWidth));
  buf = createGraphics(BW, BH);
  buf.colorMode(HSL, 360, 100, 100, 1);
  buf.pixelDensity(1);
  H = new Float32Array(BW * BH);
}
function windowResized() { resizeCanvas(windowWidth, windowHeight); buildBuffer(); }

const lerp1 = (a, b, t) => a + (b - a) * t;
const roam  = (n, span) => constrain((n - 0.5) * SPREAD + 0.5, 0, 1) * span;
const cosPal = (p, o) => {
  o[0] = (0.55 + 0.45 * Math.cos(TAU * (p + 0.00))) * 255;
  o[1] = (0.55 + 0.45 * Math.cos(TAU * (p + 0.33))) * 255;
  o[2] = (0.55 + 0.45 * Math.cos(TAU * (p + 0.66))) * 255;
};

function draw() {
  const t = millis() * TIME_SCALE;
  const hueCenter = (hueBase + t * 22) % 360;

  // driftende stijl-knoppen
  const sharp   = lerp1(1.3, 6.0, noise(101, t * 0.3));   // blob <-> facet
  const hp      = sharp * 0.5;
  const iridMix = noise(131, t * 0.25);                   // vol-kleur <-> iriserend
  const hueShift = (hueBase / 360 + t * 0.05) % 1;

  // per zaadpunt: positie, kleur, oriëntatie + uitrekking
  const px = new Array(N_SITE), py = new Array(N_SITE);
  const sr = new Array(N_SITE), sg = new Array(N_SITE), sb = new Array(N_SITE);
  const ct = new Array(N_SITE), st = new Array(N_SITE), asp = new Array(N_SITE);
  for (let i = 0; i < N_SITE; i++) {
    const s = sites[i];
    px[i] = roam(noise(s.sx, t * s.rx), BW);
    py[i] = roam(noise(s.sy, t * s.ry), BH);
    const h   = (hueCenter + s.hueOff + (noise(s.sHue, t * 0.5) - 0.5) * 30 + 360) % 360;
    const sat = lerp1(50, 88, noise(s.sHue + 5, t * 0.4));
    const lum = lerp1(42, 58, noise(s.sLum, t * 0.45));
    const c = color(h, sat, lum, 1);
    sr[i] = red(c); sg[i] = green(c); sb[i] = blue(c);
    const th = noise(s.sTh, t * 0.3) * TAU;
    ct[i] = Math.cos(th); st[i] = Math.sin(th);
    asp[i] = lerp1(0.35, 2.8, noise(s.sAsp, t * 0.3));     // uitrekking (anisotroop)
  }

  // PASS 1 — anisotroop gewogen kleur + hoogteveld
  buf.loadPixels();
  const d = buf.pixels;
  for (let y = 0; y < BH; y++) for (let x = 0; x < BW; x++) {
    let r = 0, g = 0, b = 0, wsum = 0, pot = 0;
    for (let i = 0; i < N_SITE; i++) {
      const dx = x - px[i], dy = y - py[i];
      const dxr =  dx * ct[i] + dy * st[i];     // roteer naar de as van het zaadpunt
      const dyr = -dx * st[i] + dy * ct[i];
      const ax = dxr / asp[i], ay = dyr * asp[i];
      const d2 = ax * ax + ay * ay + 1;          // uitgerekte afstand -> niet-ronde vormen
      const w  = 1 / Math.pow(d2, hp);
      r += sr[i] * w; g += sg[i] * w; b += sb[i] * w; wsum += w;
      pot += 1 / (1 + d2 / (BW * 0.6));
    }
    const k = y * BW + x;
    H[k] = pot;
    const j = 4 * k;
    d[j] = r / wsum; d[j + 1] = g / wsum; d[j + 2] = b / wsum; d[j + 3] = 255;
  }

  // belichting
  const la = t * LIGHT_SPD;
  let lx = Math.cos(la), ly = Math.sin(la), lz = 0.85;
  const ll = Math.hypot(lx, ly, lz); lx /= ll; ly /= ll; lz /= ll;
  let hx = lx, hy = ly, hz = lz + 1;
  const hl = Math.hypot(hx, hy, hz); hx /= hl; hy /= hl; hz /= hl;
  const irc = [0, 0, 0];

  // PASS 2 — reliëf-glans + driftende iriserende laag
  for (let y = 0; y < BH; y++) for (let x = 0; x < BW; x++) {
    const k  = y * BW + x;
    const xl = x > 0 ? k - 1 : k, xr = x < BW - 1 ? k + 1 : k;
    const yu = y > 0 ? k - BW : k, yd = y < BH - 1 ? k + BW : k;
    let nx = (H[xl] - H[xr]) * RELIEF;
    let ny = (H[yu] - H[yd]) * RELIEF;
    let nz = 1;
    const nl = Math.hypot(nx, ny, nz); nx /= nl; ny /= nl; nz /= nl;

    const diff = 0.4 + 0.6 * Math.max(0, nx * lx + ny * ly + nz * lz);
    let spec = nx * hx + ny * hy + nz * hz;
    spec = spec > 0 ? Math.pow(spec, SHINE) * GLOSS : 0;

    const fres = Math.pow(1 - nz, 1.6);
    cosPal(hueShift + fres * BANDS, irc);
    const im = iridMix * (0.25 + 0.75 * fres);

    const j = 4 * k, add = 255 * spec;
    // meng vol-gekleurde body met de iriserende laag volgens iridMix
    d[j]     = constrain(lerp1(d[j],     irc[0], im) * diff + add, 0, 255);
    d[j + 1] = constrain(lerp1(d[j + 1], irc[1], im) * diff + add, 0, 255);
    d[j + 2] = constrain(lerp1(d[j + 2], irc[2], im) * diff + add, 0, 255);
  }
  buf.updatePixels();
  image(buf, 0, 0, width, height);
}
</script>
</body>
</html>
