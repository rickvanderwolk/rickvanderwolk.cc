<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v23 — MOIRE-VELD. Som van bewegende radiale en lineaire sinusbronnen.
// De gecombineerde golf gaat door een schuivend palet -> rimpelende moiré-
// interferentie die ademt en verschuift. Per pixel op een klein buffertje.
const SPEED = 2000; // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;

let buf, bw, bh;

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  buildBuffer();
}

function buildBuffer() {
  bw = 150;
  bh = Math.max(1, Math.round(bw * windowHeight / windowWidth));
  buf = createGraphics(bw, bh);
  buf.pixelDensity(1);
}

function draw() {
  const t = millis() * TIME_SCALE;

  // bewegende bronnen (radiaal + lineair)
  const s1x = bw * (0.5 + 0.35 * Math.sin(t * 0.7));
  const s1y = bh * (0.5 + 0.35 * Math.cos(t * 0.5));
  const s2x = bw * (0.5 + 0.4 * Math.cos(t * 0.4));
  const s2y = bh * (0.5 + 0.4 * Math.sin(t * 0.9));
  const linA = t * 1.3;
  const linB = t * 0.8;

  const hueBase = (t * 30) % 360;

  buf.loadPixels();
  const px = buf.pixels;
  for (let y = 0; y < bh; y++) {
    for (let x = 0; x < bw; x++) {
      const d1 = Math.hypot(x - s1x, y - s1y);
      const d2 = Math.hypot(x - s2x, y - s2y);
      let v = 0;
      v += Math.sin(d1 * 0.45 - t * 2.0);
      v += Math.sin(d2 * 0.38 + t * 1.6);
      v += Math.sin(x * 0.22 * Math.cos(linA) + y * 0.22 * Math.sin(linA) - t * 1.1);
      v += Math.sin(x * 0.18 * Math.cos(linB) - y * 0.18 * Math.sin(linB) + t * 0.9);
      // v in ~[-4,4] -> [0,1]
      const n = (v + 4) / 8;

      const hue = (hueBase + n * 140) % 360;
      const sat = 55 + 35 * n;
      const bri = 25 + 70 * (0.5 + 0.5 * Math.sin(v * 1.4 + t));

      const c = hsbToRgb(hue, sat, bri);
      const idx = (y * bw + x) * 4;
      px[idx] = c[0];
      px[idx + 1] = c[1];
      px[idx + 2] = c[2];
      px[idx + 3] = 255;
    }
  }
  buf.updatePixels();
  image(buf, 0, 0, width, height);
}

function hsbToRgb(h, s, b) {
  h = ((h % 360) + 360) % 360;
  s /= 100; b /= 100;
  const c = b * s;
  const xv = c * (1 - Math.abs(((h / 60) % 2) - 1));
  const m = b - c;
  let r = 0, g = 0, bl = 0;
  if (h < 60) { r = c; g = xv; }
  else if (h < 120) { r = xv; g = c; }
  else if (h < 180) { g = c; bl = xv; }
  else if (h < 240) { g = xv; bl = c; }
  else if (h < 300) { r = xv; bl = c; }
  else { r = c; bl = xv; }
  return [(r + m) * 255, (g + m) * 255, (bl + m) * 255];
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  buildBuffer();
}
</script>
</body>
</html>
