<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v24 — ATTRACTOR-STOF. Een Clifford-attractor waarvan a,b,c,d heel traag
// via noise driften, zodat de fijne stofstructuur continu vervormt. Elk frame
// worden punten opgeteld op een langzaam vervagend doek; subtiele tint-drift.
const SPEED = 2000; // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;

const PTS = 1400; // punten per frame
let x = 0.1, y = 0.1;

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  colorMode(HSB, 360, 100, 100, 1);
  background(0);
}

function draw() {
  const t = millis() * TIME_SCALE;

  // langzaam vervagend doek
  noStroke();
  fill(0, 0, 0, 0.018);
  rect(0, 0, width, height);

  // traag driftende Clifford-parameters
  const a = -1.4 + 1.8 * (noise(t * 0.3, 11.1) - 0.5) * 2 * 0.7;
  const b = 1.6 + 1.6 * (noise(t * 0.27, 22.2) - 0.5) * 2 * 0.6;
  const c = 1.0 + 1.4 * (noise(t * 0.33, 33.3) - 0.5) * 2 * 0.6;
  const d = 0.7 + 1.4 * (noise(t * 0.29, 44.4) - 0.5) * 2 * 0.6;

  const scale = Math.min(width, height) * 0.27;
  const cx = width / 2, cy = height / 2;
  const hueBase = (t * 35) % 360;

  blendMode(ADD);
  for (let i = 0; i < PTS; i++) {
    const nx = Math.sin(a * y) + c * Math.cos(a * x);
    const ny = Math.sin(b * x) + d * Math.cos(b * y);
    x = nx; y = ny;

    const sx = cx + x * scale;
    const sy = cy + y * scale;

    const h = (hueBase + (x + y) * 18 + i * 0.02) % 360;
    fill((h + 360) % 360, 60, 60, 0.06);
    circle(sx, sy, 1.1);
  }
  blendMode(BLEND);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(0);
}
</script>
</body>
</html>
