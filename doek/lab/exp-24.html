<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v25 — PLASMA / LAVALAMP. Gladde plasma uit opgetelde bewegende sinussen
// plus noise, door een rijk schuivend palet -> een warm stromend kleurveld dat
// traag van mood verandert. Klein buffertje per pixel, opgeschaald.
const SPEED = 2000; // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;

let buf, bw, bh;

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  buildBuffer();
}

function buildBuffer() {
  bw = 150;
  bh = Math.max(1, Math.round(bw * windowHeight / windowWidth));
  buf = createGraphics(bw, bh);
  buf.pixelDensity(1);
}

function draw() {
  const t = millis() * TIME_SCALE;
  const hueBase = (t * 25) % 360;
  const hueSpan = 90 + 50 * Math.sin(t * 0.3);
  const nz = t * 0.5;

  buf.loadPixels();
  const px = buf.pixels;
  for (let y = 0; y < bh; y++) {
    const fy = y / bh;
    for (let x = 0; x < bw; x++) {
      const fx = x / bw;
      let v = 0;
      v += Math.sin(fx * 8.0 + t * 2.0);
      v += Math.sin((fy * 7.0 + t * 1.3));
      v += Math.sin((fx * 5.0 + fy * 5.0 + t * 1.7));
      const cx = fx + 0.5 * Math.sin(t * 0.5);
      const cy = fy + 0.5 * Math.cos(t * 0.6);
      v += Math.sin(Math.hypot(cx, cy) * 9.0 - t * 1.9);
      v += 2.0 * (noise(fx * 2.5, fy * 2.5, nz) - 0.5) * 2.0;
      // v in ~[-6,6]
      const n = (v + 6) / 12;

      const hue = (hueBase + n * hueSpan) % 360;
      const sat = 70 + 25 * Math.sin(v * 1.1 + t);
      const bri = 30 + 65 * (0.5 + 0.5 * Math.sin(v * 1.3 + t * 0.7));

      const c = hsbToRgb(hue, sat, bri);
      const idx = (y * bw + x) * 4;
      px[idx] = c[0];
      px[idx + 1] = c[1];
      px[idx + 2] = c[2];
      px[idx + 3] = 255;
    }
  }
  buf.updatePixels();
  image(buf, 0, 0, width, height);
}

function hsbToRgb(h, s, b) {
  h = ((h % 360) + 360) % 360;
  s /= 100; b /= 100;
  const c = b * s;
  const xv = c * (1 - Math.abs(((h / 60) % 2) - 1));
  const m = b - c;
  let r = 0, g = 0, bl = 0;
  if (h < 60) { r = c; g = xv; }
  else if (h < 120) { r = xv; g = c; }
  else if (h < 180) { g = c; bl = xv; }
  else if (h < 240) { g = xv; bl = c; }
  else if (h < 300) { r = xv; bl = c; }
  else { r = c; bl = xv; }
  return [(r + m) * 255, (g + m) * 255, (bl + m) * 255];
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  buildBuffer();
}
</script>
</body>
</html>
