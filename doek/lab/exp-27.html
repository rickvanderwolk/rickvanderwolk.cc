<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v28 — MANDALA. Een traag drijvend ruisveld wordt in radiale symmetrie
// gespiegeld (wedges). Daaruit groeit een eindeloos vervormende symmetrische
// mandala. Kleuren schuiven mee. Hypnotisch en zacht.

const SPEED = 2000;        // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;

let buf;
let BW, BH;
let WEDGES = 8;            // aantal spiegelsegmenten
let palT = 0;

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  buildBuf();
}

function buildBuf() {
  BW = 150;
  BH = max(60, round(BW * (windowHeight / windowWidth)));
  buf = createGraphics(BW, BH);
  buf.pixelDensity(1);
  buf.noStroke();
}

function draw() {
  let t = millis() * TIME_SCALE;
  palT += 0.0006 * (0.2 + SPEED * 0.0004);

  let cx = BW / 2, cy = BH / 2;
  let segAng = TWO_PI / WEDGES;
  let nScale = 0.9;
  let swirl = t * 0.5;
  let zEvolve = t * 0.4 + 10;
  let hueBase = (palT * 60) % 360;

  buf.loadPixels();
  let d = buf.pixels;
  let maxR = Math.sqrt(cx * cx + cy * cy);

  for (let y = 0; y < BH; y++) {
    for (let x = 0; x < BW; x++) {
      let dx = x - cx, dy = y - cy;
      let r = Math.sqrt(dx * dx + dy * dy);
      let a = Math.atan2(dy, dx) + swirl * 0.2;

      // vouw de hoek in een wig en spiegel -> radiale symmetrie
      let am = ((a % segAng) + segAng) % segAng;
      if (am > segAng / 2) am = segAng - am;

      // bemonster ruis in gevouwen poolcoordinaten
      let rn = r / maxR;
      let sx = Math.cos(am) * rn * nScale + Math.sin(swirl) * 0.3;
      let sy = Math.sin(am) * rn * nScale + Math.cos(swirl) * 0.3;

      let v = noise(sx * 2.4 + 5, sy * 2.4 + 5, zEvolve);
      let v2 = noise(sx * 5.0 - 3, sy * 5.0 - 3, zEvolve * 1.3 + 2);
      let val = (v * 0.65 + v2 * 0.35);

      // radiale ringen-modulatie voor mandala-ritme
      let ring = 0.5 + 0.5 * Math.sin(rn * 14 - t * 1.2 + val * 6);
      val = val * 0.7 + ring * 0.3;

      let h = (hueBase + val * 140 + rn * 40) * Math.PI / 180;
      let lum = 0.06 + val * val * 0.85;
      let sat = 0.5;
      let rr = lum + sat * lum * Math.cos(h);
      let gg = lum + sat * lum * Math.cos(h - 2.094);
      let bb = lum + sat * lum * Math.cos(h + 2.094);

      let idx = 4 * (y * BW + x);
      d[idx] = constrain(rr * 255, 0, 255);
      d[idx + 1] = constrain(gg * 255, 0, 255);
      d[idx + 2] = constrain(bb * 255, 0, 255);
      d[idx + 3] = 255;
    }
  }
  buf.updatePixels();

  image(buf, 0, 0, width, height);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  buildBuf();
}
</script>
</body>
</html>
