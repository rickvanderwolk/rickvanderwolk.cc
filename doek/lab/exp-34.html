<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v35 — FERROFLUID-PIEKEN. Een zwarte magnetische vloeistof die een veld
// van pieken/cellen vormt; een hoogteveld uit driftende noise wordt per pixel
// belicht voor scherpe natte glanspunten, traag pulserend en herschikkend
// alsof een magneet eronder beweegt.
const SPEED = 2000; // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;

let buf;
const BW = 150;
let BH;

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  BH = Math.max(1, Math.round(BW * height / width));
  buf = createGraphics(BW, BH);
  buf.pixelDensity(1);
}

// hoogteveld: bobbelig veld van pieken via gestapelde noise
function heightAt(x, y, t, mx, my) {
  // afstand tot bewegende "magneet" versterkt pieken lokaal
  const cellScale = 0.16;
  let h = noise(x * cellScale + t * 0.5, y * cellScale - t * 0.3) * 1.0;
  h += noise(x * cellScale * 2.3 - t * 0.4, y * cellScale * 2.3 + t * 0.6) * 0.5;
  // piekverscherping
  h = Math.pow(h / 1.5, 2.2);
  const md = Math.hypot(x - mx, y - my);
  const pull = Math.exp(-md * md / 900);
  return h * (0.6 + 0.9 * pull);
}

function draw() {
  const t = millis() * TIME_SCALE;
  const baseT = millis() * 0.0001;

  // bewegende magneet (kalme constante baan + trage drift)
  const mx = BW * 0.5 + Math.cos(baseT * 30 + t) * BW * 0.3;
  const my = BH * 0.5 + Math.sin(baseT * 22 + t * 1.3) * BH * 0.3;

  // traag driftende metallic tint (koel staal -> warm brons)
  const tintR = 1.0 + 0.25 * Math.sin(t * 0.5);
  const tintG = 1.0 + 0.10 * Math.sin(t * 0.5 + 1.2);
  const tintB = 1.0 - 0.15 * Math.sin(t * 0.5);

  buf.loadPixels();
  for (let y = 0; y < BH; y++) {
    for (let x = 0; x < BW; x++) {
      const hL = heightAt(x - 1, y, t, mx, my);
      const hR = heightAt(x + 1, y, t, mx, my);
      const hU = heightAt(x, y - 1, t, mx, my);
      const hD = heightAt(x, y + 1, t, mx, my);
      const hC = heightAt(x, y, t, mx, my);

      // normaal uit gradient
      const nx = (hL - hR) * 4.0;
      const ny = (hU - hD) * 4.0;
      const nz = 1.0;
      const len = Math.sqrt(nx * nx + ny * ny + nz * nz);
      const Nx = nx / len, Ny = ny / len, Nz = nz / len;

      // lichtrichting
      const Lx = -0.4, Ly = -0.55, Lz = 0.73;
      let diff = Nx * Lx + Ny * Ly + Nz * Lz;
      diff = Math.max(0, diff);

      // spiegelende glans (natte look)
      const Hx = Lx, Hy = Ly, Hz = Lz + 1;
      const hl = Math.sqrt(Hx * Hx + Hy * Hy + Hz * Hz);
      let spec = (Nx * Hx + Ny * Hy + Nz * Hz) / hl;
      spec = Math.pow(Math.max(0, spec), 28) * (0.4 + hC);

      // donkere ondergrond, ferrofluid is bijna zwart
      let r = 6 + diff * 60 * hC + spec * 230 * tintR;
      let g = 7 + diff * 62 * hC + spec * 230 * tintG;
      let b = 9 + diff * 70 * hC + spec * 230 * tintB;
      r = Math.min(255, r); g = Math.min(255, g); b = Math.min(255, b);

      const idx = 4 * (x + y * BW);
      buf.pixels[idx] = r;
      buf.pixels[idx + 1] = g;
      buf.pixels[idx + 2] = b;
      buf.pixels[idx + 3] = 255;
    }
  }
  buf.updatePixels();

  noSmooth();
  image(buf, 0, 0, width, height);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  BH = Math.max(1, Math.round(BW * height / width));
  buf = createGraphics(BW, BH);
  buf.pixelDensity(1);
}
</script>
</body>
</html>
