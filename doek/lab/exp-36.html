<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v37 — LOW-POLY MESH. Een rooster van punten dat traag door noise wordt
// verschoven en in driehoeken wordt verdeeld; elke driehoek wordt vlak
// ingekleurd met een langzaam driftende kleur. De vertices bewegen zacht,
// zodat het gefacetteerde oppervlak eindeloos rimpelt.
const SPEED = 2000; // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;

const COLS = 16;
const ROWS = 10;
let pts = [];

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  colorMode(HSB, 360, 100, 100, 1);
  noStroke();
  buildGrid();
}

function buildGrid() {
  pts = [];
  for (let r = 0; r <= ROWS; r++) {
    const row = [];
    for (let c = 0; c <= COLS; c++) {
      row.push({ gx: c / COLS, gy: r / ROWS, ph: random(1000) });
    }
    pts.push(row);
  }
}

function vertex2(c, r, t) {
  const p = pts[r][c];
  // basispositie met overscan zodat randen gevuld blijven
  let bx = p.gx * (width + 80) - 40;
  let by = p.gy * (height + 80) - 40;
  // interieurpunten jitteren; randen iets minder zodat scherm vol blijft
  const edge = (c === 0 || c === COLS || r === 0 || r === ROWS) ? 0.35 : 1.0;
  const amp = Math.min(width, height) * 0.05 * edge;
  const nx = noise(p.gx * 2 + t * 0.6, p.gy * 2, p.ph) - 0.5;
  const ny = noise(p.gx * 2 + 9, p.gy * 2 + t * 0.6, p.ph) - 0.5;
  return { x: bx + nx * 2 * amp, y: by + ny * 2 * amp, p };
}

function draw() {
  const t = millis() * TIME_SCALE;
  background(0);

  const hueBase = (t * 30) % 360;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const a = vertex2(c, r, t);
      const b = vertex2(c + 1, r, t);
      const d = vertex2(c, r + 1, t);
      const e = vertex2(c + 1, r + 1, t);

      // kleur per cel uit traag driftende noise
      const ce = (c + 0.5) / COLS, re = (r + 0.5) / ROWS;
      const n = noise(ce * 2.5 + t * 0.5, re * 2.5 - t * 0.3);
      const hue = (hueBase + n * 120) % 360;
      const sat = 35 + n * 30;

      // twee driehoeken, lichte helderheidsvariatie voor facet-look
      fill(hue, sat, 45 + n * 25);
      triangle(a.x, a.y, b.x, b.y, d.x, d.y);
      fill((hue + 8) % 360, sat, 38 + n * 22);
      triangle(b.x, b.y, e.x, e.y, d.x, d.y);
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
