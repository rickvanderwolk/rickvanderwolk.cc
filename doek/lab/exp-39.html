<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v40 — HORIZON THAT MORPHS.
// Een horizon die via driftende noise morft tussen bergen, duinen, kalme zee
// en wolkenbanken, terwijl de lucht door de tijden van de dag cyclet.

const SPEED = 2000; // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;

let buf;
let BW, BH;

function buildBuffer() {
  BW = 150;
  BH = Math.max(40, Math.round(BW * windowHeight / windowWidth));
  buf = createImage(BW, BH);
}

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  noSmooth();
  buildBuffer();
}

// lucht-kleur per dagcyclus, geinterpoleerd over keystops
function skyColour(daylight, frac) {
  // daylight: 0..1 cyclus; frac: 0=horizon 1=top
  // keystops: nacht, dageraad, dag, schemer
  let stops = [
    [10, 14, 30, 60, 70, 110],     // nacht: [hor r,g,b , top r,g,b]
    [230, 130, 90, 120, 90, 150],  // dageraad/zonsopkomst
    [150, 200, 240, 60, 110, 200], // dag
    [240, 120, 70, 70, 50, 120]    // schemer
  ];
  let p = daylight * 4;
  let i0 = Math.floor(p) % 4;
  let i1 = (i0 + 1) % 4;
  let f = p - Math.floor(p);
  let a = stops[i0], b = stops[i1];
  let hor = [];
  let top = [];
  for (let k = 0; k < 3; k++) {
    hor[k] = a[k] + (b[k] - a[k]) * f;
    top[k] = a[k + 3] + (b[k + 3] - a[k + 3]) * f;
  }
  let r = hor[0] + (top[0] - hor[0]) * frac;
  let g = hor[1] + (top[1] - hor[1]) * frac;
  let bl = hor[2] + (top[2] - hor[2]) * frac;
  return [r, g, bl];
}

function draw() {
  let t = millis() * TIME_SCALE;
  let daylight = (t * 0.5) % 1;            // tijd van de dag
  let morph = t * 0.25;                    // morf-fase van het silhouet
  // hoe ruig vs vlak: bergen<->zee
  let ruggedness = 0.5 + 0.5 * Math.sin(morph * 1.3);

  buf.loadPixels();

  for (let x = 0; x < BW; x++) {
    // horizon hoogte als som van octaven, gewogen door ruggedness
    let nx = x / BW;
    let big = noise(nx * 1.2 + 10, morph);
    let mid = noise(nx * 3.5 + 20, morph * 1.1);
    let fine = noise(nx * 9.0 + 30, morph * 1.4);
    let silhouette = 0.5 + (big - 0.5) * 0.55
      + (mid - 0.5) * 0.35 * ruggedness
      + (fine - 0.5) * 0.18 * ruggedness;
    // horizon rond midden-onder
    let hY = BH * (0.5 + 0.18 * silhouette);
    let hRow = Math.floor(hY);

    for (let y = 0; y < BH; y++) {
      let p = (y * BW + x) * 4;
      let r, g, b;
      if (y < hRow) {
        // lucht
        let frac = 1 - y / hRow;
        let c = skyColour(daylight, frac);
        r = c[0]; g = c[1]; b = c[2];
        // zachte wolkenbanken
        let cloud = noise(nx * 2.5, y * 0.04, morph * 0.8 + 50);
        let cl = Math.max(0, cloud - 0.55) * 1.8;
        r += cl * 40; g += cl * 40; b += cl * 45;
      } else {
        // land/zee onder de horizon, donkerder met diepte
        let depth = (y - hRow) / Math.max(1, BH - hRow);
        let c = skyColour(daylight, 0);
        // grond als gedempte, donkere variant van horizonkleur
        let shade = 0.45 - 0.3 * depth;
        r = c[0] * shade * 0.7 + 8;
        g = c[1] * shade * 0.8 + 10;
        b = c[2] * shade * 0.9 + 14;
        // textuur (golfjes / hellingen)
        let tex = noise(nx * 6.0, depth * 4.0 + morph);
        let lift = (tex - 0.5) * 30 * (0.4 + ruggedness * 0.6);
        r += lift; g += lift; b += lift;
      }
      buf.pixels[p] = Math.max(0, Math.min(255, r));
      buf.pixels[p + 1] = Math.max(0, Math.min(255, g));
      buf.pixels[p + 2] = Math.max(0, Math.min(255, b));
      buf.pixels[p + 3] = 255;
    }
  }

  buf.updatePixels();
  image(buf, 0, 0, width, height);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  buildBuffer();
}
</script>
</body>
</html>
