<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v48 — GEHEUGEN.
// Fragmenten die opkomen en oplossen: zachte vage vlekken die bijna iets
// worden en dan vervagen, flikkeringen van halve beelden. Een veld dat
// herinnert en vergeet. Wazig, nostalgisch, ontkleurd met soms warme flares.

const SPEED = 2000; // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;

let buf;
let BW, BH;
const NFRAG = 7;
let frags = [];

function makeFrag() {
  return {
    x: random(1), y: random(1),
    sz: random(0.12, 0.34),
    phase: random(1000),
    rate: random(0.004, 0.011),  // hoe snel deze herinnering komt/gaat
    hue: random(1),              // 0 = koel grijsblauw, 1 = warme flare
    nseed: random(100)
  };
}

function buildBuffer() {
  BW = 150;
  BH = Math.max(40, Math.round(BW * windowHeight / windowWidth));
  buf = createImage(BW, BH);
  frags = [];
  for (let i = 0; i < NFRAG; i++) frags.push(makeFrag());
}

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  noSmooth();
  buildBuffer();
}

function draw() {
  let t = millis() * TIME_SCALE;
  let flow = frameCount * 0.006; // kalme drift van de waas

  // werk fragmenten bij: levenscyclus van opkomen -> bijna helder -> vergeten
  for (let f of frags) {
    f.phase += f.rate;
    // als een herinnering volledig vervaagd is, vervangen door een nieuwe
    let amp = Math.sin(f.phase);
    if (amp < -0.999) {
      let keepRate = f.rate;
      Object.assign(f, makeFrag());
      f.rate = keepRate * random(0.7, 1.3);
    }
  }

  buf.loadPixels();
  for (let y = 0; y < BH; y++) {
    let ny = y / BH;
    for (let x = 0; x < BW; x++) {
      let nx = x / BW;

      // ontkleurde, hazige basis: bijna stille grijze mist
      let mist = noise(nx * 2.0 + flow, ny * 2.0, t * 0.2);
      let base = 26 + 26 * mist;
      let r = base, g = base + 2, b = base + 8;

      // sommeer de fragmenten: zachte vlekken die bijna samenhangen
      for (let f of frags) {
        let pres = 0.5 + 0.5 * Math.sin(f.phase); // aanwezigheid 0..1
        if (pres < 0.02) continue;
        let dx = (nx - f.x);
        let dy = (ny - f.y);
        let d2 = (dx * dx + dy * dy) / (f.sz * f.sz);
        let blob = Math.exp(-d2 * 2.2);
        if (blob < 0.004) continue;
        // halve beelden: textuur die soms even leesbaar lijkt
        let img = noise(nx * 6.0 + f.nseed, ny * 6.0 + f.nseed, f.phase * 0.5);
        // flikkering: de herinnering hapert
        let flick = 0.7 + 0.3 * Math.sin(f.phase * 9.0 + f.nseed);
        let amt = blob * pres * (0.45 + 0.55 * img) * flick;

        // warme flares vs koel grijsblauw
        let warm = f.hue;
        r += amt * (60 + 90 * warm);
        g += amt * (55 + 50 * warm);
        b += amt * (62 + 10 * warm);
      }

      // lichte korrel/ruis voor nostalgisch filmgevoel
      let grain = (noise(nx * 30.0, ny * 30.0, frameCount * 0.05) - 0.5) * 10;
      r += grain; g += grain; b += grain;

      let p = (y * BW + x) * 4;
      buf.pixels[p] = Math.max(0, Math.min(255, r));
      buf.pixels[p + 1] = Math.max(0, Math.min(255, g));
      buf.pixels[p + 2] = Math.max(0, Math.min(255, b));
      buf.pixels[p + 3] = 255;
    }
  }
  buf.updatePixels();
  image(buf, 0, 0, width, height);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  buildBuffer();
}
</script>
</body>
</html>
