<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v49 — ROUW.
// Een traag, zwaar veld, grotendeels diep blauw-zwart, met een gewicht dat
// neerdaalt. Zeldzame vage lichten rijzen en zinken weer. Stil, weids,
// ingehouden. Bijna roerloos, maar nooit bevroren.

const SPEED = 2000; // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;

let buf;
let BW, BH;
const NLIGHT = 4;
let lights = [];

function makeLight() {
  return {
    x: random(0.1, 0.9),
    phase: random(1000),
    rate: random(0.0025, 0.006), // heel traag opkomen en zinken
    sz: random(0.10, 0.22),
    peakY: random(0.2, 0.55),    // hoe hoog dit licht rijst
    warm: random(0, 0.4)         // meestal koud, soms iets warmer
  };
}

function buildBuffer() {
  BW = 150;
  BH = Math.max(40, Math.round(BW * windowHeight / windowWidth));
  buf = createImage(BW, BH);
  lights = [];
  for (let i = 0; i < NLIGHT; i++) lights.push(makeLight());
}

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  noSmooth();
  buildBuffer();
}

function draw() {
  let t = millis() * TIME_SCALE;
  let flow = frameCount * 0.0025; // bijna roerloze drift

  // lichten rijzen en zinken; vervang voltooide cycli zacht
  for (let l of lights) {
    l.phase += l.rate;
    let a = Math.sin(l.phase);
    if (a < -0.999) {
      let kr = l.rate;
      Object.assign(l, makeLight());
      l.rate = kr * random(0.7, 1.3);
    }
  }

  // het neerdalende gewicht: een donker front dat heel langzaam zakt
  let weight = 0.5 + 0.5 * Math.sin(t * 0.3 - 1.2);

  buf.loadPixels();
  for (let y = 0; y < BH; y++) {
    let ny = y / BH;
    for (let x = 0; x < BW; x++) {
      let nx = x / BW;

      // diepe blauw-zwarte basis met trage textuur
      let deep = noise(nx * 1.6 + flow, ny * 1.8, t * 0.15);
      // onderkant zwaarder/donkerder; gewicht drukt naar beneden
      let descend = ny * (0.6 + 0.6 * weight);
      let lum = (0.10 + 0.10 * deep) * (1.0 - descend * 0.55);
      lum = Math.max(0, lum);

      let r = lum * 14;
      let g = lum * 22;
      let b = lum * 46;

      // zeldzame vage lichten die rijzen en zinken
      for (let l of lights) {
        let pres = 0.5 + 0.5 * Math.sin(l.phase); // 0..1
        if (pres < 0.02) continue;
        // verticale positie: rijst naar peakY op de top van de cyclus, zinkt weer
        let ly = 1.05 - (1.05 - l.peakY) * pres;
        let dx = (nx - l.x) / l.sz;
        let dy = (ny - ly) / (l.sz * 1.4);
        let blob = Math.exp(-(dx * dx + dy * dy) * 1.8);
        if (blob < 0.003) continue;
        let amt = blob * pres * 0.9;
        r += amt * (24 + 50 * l.warm);
        g += amt * (34 + 30 * l.warm);
        b += amt * (60 + 10 * l.warm);
      }

      // heel fijne korrel zodat het nooit dood-stil staat
      let grain = (noise(nx * 26.0, ny * 26.0, frameCount * 0.04) - 0.5) * 4;
      r += grain; g += grain; b += grain;

      let p = (y * BW + x) * 4;
      buf.pixels[p] = Math.max(0, Math.min(255, r));
      buf.pixels[p + 1] = Math.max(0, Math.min(255, g));
      buf.pixels[p + 2] = Math.max(0, Math.min(255, b));
      buf.pixels[p + 3] = 255;
    }
  }
  buf.updatePixels();
  image(buf, 0, 0, width, height);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  buildBuffer();
}
</script>
</body>
</html>
