<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 46%, rgba(0,0,0,0.36) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="p5.min.js"></script>
<script>
// doek v6 — nu mét compositie, zodat het een SCHILDERIJ wordt i.p.v. een brei.
//
// Wat v5 miste: alles was gelijkmatig bedekt en zacht -> één egale massa.
// v6 voegt een MACRO-COMPOSITIEVELD toe: één groot, traag verschuivend veld
// dat tegelijk stuurt:
//   • WAAR de toets zich concentreert  -> massa's vs. rustige open gebieden
//   • LICHT/DONKER                      -> echte lichte massa tegen donker
//   • VERZADIGING                       -> verzadigd onderwerp, doffe omgeving
// Plus grotere, zichtbaardere, gebaarde streken. Daardoor ontstaat focus,
// diepte en ademruimte — en omdat het veld traag van vorm verandert, krijg je
// telkens een ANDERE compositie i.p.v. steeds dezelfde brei.
//
// Nog steeds: puur additief, harmonieus, en uren-traag (één doorgaande reis).

// SPEED: 1 = echt traag (uren). Hoog zetten (bv. 2000) om de reis snel te zien.
const SPEED      = 1;
const TIME_SCALE = 0.0000005 * SPEED;

let hueBase;

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30); // 30 fps: kalmer oppervlak + halve belasting (Pi-vriendelijk)
  colorMode(HSL, 360, 100, 100, 1);
  noStroke();
  hueBase = random(360);
  background(hueBase, 18, 32); // donkere getinte ondergrond -> licht kan eruit springen
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(hueBase, 18, 32);
}

const lerp1 = (a, b, t) => a + (b - a) * t;
// duwt een 0..1 waarde naar de uiteinden -> gedefinieerde massa's met randen
const sharpen = (v, k) => constrain((v - 0.5) * k + 0.5, 0, 1);

function draw() {
  const t = millis() * TIME_SCALE;
  const drift = (k, seed) => noise(seed, t * k);

  // --- GLOBALE STEMMINGS-ENVELOP (traag; bewaakt de harmonie) ---------------
  const hueCenter = (hueBase + t * 16) % 360;
  const hueSpread = lerp1(40, 200, drift(0.40, 11));
  const satLevel  = lerp1(24, 72,  drift(0.50, 23));
  const lightCtr  = lerp1(42, 58,  drift(0.30, 37));
  const contrast  = lerp1(14, 40,  drift(0.55, 51));
  const strokeSz  = lerp1(0.9, 3.0, drift(0.45, 67));
  const density   = Math.round(lerp1(8, 18, drift(0.60, 83)));
  const flowTurns = lerp1(1, 2.6,  drift(0.30, 97));
  const flowFreq  = lerp1(0.0010, 0.0024, drift(0.30, 113));
  const aspect    = lerp1(1.4, 6.0, drift(0.50, 131)); // langer -> meer gebaar
  const structAmt = lerp1(0, 0.7,  drift(0.40, 149));
  const structFreq= lerp1(0.0008, 0.004, drift(0.25, 167));

  // --- traag schuivende ruimtelijke velden (kalmte) -------------------------
  const tHue = t * 0.15, tLum = t * 0.12, tStruct = t * 0.10, tFlow = t * 0.10, tComp = t * 0.10;

  for (let i = 0; i < density; i++) {
    const x = random(width);
    const y = random(height);

    // MACRO-COMPOSITIE: één groot veld (grote schaal) met gedefinieerde massa's
    const m = sharpen(noise(x * 0.0007 + 200, y * 0.0007 + 200, tComp), 2.3); // 0..1

    // concentreer de toets in de massa's; rustige gebieden krijgen weinig verf
    const ridge = 1 - Math.abs(noise(x * structFreq, y * structFreq, tStruct) - 0.5) * 2;
    const struct = (1 - structAmt) + structAmt * Math.pow(ridge, 3);
    const comp = 0.15 + 0.85 * Math.pow(m, 1.7); // focus vs. open
    if (random() > comp * struct) continue;

    // richting uit het langzaam wervelende flow-field
    const a = noise(x * flowFreq, y * flowFreq, tFlow) * TWO_PI * flowTurns;

    // KLEUR: brede kleurregio's + fijnere octaaf, binnen de harmonieuze familie
    const zoneBig  = noise(x * 0.0012, y * 0.0012, tHue);
    const zoneFine = noise(x * 0.0040 + 5, y * 0.0040 + 5, tHue * 0.7);
    const zone = zoneBig * 0.7 + zoneFine * 0.3;
    const h = (hueCenter + (zone - 0.5) * hueSpread + 360) % 360;
    // VERZADIGING gestuurd door de compositie: onderwerp fel, omgeving dof
    const s = constrain(satLevel * (0.45 + 0.75 * m) +
                        (noise(x * 0.0022 + 10, y * 0.0022 + 10, tHue * 0.5) - 0.5) * 22, 0, 100);

    // LICHT/DONKER: de macro-massa geeft het hoofdcontrast (licht onderwerp
    // tegen donkere omgeving), een fijner veld + textuur geven leven
    const lumZone = noise(x * 0.0011 + 50, y * 0.0011 + 50, tLum);
    const lum  = (m - 0.5) * 48 + (lumZone - 0.5) * 16;
    const fine = (noise(x * 0.0040 + 20, y * 0.0040 + 20) - 0.5) * contrast;
    const l = constrain(lightCtr + lum + fine, 3, 96);

    // streek-vorm: gebaard (langer), oppervlak ~gelijk, stip <-> veeg
    const sz  = strokeSz * random(9, 28);
    const len = sz * Math.sqrt(aspect);
    const wid = sz / Math.sqrt(aspect);

    push();
    translate(x, y);
    rotate(a);
    fill(h, s, l, 0.12);
    ellipse(0, 0, len, wid);
    // lichtaccent aan de kop -> impasto / zichtbare toets
    fill(h, s, constrain(l + 16, 0, 98), 0.08);
    ellipse(len * 0.20, 0, wid * 0.9, wid * 0.7);
    pop();
  }
}
</script>
</body>
</html>
