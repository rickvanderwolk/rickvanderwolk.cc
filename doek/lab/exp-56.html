<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v57 — ZWAARTEKRACHT. Materie die naar elkaar toe wordt getrokken: drijvende
// deeltjes die langzaam in putten vallen, samenklonteren tot clusters, banen die
// vervallen. Een stille kosmische trek. Donker met lichtende, accreterende punten.

const SPEED = 2000; // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;

let buf;
let bw, bh;
let particles = [];
let wells = [];
const N = 900;

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  buildBuffer();
  initSim();
}

function buildBuffer() {
  bw = 150;
  bh = Math.max(1, Math.round(bw * windowHeight / windowWidth));
  buf = createImage(bw, bh);
}

function initSim() {
  particles = [];
  for (let i = 0; i < N; i++) {
    particles.push({
      x: random(bw),
      y: random(bh),
      vx: random(-0.05, 0.05),
      vy: random(-0.05, 0.05),
      hue: random(0.55, 1.0)
    });
  }
  wells = [];
  const aspect = bh / bw;
  for (let i = 0; i < 3; i++) {
    wells.push({
      x: random(0.2, 0.8) * bw,
      y: random(0.2, 0.8) * bh,
      m: random(0.6, 1.4),
      ph: random(TWO_PI)
    });
  }
}

function draw() {
  const t = millis() * TIME_SCALE;
  const dt = 1.0;

  // putten driften heel langzaam en pulseren in massa
  for (let w of wells) {
    w.x += Math.cos(w.ph + t * 0.3) * 0.04;
    w.y += Math.sin(w.ph * 1.3 + t * 0.27) * 0.04;
    w.x = constrain(w.x, bw * 0.12, bw * 0.88);
    w.y = constrain(w.y, bh * 0.12, bh * 0.88);
    w.mNow = w.m * (0.7 + 0.5 * (0.5 + 0.5 * Math.sin(t * 0.5 + w.ph)));
  }

  // af en toe een put zachtjes verplaatsen (banen vervallen, nieuwe trek)
  if (frameCount % 600 === 0) {
    const w = random(wells);
    w.tx = random(0.2, 0.8) * bw;
    w.ty = random(0.2, 0.8) * bh;
  }

  // fade-trails op buffer voor accreterende streaks
  buf.loadPixels();
  const px = buf.pixels;
  for (let p = 0; p < bw * bh; p++) {
    const ii = p * 4;
    px[ii] = px[ii] * 0.86;
    px[ii + 1] = px[ii + 1] * 0.86;
    px[ii + 2] = px[ii + 2] * 0.88;
    px[ii + 3] = 255;
  }

  for (let k = 0; k < particles.length; k++) {
    const p = particles[k];
    let ax = 0, ay = 0;
    for (let w of wells) {
      const dx = w.x - p.x;
      const dy = w.y - p.y;
      let d2 = dx * dx + dy * dy + 6.0;
      const f = (w.mNow || w.m) * 0.6 / d2;
      ax += dx * f;
      ay += dy * f;
    }
    p.vx += ax * dt;
    p.vy += ay * dt;
    // lichte demping zodat banen vervallen en accreteren
    p.vx *= 0.985;
    p.vy *= 0.985;
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // wrap met zachte herintroductie aan de rand
    if (p.x < -2 || p.x > bw + 2 || p.y < -2 || p.y > bh + 2) {
      p.x = random(bw);
      p.y = random(bh);
      p.vx = random(-0.05, 0.05);
      p.vy = random(-0.05, 0.05);
    }

    const ix = Math.floor(p.x);
    const iy = Math.floor(p.y);
    if (ix >= 0 && ix < bw && iy >= 0 && iy < bh) {
      const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      const bri = 90 + Math.min(140, speed * 600);
      const h = p.hue;
      const idx = 4 * (ix + iy * bw);
      // koel-blauw naar warm-wit bij hoge snelheid
      px[idx] = Math.min(255, px[idx] + bri * (0.5 + 0.5 * (1 - h)));
      px[idx + 1] = Math.min(255, px[idx + 1] + bri * 0.7);
      px[idx + 2] = Math.min(255, px[idx + 2] + bri * h);
    }
  }

  buf.updatePixels();
  push();
  image(buf, 0, 0, width, height);
  pop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  buildBuffer();
}
</script>
</body>
</html>
