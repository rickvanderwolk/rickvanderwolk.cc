<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v61 — SMEULEND VUUR ONDER AS. Een donker asgrijs veld met een diepe gloed
// die eronder ademt: scheuren en holtes van oranjerode hitte pulseren door een
// afkoelende korst. Bijna uit, maar nooit helemaal. Ingehouden warmte in duister.

const SPEED = 2000; // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;

let buf;
let bw, bh;

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  colorMode(RGB, 255);
  buildBuffer();
}

function buildBuffer() {
  bw = 150;
  bh = Math.max(1, Math.round(bw * windowHeight / windowWidth));
  buf = createImage(bw, bh);
}

// gestapelde noise
function fbm(x, y, t) {
  let v = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < 4; i++) {
    v += amp * noise(x * freq, y * freq, t * 0.5 + i * 5.3);
    amp *= 0.5;
    freq *= 2.0;
  }
  return v;
}

function draw() {
  const t = millis() * TIME_SCALE;
  const breath = millis() * 0.0004; // trage ademhaling van de gloed

  buf.loadPixels();
  const px = buf.pixels;

  for (let j = 0; j < bh; j++) {
    const v = j / bh;
    for (let i = 0; i < bw; i++) {
      const u = i / bw;
      const o = 4 * (i + j * bw);

      // as-korst textuur: donker grijs met korrel
      const ash = fbm(u * 4.0, v * 4.0, 0.3);
      let cr = 26 + 20 * ash;
      let cg = 24 + 18 * ash;
      let cb = 24 + 17 * ash;

      // scheuren in de korst: smalle ravijnen waar hitte doorheen schijnt
      const crackField = fbm(u * 3.0 + 7.0, v * 3.0, t * 0.4);
      const crack = 1 - Math.min(1, Math.abs(crackField - 0.5) * 7.0);

      // diepe gloed die langzaam over het veld drijft en ademt
      const glowMap = fbm(u * 1.8, v * 1.8 + t * 0.2, t * 0.5);
      const pulse = 0.5 + 0.5 * Math.sin(breath * 6.0 + glowMap * 8.0);
      const pockets = Math.max(0, glowMap - 0.42) * 2.2;

      // totale hitte: holtes + scheuren, gemoduleerd door ademende puls
      let heat = (pockets * 0.8 + crack * 0.6) * (0.4 + 0.6 * pulse);
      heat = Math.min(1, heat);

      // gloeikleur: diep roodbruin -> oranje -> bij hoogste hitte bijna geel
      const hr = lerp(70, 255, Math.min(1, heat * 1.3));
      const hg = lerp(14, 150, Math.min(1, Math.max(0, heat - 0.2) * 1.6));
      const hb = lerp(8, 40, Math.min(1, Math.max(0, heat - 0.6) * 2.5));

      // de gloed schijnt door de as: additief, maar gedempt door de korst
      const k = heat * heat; // ingehouden, alleen de heetste plekken lichten op
      cr = Math.min(255, cr + hr * k);
      cg = Math.min(255, cg + hg * k);
      cb = Math.min(255, cb + hb * k);

      px[o] = cr;
      px[o + 1] = cg;
      px[o + 2] = cb;
      px[o + 3] = 255;
    }
  }

  buf.updatePixels();
  push();
  image(buf, 0, 0, width, height);
  pop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  buildBuffer();
}
</script>
</body>
</html>
