<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v62 — bijna altijd RUIS, heel af en toe verschijnt er iets.
//
// Het doek is vrijwel constant statische korrel. Maar af en toe zwelt er
// ergens, plaatselijk, heel even een samenhangend beeld op dat uit de ruis
// condenseert -- een verschijning die je bijna mist -- om daarna weer in de
// korrel op te lossen. De korrel leeft elk frame (frameCount); de verschijning
// en het beeld zelf driften traag (SPEED). Klein berekend -> Pi-vriendelijk.

const SPEED      = 2000;             // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;
const TAU = Math.PI * 2;

let buf, BW, BH;

function buildBuffer() {
  BW = 150;
  BH = Math.max(40, Math.round(BW * windowHeight / windowWidth));
  buf = createImage(BW, BH);
}
function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  noSmooth();
  noiseDetail(4, 0.5);
  buildBuffer();
}
function windowResized() { resizeCanvas(windowWidth, windowHeight); buildBuffer(); }

function cosPal(p, o) {
  o[0] = (0.55 + 0.45 * Math.cos(TAU * (p + 0.00))) * 255;
  o[1] = (0.55 + 0.45 * Math.cos(TAU * (p + 0.33))) * 255;
  o[2] = (0.55 + 0.45 * Math.cos(TAU * (p + 0.66))) * 255;
}

function draw() {
  const t  = millis() * TIME_SCALE;     // trage drift
  const az = frameCount * 0.004 + t * 0.3;   // het verborgen beeld evolueert
  const scale = 0.018, warp = 2.2;
  const hueShift = (t * 0.05) % 1;

  // ZELDZAME verschijning: meestal ~0, af en toe een trage piek
  const env = Math.pow(Math.max(0, Math.sin(t * 0.3)), 6) * 0.8;
  const sharp = 6;
  const col = [0, 0, 0];

  buf.loadPixels();
  const px = buf.pixels;
  for (let y = 0; y < BH; y++) {
    for (let x = 0; x < BW; x++) {
      // het beeld: domain-warped veld -> samenhangende, zachte structuur
      const sx = x * scale, sy = y * scale;
      const q = noise(sx, sy, az);
      const r = noise(sx + warp * q + 1.3, sy + warp * q, az);
      const v = noise(sx + warp * r + 2.7, sy + warp * r, az);
      cosPal(hueShift + v * 0.8, col);
      const sh = 0.35 + 0.65 * v;        // wat licht/donker in het beeld
      const ir = col[0] * sh, ig = col[1] * sh, ib = col[2] * sh;

      // WAAR het verschijnt: trage, driftende plekken (niet overal tegelijk)
      const sp = noise(x * 0.02 + 10, y * 0.02 + 10, frameCount * 0.003 + t);
      let co = (sp - (1 - env)) * sharp;
      co = co < 0 ? 0 : co > 1 ? 1 : co;

      const g = random(255);             // statische korrel, elk frame vers
      const p = (y * BW + x) * 4;
      px[p]     = g + (ir - g) * co;
      px[p + 1] = g + (ig - g) * co;
      px[p + 2] = g + (ib - g) * co;
      px[p + 3] = 255;
    }
  }
  buf.updatePixels();
  image(buf, 0, 0, width, height);
}
</script>
</body>
</html>
