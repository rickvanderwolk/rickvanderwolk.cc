<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v65 — AFSTEMMEN: een balk veegt het beeld uit de ruis.
//
// Een zachte verticale "afstem"-band glijdt traag over het doek. Waar de band
// passeert stolt de statische korrel even tot het verborgen beeld; daarachter
// zakt het langzaam terug de ruis in (een nagloed die vervaagt). Zo wordt het
// beeld telkens opnieuw plak voor plak uit het niets geschilderd en weer
// vergeten. Korrel leeft elk frame; beeld + tempo driften traag (SPEED).

const SPEED      = 2000;             // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;
const TAU = Math.PI * 2;

let buf, BW, BH, reveal;

function buildBuffer() {
  BW = 150;
  BH = Math.max(40, Math.round(BW * windowHeight / windowWidth));
  buf = createImage(BW, BH);
  reveal = new Float32Array(BW * BH);   // hoeveel elk pixel nu "afgestemd" is
}
function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  noSmooth();
  noiseDetail(4, 0.5);
  buildBuffer();
}
function windowResized() { resizeCanvas(windowWidth, windowHeight); buildBuffer(); }

function cosPal(p, o) {
  o[0] = (0.55 + 0.45 * Math.cos(TAU * (p + 0.00))) * 255;
  o[1] = (0.55 + 0.45 * Math.cos(TAU * (p + 0.33))) * 255;
  o[2] = (0.55 + 0.45 * Math.cos(TAU * (p + 0.66))) * 255;
}

function draw() {
  const t  = millis() * TIME_SCALE;
  const az = frameCount * 0.004 + t * 0.3;
  const scale = 0.018, warp = 2.2;
  const hueShift = (t * 0.05) % 1;

  // de band veegt traag heen en weer; rand wat rafelig via noise
  const span = BW + 60;
  const bx = (-30) + span * (0.5 + 0.5 * Math.sin(frameCount * 0.006));
  const sigma = 10;                  // bandbreedte
  const decay = 0.97;                // hoe traag de nagloed terugzakt naar ruis

  const col = [0, 0, 0];
  buf.loadPixels();
  const px = buf.pixels;
  for (let y = 0; y < BH; y++) {
    for (let x = 0; x < BW; x++) {
      const i = y * BW + x;
      // band-target met gerafelde rand
      const edge = (noise(y * 0.08, frameCount * 0.01) - 0.5) * 14;
      const dx = x - (bx + edge);
      const target = Math.exp(-(dx * dx) / (2 * sigma * sigma));
      // afgestemde waarde: zet aan op de band, zak daarna traag terug
      let rv = reveal[i] * decay;
      if (target > rv) rv = target;
      reveal[i] = rv;

      // het verborgen beeld
      const sx = x * scale, sy = y * scale;
      const q = noise(sx, sy, az);
      const r = noise(sx + warp * q + 1.3, sy + warp * q, az);
      const v = noise(sx + warp * r + 2.7, sy + warp * r, az);
      cosPal(hueShift + v * 0.85, col);
      const sh = 0.35 + 0.65 * v;
      const ir = col[0] * sh, ig = col[1] * sh, ib = col[2] * sh;

      const co = rv;
      const g = random(255);
      const p = i * 4;
      px[p]     = g + (ir - g) * co;
      px[p + 1] = g + (ig - g) * co;
      px[p + 2] = g + (ib - g) * co;
      px[p + 3] = 255;
    }
  }
  buf.updatePixels();
  image(buf, 0, 0, width, height);
}
</script>
</body>
</html>
