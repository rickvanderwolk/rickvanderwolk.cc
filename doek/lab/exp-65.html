<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v66 — TV-RUIS met af en toe gekleurde pixels erdoorheen.
//
// Grijze statische ruis (zoals een afgestemde-op-niets tv). Heel af en toe
// flikkeren er losse GEKLEURDE pixels doorheen -- ook ruis, maar met kleur.
// Hoeveel er doorkomen ademt traag, en ze klonteren in langzaam driftende
// plekken (alsof daar even een kleursignaal lekt). Korrel leeft elk frame; de
// dichtheid en de kleurfamilie driften traag (SPEED). Pi-vriendelijk.

const SPEED      = 1;                // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;

let buf, BW, BH;

function buildBuffer() {
  BW = 200;
  BH = Math.max(40, Math.round(BW * windowHeight / windowWidth));
  buf = createImage(BW, BH);
}
function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  frameRate(30);
  noSmooth();
  buildBuffer();
}
function windowResized() { resizeCanvas(windowWidth, windowHeight); buildBuffer(); }

// HSB -> RGB (alleen aangeroepen voor de spaarzame gekleurde pixels)
function hsb(h, s, b) {
  h = ((h % 360) + 360) % 360; s /= 100; b /= 100;
  const c = b * s, x = c * (1 - Math.abs(((h / 60) % 2) - 1)), m = b - c;
  let r = 0, g = 0, bl = 0;
  if (h < 60) { r = c; g = x; } else if (h < 120) { r = x; g = c; }
  else if (h < 180) { g = c; bl = x; } else if (h < 240) { g = x; bl = c; }
  else if (h < 300) { r = x; bl = c; } else { r = c; bl = x; }
  return [(r + m) * 255, (g + m) * 255, (bl + m) * 255];
}

function draw() {
  const t = millis() * TIME_SCALE;

  // hoeveel gekleurde pixels: meestal weinig, met trage opwellingen
  const baseProb = 0.012 + 0.06 * Math.pow(Math.max(0, Math.sin(t * 0.4)), 3);
  const hueDrift = (t * 24) % 360;     // traag schuivende kleurfamilie

  buf.loadPixels();
  const px = buf.pixels;
  for (let y = 0; y < BH; y++) {
    for (let x = 0; x < BW; x++) {
      let r = random(255), g = r, b = r;   // grijze static

      // plek waar kleur lekt (driftende clusters)
      const patch = noise(x * 0.025, y * 0.025, frameCount * 0.01 + t);
      const prob = baseProb * patch * patch * 1.8;
      if (random() < prob) {
        const h = (hueDrift + random(120)) % 360;  // samenhangende, maar levendige tint
        const c = hsb(h, 92, random(45, 100));
        r = c[0]; g = c[1]; b = c[2];
      }

      const p = (y * BW + x) * 4;
      px[p] = r; px[p + 1] = g; px[p + 2] = b; px[p + 3] = 255;
    }
  }
  buf.updatePixels();
  image(buf, 0, 0, width, height);
}
</script>
</body>
</html>
