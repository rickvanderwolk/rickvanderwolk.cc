<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v89 — CUT-OUTS. Variabele blok-mozaiek (zelfde techniek als v86), bron =
// een paar grote, organische uitgeknipte vormen (Matisse-achtig) in vlakke,
// stevige kleuren op licht papier; ze draaien en driften traag -> altijd anders.

const SPEED = 2000; // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;

const PAL = [[20,92,124],[236,92,70],[247,201,64],[34,142,112],[40,46,70]];
const BG  = [240,234,221];
const minB = 3, maxB = 100;

let src;
function setup(){ pixelDensity(1); createCanvas(windowWidth, windowHeight); frameRate(30); noSmooth(); buildSource(); }
function buildSource(){ src = createGraphics(windowWidth, windowHeight); src.pixelDensity(1); src.noSmooth(); }
function windowResized(){ resizeCanvas(windowWidth, windowHeight); buildSource(); }

// een grillige, gladde uitgeknipte vorm (varierende straal per hoek)
function cutout(g, cx, cy, r, seed, c){
  g.fill(c[0], c[1], c[2]);
  g.beginShape();
  const steps = 14;
  for (let k = 0; k <= steps + 2; k++){
    const a = (k / steps) * TWO_PI;
    const lobes = 1 + 0.6 * Math.sin(a * (2 + (seed % 3)) + seed);
    const rr = r * lobes * (0.75 + 0.45 * noise(seed + Math.cos(a), seed + Math.sin(a), frameCount * 0.003));
    g.curveVertex(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr);
  }
  g.endShape(CLOSE);
}

function paintSource(t){
  const g = src; g.push(); g.noStroke();
  g.background(BG[0], BG[1], BG[2]);
  const N = 9;
  for (let i = 0; i < N; i++){
    const sx = noise(i * 5.2 + 1, frameCount * 0.0032) * g.width;
    const sy = noise(i * 5.2 + 70, frameCount * 0.0032) * g.height;
    const r  = g.width * (0.07 + 0.10 * noise(i * 1.9 + 3, frameCount * 0.0022));
    g.push();
    g.translate(sx, sy);
    g.rotate(noise(i + 11, frameCount * 0.004) * TWO_PI * 2);
    cutout(g, 0, 0, r, i * 7 + 2, PAL[i % PAL.length]);
    g.pop();
  }
  g.pop();
}

function draw(){
  const t = millis() * TIME_SCALE;
  paintSource(t);
  src.loadPixels();

  const ang = frameCount * 0.003 + t * 0.4;
  const nx = Math.cos(ang), ny = Math.sin(ang);
  const cx0 = width / 2, cy0 = height / 2;
  const diag = Math.sqrt(width * width + height * height);
  const shift = 0.5 + 0.5 * Math.sin(frameCount * 0.006 + t);

  const sp = src.pixels, sw = src.width, shh = src.height;
  noStroke();
  let by = 0;
  while (by < height){
    let bx = 0;
    while (bx < width){
      let p = ((bx - cx0) * nx + (by - cy0) * ny) / diag + 0.5;
      p = constrain(p + (shift - 0.5) * 0.6, 0, 1);
      const B = Math.max(1, Math.floor(minB + p * p * (maxB - minB)));
      const cx = Math.min(sw - 1, Math.floor(bx + B / 2));
      const cy = Math.min(shh - 1, Math.floor(by + B / 2));
      const idx = 4 * (cy * sw + cx);
      fill(sp[idx], sp[idx + 1], sp[idx + 2]);
      rect(bx, by, B, B);
      bx += B;
    }
    let pe = ((0 - cx0) * nx + (by - cy0) * ny) / diag + 0.5;
    pe = constrain(pe + (shift - 0.5) * 0.6, 0, 1);
    by += Math.max(1, Math.floor(minB + pe * pe * (maxB - minB)));
  }
}
</script>
</body>
</html>
