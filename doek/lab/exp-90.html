<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v91 — BANEN & RASTERS. Variabele blok-mozaiek (zelfde techniek als v86),
// bron = verschuivende banen en rastervlakken in vlakke kleuren die traag
// herkleuren en verschuiven -> een weefsel dat door de blokken telkens anders breekt.

const SPEED = 2000; // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;

const PAL = [[224,86,72],[244,196,96],[58,150,158],[236,228,210],[44,54,86],[206,108,150]];
const BG  = [30,30,42];
const minB = 3, maxB = 108;

let src;
function setup(){ pixelDensity(1); createCanvas(windowWidth, windowHeight); frameRate(30); noSmooth(); buildSource(); }
function buildSource(){ src = createGraphics(windowWidth, windowHeight); src.pixelDensity(1); src.noSmooth(); }
function windowResized(){ resizeCanvas(windowWidth, windowHeight); buildSource(); }

function paintSource(t){
  const g = src; g.push(); g.noStroke();
  g.background(BG[0], BG[1], BG[2]);

  // verticale banen met variabele breedte, traag schuivend + herkleurend
  const scroll = frameCount * 0.6;
  let x = -((scroll) % 160);
  let i = 0;
  while (x < g.width){
    const w = g.width * (0.04 + 0.10 * noise(i * 0.6 + 1, frameCount * 0.003));
    const ci = Math.floor((noise(i * 0.9 + 5, frameCount * 0.0025) * PAL.length * 1.5)) % PAL.length;
    const c = PAL[ci];
    g.fill(c[0], c[1], c[2]);
    g.rect(x, 0, w + 1, g.height);
    x += w; i++;
  }
  // horizontale banden eroverheen (weefsel), half-doorzichtig
  const scrollY = frameCount * 0.4;
  let y = -((scrollY) % 140);
  let j = 0;
  while (y < g.height){
    const h = g.height * (0.05 + 0.11 * noise(j * 0.7 + 50, frameCount * 0.0026));
    const ci = Math.floor((noise(j * 0.8 + 80, frameCount * 0.0022) * PAL.length * 1.5)) % PAL.length;
    const c = PAL[ci];
    g.fill(c[0], c[1], c[2], 150);
    g.rect(0, y, g.width, h + 1);
    y += h; j++;
  }
  g.pop();
}

function draw(){
  const t = millis() * TIME_SCALE;
  paintSource(t);
  src.loadPixels();

  const ang = frameCount * 0.003 + t * 0.4;
  const nx = Math.cos(ang), ny = Math.sin(ang);
  const cx0 = width / 2, cy0 = height / 2;
  const diag = Math.sqrt(width * width + height * height);
  const shift = 0.5 + 0.5 * Math.sin(frameCount * 0.006 + t);

  const sp = src.pixels, sw = src.width, shh = src.height;
  noStroke();
  let by = 0;
  while (by < height){
    let bx = 0;
    while (bx < width){
      let p = ((bx - cx0) * nx + (by - cy0) * ny) / diag + 0.5;
      p = constrain(p + (shift - 0.5) * 0.6, 0, 1);
      const B = Math.max(1, Math.floor(minB + p * p * (maxB - minB)));
      const cx = Math.min(sw - 1, Math.floor(bx + B / 2));
      const cy = Math.min(shh - 1, Math.floor(by + B / 2));
      const idx = 4 * (cy * sw + cx);
      fill(sp[idx], sp[idx + 1], sp[idx + 2]);
      rect(bx, by, B, B);
      bx += B;
    }
    let pe = ((0 - cx0) * nx + (by - cy0) * ny) / diag + 0.5;
    pe = constrain(pe + (shift - 0.5) * 0.6, 0, 1);
    by += Math.max(1, Math.floor(minB + pe * pe * (maxB - minB)));
  }
}
</script>
</body>
</html>
