<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doek</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #vignet {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 42%, rgba(0,0,0,0.42) 100%);
  }
</style>
</head>
<body>
<div id="vignet"></div>
<!-- p5.js vendored locally, geen CDN -->
<script src="../p5.min.js"></script>
<script>
// doek v98 — ABSTRACTE LICHTVELDEN. Verder weg van een letterlijke skyline:
// geen gebouw-silhouetten meer, alleen clusters zachte lichtpunten die tot vage
// torens versmelten tegen een diepe gradient. De lampjes gaan RUSTIG aan en uit
// (langzamer dan v97), met bloom en een vaag schijnsel eronder; het hele veld
// drift heel traag. Suggestie van een stad, niet meer dan dat.

const SPEED = 2000; // 1 = uren-traag. Hoog (bv. 2000) om de reis snel te zien.
const TIME_SCALE = 0.0000007 * SPEED;

let lights = [], stars = [], baseY = 0;

const LIGHTS = [
  [255,196,130],[255,176,96],[255,222,176],[255,206,150],
  [150,196,255],[180,255,224]
];
function pickLight(){ const i = random() < 0.82 ? Math.floor(random(4)) : 4 + Math.floor(random(2)); return LIGHTS[i]; }
const sstep = (e0, e1, x) => { let v = (x - e0) / (e1 - e0); v = v < 0 ? 0 : v > 1 ? 1 : v; return v * v * (3 - 2 * v); };

function setup(){ pixelDensity(1); createCanvas(windowWidth, windowHeight); frameRate(30); genField(); }
function windowResized(){ resizeCanvas(windowWidth, windowHeight); genField(); }

function genField(){
  lights = []; stars = [];
  baseY = Math.floor(height * 0.72);
  let x = -random(0, 60);
  while (x < width + 40){
    // een losse, onregelmatige "toren"-cluster
    const cw = random(width * 0.03, width * 0.085);
    const ch = height * random(0.14, 0.6);
    const top = baseY - ch;
    const cell = constrain(cw * 0.2, 9, 20);
    const cols = Math.max(1, Math.floor(cw / cell));
    const rows = Math.max(1, Math.floor(ch / cell));
    for (let r = 0; r < rows; r++){
      for (let ci = 0; ci < cols; ci++){
        if (random() < 0.30) continue;
        const jx = (random() - 0.5) * cell * 0.5;   // jitter -> abstracter dan een net
        const jy = (random() - 0.5) * cell * 0.5;
        const rad = cell * random(0.16, 0.30);
        lights.push({
          x: x + ci * cell + jx, y: top + r * cell + jy,
          r: rad, col: pickLight(), seed: random(1000),
          thr: random(0.40, 0.74),
          dim: lerp(0.5, 1.0, (baseY - (top + r * cell)) / height < 0 ? 0 : 1) * random(0.7, 1)
        });
      }
    }
    x += cw * random(0.5, 0.85);                     // overlappen
  }
  for (let i = 0; i < 80; i++) stars.push({ x: random(width), y: random(baseY * 0.7), s: random(0.6, 1.7), tw: random(1000) });
}

function draw(){
  const t = millis() * TIME_SCALE;

  // diepe gradient (geen harde horizon): donker boven, iets warmer/dichter onder
  const warm = noise(7, t * 0.3);
  const topC = [12, 14, 32], botC = [lerp(34, 60, warm), lerp(26, 36, warm), lerp(46, 56, warm)];
  noStroke();
  for (let y = 0; y < height; y += 2){
    const f = y / height;
    fill(lerp(topC[0], botC[0], f * f), lerp(topC[1], botC[1], f * f), lerp(topC[2], botC[2], f * f));
    rect(0, y, width, 2);
  }
  for (const s of stars){
    const tw = 0.4 + 0.6 * noise(s.tw, frameCount * 0.02);
    fill(220, 225, 240, 190 * tw);
    rect(s.x, s.y, s.s, s.s);
  }

  // trage globale drift van het hele lichtveld
  const dx = Math.sin(frameCount * 0.004) * 8 + Math.sin(t) * 4;

  // aan-heid (rustig tempo)
  for (const w of lights){
    const v = noise(w.seed, frameCount * 0.005 + t * 0.3);
    let on = sstep(w.thr - 0.06, w.thr + 0.06, v);
    if (on >= 0.02) on *= (0.85 + 0.15 * noise(w.seed + 9, frameCount * 0.12)) * w.dim; else on = 0;
    w._on = on;
  }
  // bloom + schijnsel in één ADD-pass
  blendMode(ADD);
  for (const w of lights){
    if (w._on <= 0) continue;
    const c = w.col, wx = w.x + dx;
    fill(c[0] * 0.5, c[1] * 0.5, c[2] * 0.5, 60 * w._on);
    ellipse(wx, w.y, w.r * 9, w.r * 9);            // brede zachte bloom -> versmelt
    fill(c[0] * 0.7, c[1] * 0.7, c[2] * 0.7, 120 * w._on);
    ellipse(wx, w.y, w.r * 4, w.r * 4);
    const ry = baseY + (baseY - w.y) * 0.7 + Math.sin(frameCount * 0.04 + w.x * 0.1) * 4;
    if (ry < height){ fill(c[0], c[1], c[2], 40 * w._on); ellipse(wx, ry, w.r * 3, w.r * 5); }
  }
  // heldere kernen in één BLEND-pass
  blendMode(BLEND);
  for (const w of lights){
    if (w._on <= 0) continue;
    const c = w.col;
    fill(c[0], c[1], c[2], 255 * w._on);
    ellipse(w.x + dx, w.y, w.r * 1.6, w.r * 1.6);
  }
}
</script>
</body>
</html>
