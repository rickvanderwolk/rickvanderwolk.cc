<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Doolhof</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; touch-action: none; }
  canvas { display: block; position: fixed; inset: 0; }
  #hint {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%); z-index: 2;
    font: 13px/1.4 "Courier New", ui-monospace, monospace; color: #f2f2f2;
    pointer-events: none; user-select: none; text-align: center;
    letter-spacing: 0.12em; text-transform: lowercase;
    background: rgba(0,0,0,0.5); padding: 7px 12px; border-radius: 4px;
    transition: opacity 1s ease; opacity: 1;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">arrows / wasd &nbsp;·&nbsp; or hold mouse / touch to walk, aim left &amp; right to steer</div>
<script>
// Doolhof ("maze") — the 3D Maze screensaver, but you drive.
// ----------------------------------------------------------------------------
// Same old-school raycaster (DDA, one vertical strip per column) and the same
// red-brick / wood-floor / light-ceiling look as the screensaver, except now
// YOU walk it: arrow keys or WASD to turn and move, with walls you can't pass
// through. No exit, no levels, no score -- one big labyrinth to wander forever.
// ----------------------------------------------------------------------------

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false });

// ---- tunables --------------------------------------------------------------
const COLS = 18, ROWS = 18;        // maze size in cells (corridors are 1 tile)
const MOVE_SPEED = 2.8;            // tiles per second while walking
const TURN_SPEED = 2.4;           // radians per second while turning
const CARVE_STRAIGHT = 0.78;       // generator's bias toward long straight halls
const RADIUS = 0.26;               // player collision radius in tiles
const FOG = 9.0;                  // tiles until a wall fades fully to black
const TS = 64;                     // texture size in pixels

// ---- maze generation (recursive backtracker) -------------------------------
function genMaze(cols, rows) {
  const W = 2 * cols + 1, H = 2 * rows + 1;
  const g = Array.from({ length: H }, () => new Array(W).fill(1));
  const vis = new Set(['0,0']);
  const stack = [{ x: 0, y: 0, dir: null }];
  g[1][1] = 0;
  while (stack.length) {
    const { x: cx, y: cy, dir: lastDir } = stack[stack.length - 1];
    const dirs = [[0, -1], [1, 0], [0, 1], [-1, 0]];
    for (let i = dirs.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [dirs[i], dirs[j]] = [dirs[j], dirs[i]];
    }
    if (lastDir && Math.random() < CARVE_STRAIGHT) {
      const k = dirs.findIndex(d => d[0] === lastDir[0] && d[1] === lastDir[1]);
      if (k > 0) dirs.unshift(dirs.splice(k, 1)[0]);
    }
    let moved = false;
    for (const [dx, dy] of dirs) {
      const nx = cx + dx, ny = cy + dy;
      if (nx < 0 || ny < 0 || nx >= cols || ny >= rows) continue;
      if (vis.has(nx + ',' + ny)) continue;
      vis.add(nx + ',' + ny);
      g[1 + 2 * ny][1 + 2 * nx] = 0;
      g[1 + 2 * cy + dy][1 + 2 * cx + dx] = 0;
      stack.push({ x: nx, y: ny, dir: [dx, dy] });
      moved = true;
      break;
    }
    if (!moved) stack.pop();
  }
  return { g, W, H };
}

// ---- textures --------------------------------------------------------------
function makeCanvas() {
  const cv = document.createElement('canvas');
  cv.width = cv.height = TS;
  return cv;
}

function makeBrick() {
  const cv = makeCanvas();
  const c = cv.getContext('2d');
  c.fillStyle = '#c9bfa8';
  c.fillRect(0, 0, TS, TS);
  const rh = 16, rw = 32, m = 2;
  for (let row = 0, y = 0; y < TS; y += rh, row++) {
    const off = (row % 2) ? -rw / 2 : 0;
    for (let x = off; x < TS; x += rw) {
      const shade = 0.85 + Math.random() * 0.28;
      const r = Math.round(186 * shade), gg = Math.round(46 * shade), b = Math.round(42 * shade);
      c.fillStyle = `rgb(${r},${gg},${b})`;     // saturated red brick, like the original
      c.fillRect(x + m, y + m, rw - m, rh - m);
    }
  }
  const grad = c.createLinearGradient(0, 0, 0, TS);
  grad.addColorStop(0, 'rgba(255,255,255,0.08)');
  grad.addColorStop(1, 'rgba(0,0,0,0.12)');
  c.fillStyle = grad;
  c.fillRect(0, 0, TS, TS);
  return cv;
}

function makePlaque(brick, draw) {
  const cv = makeCanvas();
  const c = cv.getContext('2d');
  c.drawImage(brick, 0, 0);
  c.fillStyle = '#d8c5a0';
  c.fillRect(14, 14, 36, 36);
  c.strokeStyle = '#3a342c';
  c.lineWidth = 2;
  c.strokeRect(14, 14, 36, 36);
  draw(c);
  return cv;
}

const brick = makeBrick();

// The only wall plaque now is the OpenGL globe; the Start button and the goal
// smiley float in the air instead, the way the original did.
const signs = [ makePlaque(brick, drawGlobe) ];

// Billboard sprites (transparent): rat, floating OpenGL logos, the floating
// Start button you pass through at the entrance, and the goal smiley.
function makeSprite(draw) { const cv = makeCanvas(); draw(cv.getContext('2d')); return cv; }
const ratTex = makeSprite(drawRat);
const logoTex = makeSprite(drawOglLogo);
const startTex = makeSprite(drawStartButton);
const smileyTex = makeSprite(drawSmileyBall);

// A blocky, colourful "Lego" globe, after the OpenGL Programming Guide cover.
function drawGlobe(c) {
  c.save();
  c.beginPath(); c.arc(32, 32, 16, 0, Math.PI * 2); c.clip();
  c.fillStyle = '#0e1428'; c.fillRect(15, 15, 34, 34);
  const cols = [[42, 109, 240], [31, 175, 58], [226, 59, 43], [242, 194, 10]];
  const s = 3;
  for (let y = 16; y < 48; y += s) for (let x = 16; x < 48; x += s) {
    const dx = (x + s / 2 - 32) / 16, dy = (y + s / 2 - 32) / 16, rr = dx * dx + dy * dy;
    if (rr > 1) continue;
    const nz = Math.sqrt(1 - rr);
    const light = 0.4 + 0.6 * Math.max(0.08, (-0.5 * dx - 0.5 * dy + nz) / 1.5);
    const col = cols[(((x / s) | 0) + ((y / s) | 0)) % cols.length];
    c.fillStyle = `rgb(${col[0] * light | 0},${col[1] * light | 0},${col[2] * light | 0})`;
    c.fillRect(x, y, s, s);
  }
  c.restore();
  c.strokeStyle = '#0a1530'; c.lineWidth = 1.5;
  c.beginPath(); c.arc(32, 32, 16, 0, Math.PI * 2); c.stroke();
}

// A brown rat in profile, facing right -- the maze's other little wanderer.
function drawRat(c) {
  c.save(); c.translate(30, 38);
  c.strokeStyle = '#bd8f7d'; c.lineWidth = 2.2; c.lineCap = 'round';     // tail
  c.beginPath(); c.moveTo(-16, 4); c.quadraticCurveTo(-30, 2, -27, -12); c.stroke();
  const g = c.createLinearGradient(0, -14, 0, 14);                        // brown body
  g.addColorStop(0, '#82603c'); g.addColorStop(0.6, '#5e4126'); g.addColorStop(1, '#3f2c19');
  c.fillStyle = g;
  c.beginPath();
  c.moveTo(-16, 4);
  c.quadraticCurveTo(-20, -12, -4, -14);
  c.quadraticCurveTo(10, -15, 19, -6);
  c.quadraticCurveTo(26, -1, 22, 5);
  c.quadraticCurveTo(14, 12, 0, 12);
  c.quadraticCurveTo(-12, 12, -16, 4);
  c.closePath(); c.fill();
  c.strokeStyle = 'rgba(0,0,0,0.18)'; c.lineWidth = 1;                    // haunch crease
  c.beginPath(); c.moveTo(-4, -8); c.quadraticCurveTo(-8, 6, -2, 11); c.stroke();
  c.fillStyle = '#5a3f28'; c.beginPath(); c.ellipse(11, -9, 4.2, 5, -0.3, 0, Math.PI * 2); c.fill();  // ear
  c.fillStyle = '#caa092'; c.beginPath(); c.ellipse(11, -8, 2, 2.8, -0.3, 0, Math.PI * 2); c.fill();
  c.fillStyle = '#140d06'; c.beginPath(); c.arc(17, -3, 1.5, 0, Math.PI * 2); c.fill();               // eye
  c.fillStyle = '#e2a3ab'; c.beginPath(); c.arc(24, 3, 1.7, 0, Math.PI * 2); c.fill();                // nose
  c.strokeStyle = '#d59f93'; c.lineWidth = 2.6; c.lineCap = 'round';                                   // feet
  c.beginPath(); c.moveTo(12, 11); c.lineTo(13, 15); c.moveTo(-2, 11); c.lineTo(-3, 15); c.stroke();
  c.strokeStyle = 'rgba(240,240,240,0.7)'; c.lineWidth = 0.6;                                          // whiskers
  c.beginPath(); c.moveTo(23, 3); c.lineTo(31, 0); c.moveTo(23, 4); c.lineTo(31, 6); c.stroke();
  c.restore();
}

// The "OpenGL" wordmark: chunky multicolour letters with a black outline.
function drawOglLogo(c) {
  c.font = 'bold 17px Arial, Helvetica, sans-serif';
  c.textAlign = 'left'; c.textBaseline = 'middle';
  const word = 'OpenGL';
  const cols = ['#e21d1d', '#1aa11a', '#1d57e2', '#e2a11d', '#9b1de2', '#e21d8f'];
  const ws = []; let total = 0;
  for (const ch of word) { const w = c.measureText(ch).width; ws.push(w); total += w; }
  let x = 32 - total / 2;
  c.lineJoin = 'round'; c.lineWidth = 3; c.strokeStyle = '#000';
  for (let i = 0; i < word.length; i++) {
    c.strokeText(word[i], x, 32);
    c.fillStyle = cols[i % cols.length];
    c.fillText(word[i], x, 32);
    x += ws[i];
  }
}

// The floating Windows 95 Start button you pass through at the entrance.
function drawStartButton(c) {
  const x = 4, y = 23, w = 56, h = 18;
  c.fillStyle = '#c0c0c0'; c.fillRect(x, y, w, h);
  c.fillStyle = '#fff'; c.fillRect(x, y, w, 1.5); c.fillRect(x, y, 1.5, h);
  c.fillStyle = '#808080'; c.fillRect(x, y + h - 1.5, w, 1.5); c.fillRect(x + w - 1.5, y, 1.5, h);
  c.save(); c.translate(x + 5, y + 5); c.transform(1, 0, -0.18, 1, 0, 0);   // waving flag
  const pane = [['#e7000e', 0, 0], ['#27a700', 5, 0], ['#0057d8', 0, 5], ['#ffd400', 5, 5]];
  for (const [col, dx, dy] of pane) { c.fillStyle = col; c.fillRect(dx, dy, 4.4, 4.4); }
  c.restore();
  c.fillStyle = '#000'; c.font = 'bold 12px Tahoma, Arial, sans-serif'; c.textBaseline = 'middle';
  c.fillText('Start', x + 17, y + h / 2);
}

// The floating glossy goal smiley.
function drawSmileyBall(c) {
  const g = c.createRadialGradient(26, 26, 4, 32, 32, 26);
  g.addColorStop(0, '#fff7a8'); g.addColorStop(0.5, '#ffe000'); g.addColorStop(1, '#d6a400');
  c.fillStyle = g; c.beginPath(); c.arc(32, 32, 24, 0, Math.PI * 2); c.fill();
  c.fillStyle = '#1d3fd6';
  c.beginPath(); c.arc(24, 27, 3.4, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.arc(40, 27, 3.4, 0, Math.PI * 2); c.fill();
  c.strokeStyle = '#1d3fd6'; c.lineWidth = 4; c.lineCap = 'round';
  c.beginPath(); c.arc(32, 34, 13, 0.25, Math.PI - 0.25); c.stroke();
}

let texGrid;
function buildTexGrid(g, W, H) {
  texGrid = Array.from({ length: H }, () => new Array(W).fill(null));
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++) {
      if (g[y][x] !== 1) continue;
      const h = (x * 73856093) ^ (y * 19349663);
      texGrid[y][x] = ((h >>> 0) % 23 === 0) ? signs[(x + y) % signs.length] : brick;
    }
}

// ---- the player ------------------------------------------------------------
let maze, posX, posY, dir, bob = 0, clock = 0;
let rats = [], logos = [], startObj = null, goalObj = null;
const RAT_SPEED = 1.6;                          // tiles/sec, slower than the player
const DEMO = new URLSearchParams(location.search).get('demo');
// one rat, like the original; override with ?rats=N (e.g. ?rats=60 to find one fast)
const RATS = Math.max(1, Math.min(100, parseInt(new URLSearchParams(location.search).get('rats')) || 1));

function isWall(x, y) {
  const gx = Math.floor(x), gy = Math.floor(y);
  return !(maze.g[gy] && maze.g[gy][gx] === 0);
}
function free(x, y) {                     // player circle vs the four corners
  return !isWall(x - RADIUS, y - RADIUS) && !isWall(x + RADIUS, y - RADIUS) &&
         !isWall(x - RADIUS, y + RADIUS) && !isWall(x + RADIUS, y + RADIUS);
}

// ---- the rat: wanders the maze tile by tile, just like the screensaver ------
function openNeighbors(cx, cy) {
  return [[1, 0], [-1, 0], [0, 1], [0, -1]].filter(([dx, dy]) => maze.g[cy + dy] && maze.g[cy + dy][cx + dx] === 0);
}
function ratPick(rat) {
  const cx = Math.round(rat.x - 0.5), cy = Math.round(rat.y - 0.5);
  const opts = openNeighbors(cx, cy);
  const back = rat.prev ? [rat.prev.x - cx, rat.prev.y - cy] : null;
  let live = opts.filter(([dx, dy]) => !(back && dx === back[0] && dy === back[1]));
  if (!live.length) live = opts;
  const straight = live.find(([dx, dy]) => dx === rat.dir[0] && dy === rat.dir[1]);
  const ch = (straight && Math.random() < 0.8) ? straight : live[(Math.random() * live.length) | 0];
  rat.prev = { x: cx, y: cy };
  rat.dir = ch;
  rat.target = { x: cx + ch[0] + 0.5, y: cy + ch[1] + 0.5 };
}
function updateRats(dt) {
  for (const rat of rats) {
    const dx = rat.target.x - rat.x, dy = rat.target.y - rat.y, d = Math.hypot(dx, dy);
    const step = RAT_SPEED * dt;
    if (d <= step) { rat.x = rat.target.x; rat.y = rat.target.y; ratPick(rat); }
    else { rat.x += dx / d * step; rat.y += dy / d * step; }
  }
}
function randomOpenTile(minDist) {
  for (let t = 0; t < 200; t++) {
    const cx = 1 + ((Math.random() * (maze.W - 2)) | 0);
    const cy = 1 + ((Math.random() * (maze.H - 2)) | 0);
    if (maze.g[cy] && maze.g[cy][cx] === 0 && Math.hypot(cx - 1, cy - 1) >= minDist) return [cx, cy];
  }
  return [maze.W - 2, maze.H - 2];
}

function newMaze() {
  maze = genMaze(COLS, ROWS);
  buildTexGrid(maze.g, maze.W, maze.H);
  posX = 1.5; posY = 1.5;
  // face the first open neighbour so we start looking down a corridor
  const dirs = [[1, 0], [0, 1], [-1, 0], [0, -1]];
  const open = dirs.find(([dx, dy]) => !isWall(1.5 + dx, 1.5 + dy)) || [1, 0];
  dir = Math.atan2(open[1], open[0]);

  // floating Start button just ahead, so you pass through it on the way in
  startObj = { x: 1.5 + Math.cos(dir) * 1.5, y: 1.5 + Math.sin(dir) * 1.5 };
  // the goal smiley floating far off in the maze
  const gt = randomOpenTile(Math.max(COLS, ROWS) - 3);
  goalObj = { x: gt[0] + 0.5, y: gt[1] + 0.5 };

  // the wandering rat(s) + a few floating OpenGL logos
  rats = [];
  for (let i = 0; i < RATS; i++) {
    const r = randomOpenTile(4);
    const rt = { x: r[0] + 0.5, y: r[1] + 0.5, dir: [1, 0], prev: null };
    ratPick(rt);
    rats.push(rt);
  }
  logos = [];
  for (let i = 0; i < 4; i++) { const t = randomOpenTile(3); logos.push({ x: t[0] + 0.5, y: t[1] + 0.5, phase: Math.random() * 6.28 }); }

  if (DEMO) {                                   // line them up straight ahead for a screenshot
    const fx = Math.round(Math.cos(dir)), fy = Math.round(Math.sin(dir));
    rats[0].x = 1.5 + fx * 2; rats[0].y = 1.5 + fy * 2; rats[0].target = { x: rats[0].x, y: rats[0].y }; rats[0].dir = [fx, fy];
    logos = [{ x: 1.5 + fx * 1.3, y: 1.5 + fy * 1.3, phase: 0 }];
  }
}

// ---- input -----------------------------------------------------------------
const keys = {};
const ARROWS = ['arrowup', 'arrowdown', 'arrowleft', 'arrowright'];
addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (ARROWS.includes(k)) e.preventDefault();
  hideHint();
});
addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// touch / mouse: hold to walk forward, steer toward where you point.
// Pointing at the centre (the vanishing point straight ahead) walks dead
// straight; pointing left/right of centre turns, more the further out you aim.
const pointers = new Map();              // pointerId -> clientX
canvas.addEventListener('pointerdown', e => { pointers.set(e.pointerId, e.clientX); hideHint(); });
canvas.addEventListener('pointermove', e => { if (pointers.has(e.pointerId)) pointers.set(e.pointerId, e.clientX); });
canvas.addEventListener('pointerup', e => pointers.delete(e.pointerId));
canvas.addEventListener('pointercancel', e => pointers.delete(e.pointerId));

let hintGone = false;
function hideHint() {
  if (hintGone) return;
  hintGone = true;
  const h = document.getElementById('hint');
  h.style.opacity = '0';
  setTimeout(() => h.remove(), 1100);
}

function update(dt) {
  clock += dt;
  updateRats(dt);
  let mv = 0, turn = 0;
  if (keys['arrowup'] || keys['w']) mv += 1;
  if (keys['arrowdown'] || keys['s']) mv -= 1;
  if (keys['arrowleft'] || keys['a']) turn -= 1;
  if (keys['arrowright'] || keys['d']) turn += 1;
  if (pointers.size) {
    mv += 1;                                       // holding = walk forward
    let sum = 0;
    for (const x of pointers.values()) sum += x;
    let s = (sum / pointers.size / innerWidth - 0.5) * 2;   // -1 far left .. 1 far right
    const dead = 0.14;                             // a centre band that goes dead straight
    if (Math.abs(s) < dead) s = 0;
    else s = (s - Math.sign(s) * dead) / (1 - dead);
    turn += s;
  }

  if (turn) dir += Math.max(-1, Math.min(1, turn)) * TURN_SPEED * dt;
  if (mv) {
    const sp = Math.max(-1, Math.min(1, mv)) * MOVE_SPEED * dt;
    const fx = Math.cos(dir) * sp, fy = Math.sin(dir) * sp;
    if (free(posX + fx, posY)) posX += fx;     // slide along walls: axis by axis
    if (free(posX, posY + fy)) posY += fy;
    bob += Math.abs(sp) * 3.6;
  }
}

// ---- render (raycaster) ----------------------------------------------------
let W = 0, H = 0, STEP = 2;
function render() {
  const dirX = Math.cos(dir), dirY = Math.sin(dir);
  // Keep the corridor's proportions identical on every screen by scaling the
  // camera plane with the aspect ratio, anchored to the desktop look (~16:10,
  // where this is exactly 0.66). Without it walls stretch tall in portrait and
  // go flat in wide landscape. projH stays H, so the desktop view is unchanged.
  const FOV = Math.max(0.32, Math.min(0.95, 0.66 * (W / H) / 1.6));
  const planeX = -dirY * FOV, planeY = dirX * FOV;
  const projH = H;
  const horizon = H / 2 + Math.sin(bob) * H * 0.012;
  const zbuf = new Float32Array(W); zbuf.fill(1e9);   // per-column wall depth, for sprites

  let grad = ctx.createLinearGradient(0, 0, 0, horizon);
  grad.addColorStop(0, '#d8dad7'); grad.addColorStop(1, '#a9ada9');   // light tiled ceiling
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, horizon);
  grad = ctx.createLinearGradient(0, horizon, 0, H);
  grad.addColorStop(0, '#b07b40'); grad.addColorStop(1, '#7c542a');   // honey wooden floor
  ctx.fillStyle = grad; ctx.fillRect(0, horizon, W, H - horizon);

  for (let col = 0; col < W; col += STEP) {
    const camX = 2 * col / W - 1;
    const rayX = dirX + planeX * camX;
    const rayY = dirY + planeY * camX;
    let mapX = Math.floor(posX), mapY = Math.floor(posY);
    const dDistX = Math.abs(1 / rayX), dDistY = Math.abs(1 / rayY);
    let stepX, stepY, sideX, sideY;
    if (rayX < 0) { stepX = -1; sideX = (posX - mapX) * dDistX; }
    else { stepX = 1; sideX = (mapX + 1 - posX) * dDistX; }
    if (rayY < 0) { stepY = -1; sideY = (posY - mapY) * dDistY; }
    else { stepY = 1; sideY = (mapY + 1 - posY) * dDistY; }

    let side = 0;
    for (let guard = 0; guard < 64; guard++) {
      if (sideX < sideY) { sideX += dDistX; mapX += stepX; side = 0; }
      else { sideY += dDistY; mapY += stepY; side = 1; }
      if (maze.g[mapY] && maze.g[mapY][mapX] === 1) break;
    }

    const perp = side === 0 ? (sideX - dDistX) : (sideY - dDistY);
    if (perp <= 0) continue;
    const lineH = projH / perp;
    const drawStart = horizon - lineH / 2;

    let wallX = side === 0 ? posY + perp * rayY : posX + perp * rayX;
    wallX -= Math.floor(wallX);
    let texX = Math.floor(wallX * TS);
    if (side === 0 && rayX > 0) texX = TS - texX - 1;
    if (side === 1 && rayY < 0) texX = TS - texX - 1;

    const tex = (texGrid[mapY] && texGrid[mapY][mapX]) || brick;
    ctx.drawImage(tex, texX, 0, 1, TS, col, drawStart, STEP, lineH);

    let shade = Math.min(1, perp / FOG) * 0.62;
    if (side === 1) shade = Math.min(1, shade + 0.12);
    if (shade > 0.01) {
      ctx.fillStyle = `rgba(0,0,0,${shade})`;
      ctx.fillRect(col, drawStart, STEP, lineH);
    }
    zbuf[col] = perp;
  }

  // ---- billboard sprites: the rat + floating OpenGL logos --------------------
  const sprites = [];
  for (const rt of rats) sprites.push({ x: rt.x, y: rt.y, tex: ratTex, scale: 0.46, raise: 0 });
  for (const L of logos) sprites.push({ x: L.x, y: L.y, tex: logoTex, scale: 0.58, raise: 0.34 + Math.sin(clock * 1.6 + L.phase) * 0.06 });
  if (startObj) sprites.push({ x: startObj.x, y: startObj.y, tex: startTex, scale: 0.64, raise: 0.26 + Math.sin(clock * 1.4) * 0.04 });
  if (goalObj) sprites.push({ x: goalObj.x, y: goalObj.y, tex: smileyTex, scale: 0.52, raise: 0.3 + Math.sin(clock * 1.2 + 1) * 0.05 });
  sprites.sort((a, b) => ((b.x - posX) ** 2 + (b.y - posY) ** 2) - ((a.x - posX) ** 2 + (a.y - posY) ** 2));

  const invDet = 1 / (planeX * dirY - dirX * planeY);
  for (const s of sprites) {
    const relX = s.x - posX, relY = s.y - posY;
    const tX = invDet * (dirY * relX - dirX * relY);
    const tY = invDet * (-planeY * relX + planeX * relY);   // depth along the view
    if (tY <= 0.12) continue;
    const screenX = (W / 2) * (1 + tX / tY);
    const sh = Math.abs(projH / tY) * s.scale;               // square sprites
    const ground = horizon + (projH / tY) / 2;
    const topY = ground - sh - s.raise * (projH / tY);
    const left = screenX - sh / 2;
    const tw = s.tex.width, th = s.tex.height;
    let c0 = Math.floor(left); c0 -= ((c0 % STEP) + STEP) % STEP;   // align to the STEP grid
    for (let col = Math.max(0, c0); col < Math.min(W, screenX + sh / 2); col += STEP) {
      if (tY >= zbuf[col]) continue;                          // hidden behind a wall here
      const texX = ((col - left) / sh * tw) | 0;
      if (texX < 0 || texX >= tw) continue;
      ctx.drawImage(s.tex, texX, 0, 1, th, col, topY, STEP, sh);
    }
  }
}

// ---- loop ------------------------------------------------------------------
let last = performance.now();
function frame(now) {
  let dt = (now - last) / 1000;
  last = now;
  if (dt > 0.1) dt = 0.1;
  update(dt);
  render();
  requestAnimationFrame(frame);
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  STEP = W > 1400 ? 3 : 2;
}
window.addEventListener('resize', resize);

resize();
newMaze();
requestAnimationFrame(frame);
</script>
</body>
</html>
