<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Ooit</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; position: fixed; inset: 0; }
  #hud {
    position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%); z-index: 2;
    font: 12px/1 "Courier New", ui-monospace, monospace;
    color: #f2f2f2; pointer-events: none; user-select: none;
    letter-spacing: 0.16em; text-transform: lowercase; white-space: nowrap;
    padding: 8px 16px; border-radius: 999px;
    background: rgba(12,12,12,0.55);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 2px 14px rgba(0,0,0,0.45);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  #hud .sep { opacity: 0.28; margin: 0 0.8em; }
  #hud .dim { opacity: 0.55; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>
<script>
// Ooit ("someday")
// ----------------------------------------------------------------------------
// A ball in the spirit of the classic DVD logo: it never steers, it only
// bounces. The screen is a maze; somewhere sits the exit (the farthest point).
// The ball has to roll into it by accident -- there is NO pathfinding, no smart
// navigation. If it makes it, a bigger maze follows (level up).
//
// 100% PURE & DETERMINISTIC
// The bounce is perfect: reflect, nothing else. No random nudge, no anti-stuck,
// no tricks. And like a real DVD player it runs on a FIXED clock (fixed
// timestep): every tick moves the ball a fixed step, independent of your screen
// or framerate. That makes the path bit-for-bit reproducible -- the same maze
// always shares the same fate. Just like the real logo that almost never hits
// the corner exactly, this ball may NEVER escape a maze: its orbit is periodic
// and simply doesn't cross the exit. That's not a bug, that's the beauty -- you
// can watch for hours. If it gets stuck, it gets stuck. The higher the level,
// the rarer the exit falls. Nothing is saved: refresh = fresh start at level 1.

// Geometry in grid units: corridors are PASS wide, walls WALL (thin -> lines).
// All physics runs in these units; pixels only come in when drawing.
const WALL = 0.12, PASS = 2, PERIOD = WALL + PASS;
const BALL_R = 0.55;          // collision radius in grid units (corridor is 2)
const SPEED  = 1.5;           // grid units per second -- deliberately slow
const FIXED  = 1 / 120;       // fixed timestep (s) -- the device's "clock"
const SHORT_CELLS = (lvl) => lvl + 1;   // cells along the short screen side (level 1 = tiny)
const LINE = '#303030';                 // subtle dark grey: walls + finish

const PALETTE = ['#ff3b30','#ff9500','#ffe600','#34c759','#00c8e0',
                 '#3a48d6','#9b30d0','#ff2d9b','#ffffff'];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');

function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// grid-line index <-> grid unit (corridors=PASS, walls=WALL, starts with a wall)
function offOf(i) { return Math.ceil(i / 2) * WALL + Math.floor(i / 2) * PASS; }
function spanFor(k) { return (k + 1) * WALL + k * PASS; }   // offOf(2k+1): k cells
function indexAt(g) {
  if (g < 0) return -1;
  const kk = Math.floor(g / PERIOD), rem = g - kk * PERIOD;
  return rem < WALL ? 2 * kk : 2 * kk + 1;
}
function cellCenter(c) { return offOf(2 * c + 1) + PASS / 2; }   // grid units

// --- maze generation (recursive backtracker, perfect maze) ------------------
function buildMaze(cols, rows, seed) {
  const W = 2 * cols + 1, H = 2 * rows + 1;
  const wall = [];
  for (let y = 0; y < H; y++) wall.push(new Array(W).fill(true));

  const rnd = mulberry32(seed);
  const visited = [];
  for (let y = 0; y < rows; y++) visited.push(new Array(cols).fill(false));

  const dirs = [[0, -1], [1, 0], [0, 1], [-1, 0]];
  const stack = [[0, 0]];
  visited[0][0] = true;
  wall[1][1] = false;

  while (stack.length) {
    const [cx, cy] = stack[stack.length - 1];
    const options = [];
    for (const [dx, dy] of dirs) {
      const nx = cx + dx, ny = cy + dy;
      if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && !visited[ny][nx]) options.push([nx, ny, dx, dy]);
    }
    if (!options.length) { stack.pop(); continue; }
    const [nx, ny, dx, dy] = options[Math.floor(rnd() * options.length)];
    visited[ny][nx] = true;
    wall[2 * cy + 1 + dy][2 * cx + 1 + dx] = false;
    wall[2 * ny + 1][2 * nx + 1] = false;
    stack.push([nx, ny]);
  }

  // exit = the cell FARTHEST from the start (the real end), via BFS
  const seen = {}; seen['0,0'] = 0;
  const q = [[0, 0, 0]];
  let far = [0, 0], fd = 0;
  while (q.length) {
    const [cx, cy, d] = q.shift();
    if (d > fd) { fd = d; far = [cx, cy]; }
    for (const [dx, dy] of dirs) {
      const nx = cx + dx, ny = cy + dy;
      if (nx >= 0 && nx < cols && ny >= 0 && ny < rows &&
          wall[2 * cy + 1 + dy][2 * cx + 1 + dx] === false && !((nx + ',' + ny) in seen)) {
        seen[nx + ',' + ny] = d + 1;
        q.push([nx, ny, d + 1]);
      }
    }
  }
  return { cols, rows, W, H, wall, startCell: [0, 0], exitCell: far };
}

// --- collision & step (everything in grid units; no randomness) -------------
// Operates on a given maze so we can pre-test whether a seed escapes (level 1)
// using the exact same math as live.
function wallHitAt(m, px, py) {
  const gx = indexAt(px), gy = indexAt(py);
  if (gx < 0 || gy < 0 || gx >= m.W || gy >= m.H) return true;
  return m.wall[gy][gx];
}
function circleHitsWall(m, x, y) {
  const r = BALL_R, dg = r * 0.7071;   // all sample points sit on the collision radius
  const pts = [[-dg,-dg],[dg,-dg],[-dg,dg],[dg,dg],[-r,0],[r,0],[0,-r],[0,r]];
  for (const [dx, dy] of pts) if (wallHitAt(m, x + dx, y + dy)) return true;
  return false;
}
// one fixed physics tick; returns true when the exit is reached.
// onBounce (optional) is called on every bounce -- purely cosmetic, it does not
// affect the physics, so the pre-test stays exactly equal to live.
function tick(m, b, onBounce) {
  const nx = b.x + b.vx * FIXED;
  if (circleHitsWall(m, nx, b.y)) { b.vx = -b.vx; if (onBounce) onBounce(); } else b.x = nx;
  const ny = b.y + b.vy * FIXED;
  if (circleHitsWall(m, b.x, ny)) { b.vy = -b.vy; if (onBounce) onBounce(); } else b.y = ny;
  const ex = cellCenter(m.exitCell[0]), ey = cellCenter(m.exitCell[1]);
  return Math.hypot(b.x - ex, b.y - ey) < 0.5;
}
function freshBall() {
  const s = cellCenter(0);
  return { x: s, y: s, vx: Math.cos(Math.PI / 4) * SPEED, vy: Math.sin(Math.PI / 4) * SPEED };
}
// does this maze get solved within 'seconds'? (exact same tick as live)
function solvesWithin(m, seconds) {
  const b = freshBall();
  const ticks = Math.ceil(seconds / FIXED);
  for (let t = 0; t < ticks; t++) if (tick(m, b)) return true;
  return false;
}

// --- state (this session only; refresh = fresh start at level 1) ------------
let level = 1, mazeMs = 0, totalMs = 0, seed = (Math.random() * 0xffffffff) >>> 0;
let maze, u, originX, originY;       // u = pixels per grid unit (drawing only)
let ball, colorIndex = 0;
let prevX = 0, prevY = 0;            // ball position of the previous tick (for interpolation)
let lastHud = '';
const mazeCanvas = document.createElement('canvas');   // static maze, drawn once
const mctx = mazeCanvas.getContext('2d');

// pick cols/rows so the maze fills the screen with square cells
function dims() {
  const N = Math.max(2, SHORT_CELLS(level));
  const landscape = canvas.width >= canvas.height;
  const shortPx = landscape ? canvas.height : canvas.width;
  const longPx  = landscape ? canvas.width  : canvas.height;
  const uu = shortPx / spanFor(N);
  const M = Math.max(N, Math.floor(((longPx / uu) - WALL) / PERIOD));
  return landscape ? { cols: M, rows: N } : { cols: N, rows: M };
}
function layout() {
  u = Math.min(canvas.width / spanFor(maze.cols), canvas.height / spanFor(maze.rows));
  originX = (canvas.width  - spanFor(maze.cols) * u) / 2;
  originY = (canvas.height - spanFor(maze.rows) * u) / 2;
}

function startLevel() {
  const d = dims();
  if (level === 1) {
    // level 1 must show the idea right away: pick a seed that escapes quickly
    let s, m;
    for (let t = 0; t < 80; t++) {
      s = (Math.random() * 0xffffffff) >>> 0;
      m = buildMaze(d.cols, d.rows, s);
      if (solvesWithin(m, 60)) break;     // escapes within ~1 min
    }
    seed = s; maze = m;
  } else {
    maze = buildMaze(d.cols, d.rows, seed);
  }
  layout();
  colorIndex = 0;
  ball = freshBall();
  ball.color = PALETTE[0];
  prevX = ball.x; prevY = ball.y;
  paintMaze();
}
function nextLevel() {
  level++; mazeMs = 0; seed = (Math.random() * 0xffffffff) >>> 0;
  startLevel();
}
function flipColor() {
  colorIndex = (colorIndex + 1) % PALETTE.length;
  ball.color = PALETTE[colorIndex];
}

// --- drawing -----------------------------------------------------------------
// The maze is static: drawn once to its own canvas, then only blitted.
function paintMaze() {
  mazeCanvas.width = canvas.width;
  mazeCanvas.height = canvas.height;
  mctx.fillStyle = '#000';
  mctx.fillRect(0, 0, mazeCanvas.width, mazeCanvas.height);

  // walls: thin, dark grey lines (clamped -> never drawn off-screen)
  mctx.fillStyle = LINE;
  for (let gy = 0; gy < maze.H; gy++)
    for (let gx = 0; gx < maze.W; gx++)
      if (maze.wall[gy][gx]) {
        let x = originX + offOf(gx) * u, y = originY + offOf(gy) * u;
        let w = Math.max(1, (gx % 2 ? PASS : WALL) * u);
        let h = Math.max(1, (gy % 2 ? PASS : WALL) * u);
        if (x < 0) { w += x; x = 0; }
        if (y < 0) { h += y; y = 0; }
        if (x + w > mazeCanvas.width)  w = mazeCanvas.width  - x;
        if (y + h > mazeCanvas.height) h = mazeCanvas.height - y;
        if (w > 0 && h > 0) mctx.fillRect(x, y, w, h);
      }

  // exit: finish flag in the same line colour, subtle (checker against black)
  const ex = originX + cellCenter(maze.exitCell[0]) * u;
  const ey = originY + cellCenter(maze.exitCell[1]) * u;
  const fsz = PASS * 0.72 * u, n = 4, cs = fsz / n;
  mctx.fillStyle = LINE;
  for (let i = 0; i < n; i++)
    for (let j = 0; j < n; j++)
      if ((i + j) % 2) mctx.fillRect(ex - fsz / 2 + i * cs, ey - fsz / 2 + j * cs, cs + 0.5, cs + 0.5);
}

// each frame: blit the maze + draw the ball at its interpolated in-between position
function draw(rx, ry) {
  ctx.drawImage(mazeCanvas, 0, 0);
  ctx.fillStyle = ball.color;
  ctx.beginPath();
  ctx.arc(originX + rx * u, originY + ry * u, BALL_R * u, 0, Math.PI * 2);
  ctx.fill();

  const txt = '<span>level ' + level + '</span>' +
              '<span class="sep">·</span>' +
              '<span class="dim">' + fmt(mazeMs) + '</span>' +
              '<span class="sep">·</span>' +
              '<span class="dim">total ' + fmt(totalMs) + '</span>';
  if (txt !== lastHud) { hud.innerHTML = txt; lastHud = txt; }
}
function fmt(ms) {
  let s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400); s -= d * 86400;
  const h = Math.floor(s / 3600);  s -= h * 3600;
  const m = Math.floor(s / 60);    s -= m * 60;
  if (d) return d + 'd ' + h + 'h ' + m + 'm';
  if (h) return h + 'h ' + m + 'm';
  if (m) return m + 'm ' + s + 's';
  return s + 's';
}

// --- loop: fixed clock decoupled from the framerate -------------------------
let last = performance.now(), acc = 0;
function frame(now) {
  let realDt = (now - last) / 1000;
  last = now;
  if (realDt > 0.25) realDt = 0.25;        // after a tab-switch: no time jump
  mazeMs += realDt * 1000;                  // time on the current level
  totalMs += realDt * 1000;                 // total watch time this session
  acc += realDt;
  while (acc >= FIXED) {                     // physics in fixed steps
    prevX = ball.x; prevY = ball.y;          // keep previous tick for interpolation
    if (tick(maze, ball, flipColor)) { nextLevel(); acc = 0; break; }
    acc -= FIXED;
  }
  // draw the ball at the fraction between previous and current tick -> smooth
  const alpha = acc / FIXED;
  draw(prevX + (ball.x - prevX) * alpha, prevY + (ball.y - prevY) * alpha);
  requestAnimationFrame(frame);
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  startLevel();                 // rebuild this level to fit the new screen
});

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
startLevel();
requestAnimationFrame(frame);
</script>
</body>
</html>
