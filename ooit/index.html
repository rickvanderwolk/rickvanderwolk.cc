<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Ooit</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; position: fixed; inset: 0; }
  #hud {
    position: fixed; left: 14px; bottom: 14px; z-index: 2;
    font: 12px/1 "Courier New", ui-monospace, monospace;
    color: #f2f2f2; pointer-events: none; user-select: none;
    letter-spacing: 0.14em; text-transform: lowercase;
    background: rgba(0,0,0,0.5); padding: 5px 9px; border-radius: 3px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>
<script>
// Ooit
// ----------------------------------------------------------------------------
// Een bal in de geest van het klassieke DVD-logo: hij stuurt niet, hij botst
// alleen. Het scherm is een doolhof; ergens ligt de uitgang (het verste punt).
// De bal moet die per ongeluk binnen rollen -- er wordt NIET gezocht of slim
// genavigeerd. Lukt het, dan volgt een groter doolhof (level omhoog).
//
// 100% ZUIVER & DETERMINISTISCH
// De bounce is perfect: kaatsen, verder niets. Geen willekeurig duwtje, geen
// anti-vastloop, geen trucs. En net als een echte DVD-speler rekent dit op een
// VASTE klok (fixed timestep): elke tik beweegt de bal een vast stapje,
// onafhankelijk van je scherm of framerate. Daardoor is de baan bit-voor-bit
// reproduceerbaar -- hetzelfde doolhof heeft altijd exact hetzelfde lot. Net
// als het echte logo dat bijna nooit precies de hoek raakt, kan deze bal een
// doolhof soms NOOIT uitkomen: de baan is periodiek en raakt de uitgang
// gewoon niet. Dat is geen bug, dat is het mooie -- je kunt uren kijken.
// Loopt-ie vast, dan loopt-ie vast. Hoe hoger het level, hoe zeldzamer de
// uitgang valt. Niets wordt bewaard: refresh = nieuwe start op level 1.

// Geometrie in grid-eenheden: gangen PASS breed, muren WALL (dun -> lijnen).
// De hele fysica rekent in deze eenheden; pixels komen pas bij het tekenen.
const WALL = 0.12, PASS = 2, PERIOD = WALL + PASS;
const BALL_R = 0.55;          // botsradius in grid-eenheden (gang is 2)
const SPEED  = 1.5;           // grid-eenheden per seconde -- bewust traag
const FIXED  = 1 / 120;       // vaste tijdstap (s) -- de "klok" van het apparaat
const SHORT_CELLS = (lvl) => lvl + 1;   // cellen in de korte schermzijde (level 1 = mini)
const LINE = '#303030';                 // subtiel donkergrijs: muren + finish

const PALETTE = ['#ff3b30','#ff9500','#ffe600','#34c759','#00c8e0',
                 '#3a48d6','#9b30d0','#ff2d9b','#ffffff'];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');

function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// gridlijn-index <-> grid-eenheid (gangen=PASS, muren=WALL, begint met muur)
function offOf(i) { return Math.ceil(i / 2) * WALL + Math.floor(i / 2) * PASS; }
function spanFor(k) { return (k + 1) * WALL + k * PASS; }   // offOf(2k+1): k cellen
function indexAt(g) {
  if (g < 0) return -1;
  const kk = Math.floor(g / PERIOD), rem = g - kk * PERIOD;
  return rem < WALL ? 2 * kk : 2 * kk + 1;
}
function cellCenter(c) { return offOf(2 * c + 1) + PASS / 2; }   // grid-eenheden

// --- doolhof-generatie (recursive backtracker, perfect maze) ----------------
function buildMaze(cols, rows, seed) {
  const W = 2 * cols + 1, H = 2 * rows + 1;
  const wall = [];
  for (let y = 0; y < H; y++) wall.push(new Array(W).fill(true));

  const rnd = mulberry32(seed);
  const visited = [];
  for (let y = 0; y < rows; y++) visited.push(new Array(cols).fill(false));

  const dirs = [[0, -1], [1, 0], [0, 1], [-1, 0]];
  const stack = [[0, 0]];
  visited[0][0] = true;
  wall[1][1] = false;

  while (stack.length) {
    const [cx, cy] = stack[stack.length - 1];
    const options = [];
    for (const [dx, dy] of dirs) {
      const nx = cx + dx, ny = cy + dy;
      if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && !visited[ny][nx]) options.push([nx, ny, dx, dy]);
    }
    if (!options.length) { stack.pop(); continue; }
    const [nx, ny, dx, dy] = options[Math.floor(rnd() * options.length)];
    visited[ny][nx] = true;
    wall[2 * cy + 1 + dy][2 * cx + 1 + dx] = false;
    wall[2 * ny + 1][2 * nx + 1] = false;
    stack.push([nx, ny]);
  }

  // uitgang = cel het VERSTE van de start (echte eind), via BFS
  const seen = {}; seen['0,0'] = 0;
  const q = [[0, 0, 0]];
  let far = [0, 0], fd = 0;
  while (q.length) {
    const [cx, cy, d] = q.shift();
    if (d > fd) { fd = d; far = [cx, cy]; }
    for (const [dx, dy] of dirs) {
      const nx = cx + dx, ny = cy + dy;
      if (nx >= 0 && nx < cols && ny >= 0 && ny < rows &&
          wall[2 * cy + 1 + dy][2 * cx + 1 + dx] === false && !((nx + ',' + ny) in seen)) {
        seen[nx + ',' + ny] = d + 1;
        q.push([nx, ny, d + 1]);
      }
    }
  }
  return { cols, rows, W, H, wall, startCell: [0, 0], exitCell: far };
}

// --- collisie & stap (alles in grid-eenheden; geen toeval) ------------------
// Werkt op een meegegeven doolhof, zodat we vooraf kunnen testen of een seed
// uitkomt (level 1) met exact dezelfde wiskunde als live.
function wallHitAt(m, px, py) {
  const gx = indexAt(px), gy = indexAt(py);
  if (gx < 0 || gy < 0 || gx >= m.W || gy >= m.H) return true;
  return m.wall[gy][gx];
}
function circleHitsWall(m, x, y) {
  const r = BALL_R, dg = r * 0.7071;   // alle sample-punten op de botsradius
  const pts = [[-dg,-dg],[dg,-dg],[-dg,dg],[dg,dg],[-r,0],[r,0],[0,-r],[0,r]];
  for (const [dx, dy] of pts) if (wallHitAt(m, x + dx, y + dy)) return true;
  return false;
}
// één vaste tik fysica; geeft true als de uitgang geraakt is.
// onBounce (optioneel) wordt bij elke kaats aangeroepen -- puur cosmetisch,
// raakt de fysica niet, zodat de vooraf-check exact gelijk blijft aan live.
function tick(m, b, onBounce) {
  const nx = b.x + b.vx * FIXED;
  if (circleHitsWall(m, nx, b.y)) { b.vx = -b.vx; if (onBounce) onBounce(); } else b.x = nx;
  const ny = b.y + b.vy * FIXED;
  if (circleHitsWall(m, b.x, ny)) { b.vy = -b.vy; if (onBounce) onBounce(); } else b.y = ny;
  const ex = cellCenter(m.exitCell[0]), ey = cellCenter(m.exitCell[1]);
  return Math.hypot(b.x - ex, b.y - ey) < 0.5;
}
function freshBall() {
  const s = cellCenter(0);
  return { x: s, y: s, vx: Math.cos(Math.PI / 4) * SPEED, vy: Math.sin(Math.PI / 4) * SPEED };
}
// lost dit doolhof binnen 'seconds' op? (exact dezelfde tik als live)
function solvesWithin(m, seconds) {
  const b = freshBall();
  const ticks = Math.ceil(seconds / FIXED);
  for (let t = 0; t < ticks; t++) if (tick(m, b)) return true;
  return false;
}

// --- toestand (alleen deze sessie; refresh = nieuwe start op level 1) --------
let level = 1, mazeMs = 0, seed = (Math.random() * 0xffffffff) >>> 0;
let maze, u, originX, originY;       // u = pixels per grid-eenheid (alleen tekenen)
let ball, colorIndex = 0;

// kies cols/rows zodat het doolhof het scherm vult met vierkante cellen
function dims() {
  const N = Math.max(2, SHORT_CELLS(level));
  const landscape = canvas.width >= canvas.height;
  const shortPx = landscape ? canvas.height : canvas.width;
  const longPx  = landscape ? canvas.width  : canvas.height;
  const uu = shortPx / spanFor(N);
  const M = Math.max(N, Math.floor(((longPx / uu) - WALL) / PERIOD));
  return landscape ? { cols: M, rows: N } : { cols: N, rows: M };
}
function layout() {
  u = Math.min(canvas.width / spanFor(maze.cols), canvas.height / spanFor(maze.rows));
  originX = (canvas.width  - spanFor(maze.cols) * u) / 2;
  originY = (canvas.height - spanFor(maze.rows) * u) / 2;
}

function startLevel() {
  const d = dims();
  if (level === 1) {
    // level 1 moet het idee meteen tonen: kies een seed die snel uitkomt
    let s, m;
    for (let t = 0; t < 80; t++) {
      s = (Math.random() * 0xffffffff) >>> 0;
      m = buildMaze(d.cols, d.rows, s);
      if (solvesWithin(m, 60)) break;     // lost binnen ~1 min op
    }
    seed = s; maze = m;
  } else {
    maze = buildMaze(d.cols, d.rows, seed);
  }
  layout();
  colorIndex = 0;
  ball = freshBall();
  ball.color = PALETTE[0];
}
function nextLevel() {
  level++; mazeMs = 0; seed = (Math.random() * 0xffffffff) >>> 0;
  startLevel();
}
function flipColor() {
  colorIndex = (colorIndex + 1) % PALETTE.length;
  ball.color = PALETTE[colorIndex];
}

// --- tekenen -----------------------------------------------------------------
function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // muren: dunne, donkere grijze lijnen (geclampt -> nooit buiten beeld)
  ctx.fillStyle = LINE;
  for (let gy = 0; gy < maze.H; gy++)
    for (let gx = 0; gx < maze.W; gx++)
      if (maze.wall[gy][gx]) {
        let x = originX + offOf(gx) * u, y = originY + offOf(gy) * u;
        let w = Math.max(1, (gx % 2 ? PASS : WALL) * u);
        let h = Math.max(1, (gy % 2 ? PASS : WALL) * u);
        if (x < 0) { w += x; x = 0; }
        if (y < 0) { h += y; y = 0; }
        if (x + w > canvas.width)  w = canvas.width  - x;
        if (y + h > canvas.height) h = canvas.height - y;
        if (w > 0 && h > 0) ctx.fillRect(x, y, w, h);
      }

  // uitgang: finish-vlag in dezelfde lijnkleur, subtiel (checker tegen zwart)
  const ex = originX + cellCenter(maze.exitCell[0]) * u;
  const ey = originY + cellCenter(maze.exitCell[1]) * u;
  const fsz = PASS * 0.72 * u, n = 4, cs = fsz / n;
  ctx.fillStyle = LINE;
  for (let i = 0; i < n; i++)
    for (let j = 0; j < n; j++)
      if ((i + j) % 2) ctx.fillRect(ex - fsz / 2 + i * cs, ey - fsz / 2 + j * cs, cs + 0.5, cs + 0.5);

  // de bal: vlakke cirkel op exacte botsradius -> raakt de muren echt
  ctx.fillStyle = ball.color;
  ctx.beginPath();
  ctx.arc(originX + ball.x * u, originY + ball.y * u, BALL_R * u, 0, Math.PI * 2);
  ctx.fill();

  hud.textContent = 'level ' + level + '   ' + fmt(mazeMs);
}
function fmt(ms) {
  let s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400); s -= d * 86400;
  const h = Math.floor(s / 3600);  s -= h * 3600;
  const m = Math.floor(s / 60);    s -= m * 60;
  if (d) return d + 'd ' + h + 'u ' + m + 'm';
  if (h) return h + 'u ' + m + 'm';
  if (m) return m + 'm ' + s + 's';
  return s + 's';
}

// --- loop: vaste klok ontkoppeld van het framerate --------------------------
let last = performance.now(), acc = 0;
function frame(now) {
  let realDt = (now - last) / 1000;
  last = now;
  if (realDt > 0.25) realDt = 0.25;        // na tab-switch: geen tijdsprong
  mazeMs += realDt * 1000;                  // HUD telt echte kijktijd
  acc += realDt;
  while (acc >= FIXED) {                     // fysica in vaste stapjes
    if (tick(maze, ball, flipColor)) { nextLevel(); acc = 0; break; }
    acc -= FIXED;
  }
  draw();
  requestAnimationFrame(frame);
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  startLevel();                 // herbouw dit level passend op het nieuwe scherm
});

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
startLevel();
requestAnimationFrame(frame);
</script>
</body>
</html>
